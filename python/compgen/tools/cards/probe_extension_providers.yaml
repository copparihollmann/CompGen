schema_version: compgen_tool_card_v1
tool_id: compgen_probe_extension_providers
maturity: T6
phase: env_probe
description: |
  M-81 extension-provider probe wrapped as a ToolCard. Walks the
  YAML cards under python/compgen/{providers,dialects,targets}/cards/
  and emits seven typed artifacts: provider_status.json,
  target_status.json, dialect_status.json, pass_tool_status.json,
  provider_target_matrix.csv, provider_contract_matrix.csv, and
  probe_summary.md. Read-only with respect to compilation state.

  P1 exit-gate flagship: the first ToolCard that reaches T6 on real
  hardware. The shipped fresh-agent task `probe_providers_v1` has a
  passing grading result on this machine.

entrypoints:
  python: compgen.tools.builtin.probe_providers:run
  cli: compgen-tool run compgen_probe_extension_providers
  mcp: compgen_probe_extension_providers

input_schema:
  type: object
  properties:
    timeout_s:
      type: number
      minimum: 0.001
      maximum: 600
    include_traceback:
      type: boolean
  additionalProperties: false

output_schema:
  type: object
  required: [status, artifacts]
  properties:
    status:
      enum: [ok, blocked, error]
    reason: { type: string }
    detail: { type: string }
    provider_count:
      type: integer
      minimum: 0
    artifacts:
      type: array
      items: { type: string }

writes:
  allowed_roots:
    - ${run_dir}/

forbidden:
  - mutate_payload_ir
  - mutate_recipe_ir
  - bypass_verifier
  - write_outside_artifact_dir
  - invent_certificate

promotion_requirements:
  unit_tests: true
  negative_controls: true
  cli_wrapper: true
  artifact_outputs: true
  skill_doc: true
  mcp_wrapper: true
  fresh_agent_harness: true
  phase_menu_listing: false

tests:
  positive:
    - tests.tools.test_probe_extension_providers_tool::test_probe_runs_clean
  negative_controls:
    - tests.tools.test_probe_extension_providers_tool::test_probe_blocks_on_timeout
    - tests.tools.test_probe_extension_providers_tool::test_probe_rejects_unknown_input_field

skill_path: .claude/skills/compgen-provider-integration/SKILL.md
fresh_agent_task_id: probe_providers_v1
owner: core
