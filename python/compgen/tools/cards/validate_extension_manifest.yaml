schema_version: compgen_tool_card_v1
tool_id: compgen_validate_extension_manifest
maturity: T6
phase: extension_authoring
description: |
  Validate a user-authored ``compgen_extension.yaml`` against the
  M-79 manifest schema + the sandbox rules enforced by
  :mod:`compgen.extensions.registry`. Returns a typed report.

  ``status=ok`` means the manifest parsed cleanly and the per-manifest
  registry accepted it. ``status=blocked`` carries the typed sandbox /
  schema rejection reason. ``status=error`` is reserved for
  unrecoverable file / load failures.

entrypoints:
  python: compgen.tools.builtin.extension_authoring:validate_extension_manifest
  cli: compgen-tool run compgen_validate_extension_manifest
  mcp: compgen_validate_extension_manifest

input_schema:
  type: object
  required: [manifest_path]
  properties:
    manifest_path:
      type: string
      minLength: 1
  additionalProperties: false

output_schema:
  type: object
  required: [status, artifacts]
  properties:
    status:
      enum: [ok, blocked, error]
    extension_id: { type: string }
    version: { type: string }
    provides:
      type: object
    manifest_path: { type: string }
    reason: { type: string }
    detail: { type: string }
    artifacts:
      type: array
      items: { type: string }

writes:
  allowed_roots:
    - ${run_dir}/

forbidden:
  - mutate_payload_ir
  - mutate_recipe_ir
  - bypass_verifier
  - write_outside_artifact_dir
  - invent_certificate

promotion_requirements:
  unit_tests: true
  negative_controls: true
  cli_wrapper: true
  artifact_outputs: true
  skill_doc: true
  mcp_wrapper: true
  fresh_agent_harness: true
  phase_menu_listing: false

tests:
  positive:
    - tests.tools.test_extension_authoring_tools::test_validate_extension_manifest_clean
  negative_controls:
    - tests.tools.test_extension_authoring_tools::test_validate_extension_manifest_missing_path
    - tests.tools.test_extension_authoring_tools::test_validate_extension_manifest_schema_violation

skill_path: .claude/skills/compgen-extension-authoring/SKILL.md
fresh_agent_task_id: validate_extension_manifest_v1
owner: core
