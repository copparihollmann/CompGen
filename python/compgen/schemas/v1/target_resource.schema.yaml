$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "compgen://user_perspective/schemas/target_resource.schema.yaml"
title: TargetResource
description: >
  User-side target-resource model. Extends
  compgen.targets.schema.TargetProfile with explicit bandwidth/latency,
  per-device supported kernel families, host/device sync cost, and an
  assumptions block. Covers both single-device and heterogeneous SoC
  targets. Authored YAML files in configs/targets/*.yaml conform to this.

type: object
required: [name, schema_version, devices, metadata]
additionalProperties: false

properties:
  name:
    type: string
    description: Target identifier (e.g., bananapi-f3, openq-5165rb).
  schema_version:
    type: string
    enum: ["1.0"]
  devices:
    type: array
    minItems: 1
    items: { $ref: "#/$defs/DeviceSpec" }
  interconnects:
    type: array
    default: []
    items: { $ref: "#/$defs/Interconnect" }
  constraints:
    type: object
    additionalProperties: true
    description: System-level constraints (max_power_w, max_memory_gb, ...).
    default: {}
  cost_model:
    type: object
    additionalProperties: true
    default: {}
  calibration_data:
    type: object
    additionalProperties: true
    default: {}
  metadata:
    type: object
    required: [architecture, deployment_model, assumptions]
    additionalProperties: true
    properties:
      architecture:
        type: string
      deployment_model:
        type: string
        enum: [single_device, multi_domain_soc, cluster, embedded]
      host_runtime:
        type: string
      assumptions:
        type: array
        description: >
          Plain-English list of what is assumed vs measured. Every entry
          should be verifiable or falsifiable given a concrete data sheet.
        items:
          type: object
          required: [field, basis]
          properties:
            field: { type: string }
            basis:
              type: string
              enum: [datasheet, vendor_claim, inferred, measured, estimated]
            confidence:
              type: string
              enum: [low, medium, high]
              default: medium
            note: { type: string }

$defs:
  MemoryLevel:
    type: object
    required: [name, size_bytes]
    properties:
      name: { type: string }
      size_bytes: { type: integer, minimum: 0 }
      bandwidth_gbps: { type: number, minimum: 0 }
      latency_ns: { type: number, minimum: 0 }
      address_space:
        type: string
        description: Optional address space this level belongs to.

  ComputeUnit:
    type: object
    required: [name, count]
    properties:
      name: { type: string }
      count: { type: integer, minimum: 1 }
      supported_dtypes:
        type: array
        items: { type: string }
        default: [float32]
      peak_tflops: { type: number, minimum: 0 }

  DeviceSpec:
    type: object
    required: [device_type, name]
    properties:
      device_type:
        type: string
        enum: [cpu, gpu, npu, dsp, accelerator, firmware, sensor]
      name: { type: string }
      vendor: { type: string, default: "" }
      compute_units:
        type: array
        items: { $ref: "#/$defs/ComputeUnit" }
        default: []
      memory_hierarchy:
        type: array
        items: { $ref: "#/$defs/MemoryLevel" }
        default: []
      supported_ops:
        type: array
        items: { type: string }
        default: []
      features:
        type: array
        items: { type: string }
        default: []
      kernel_backends:
        type: array
        items: { type: string }
        default: []
      preferred_dtypes:
        type: array
        items: { type: string }
        default: []
      preferred_layouts:
        type: array
        items: { type: string }
        default: []
      kernel_families:
        type: array
        items:
          type: string
          enum: [gemm, attention, conv, reduction, normalization, elementwise,
                 pack_unpack, cache_update, preprocess, action_head, custom]
        default: []
      host_sync_cost_us:
        type: number
        minimum: 0
        description: Approximate host-device synchronization cost.
        default: 0

  Interconnect:
    type: object
    required: [topology, bandwidth_gbps, devices]
    properties:
      topology:
        type: string
        enum: [nvlink, pcie, shared_memory, dma, ipc, network, coherent_fabric]
      bandwidth_gbps: { type: number, minimum: 0 }
      latency_us: { type: number, minimum: 0 }
      devices:
        type: array
        minItems: 2
        maxItems: 2
        items: { type: integer, minimum: 0 }
