schema_version: pass_tool_card_v1
tool_id: fuse_matmul_bias_relu
phase: recipe_authoring
reads:
  - graph_dossier
  - payload_ir_summary
  - region_dossier
writes:
  - recipe_delta
allowed_recipe_ops:
  - FuseElementwise
  - SetAccumulator
refinement:
  kind: tolerance_eps
  verifier: differential_then_z3_if_promoted
entrypoint: compgen.pass_tools.builtin.fuse_matmul_bias_relu:run
description: |
