schema_version: provider_card_v1
provider_id: cutlass_cute
integration_level: probe
target_families: [cuda]
contract_kinds: [matmul, fused_region]
emits: [cu_source, cubin]
entrypoint: compgen.providers.adapters.cutlass_cute:CutlassCuteProvider
paper_claimable: false
required_env: [CUTLASS_ROOT]
required_commands: [nvcc]
required_python_imports: []
description: |
  CUTLASS / CuTe template provider for NVIDIA GEMM/conv baselines.
  Blocks with ``env_missing`` when ``CUTLASS_ROOT`` is unset.
  CUTLASS is not vendored — the probe expects an external checkout
  rooted at the env var.
