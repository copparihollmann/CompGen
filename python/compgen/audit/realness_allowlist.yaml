# Patterns we tolerate inside any source file (e.g. comment markers in
# docs / generated stubs / strings). The base scanner already excludes
# .compgen_cache, .crg-artifacts, results/, __pycache__, .git, and tests/
# (tests/ inclusion is opt-in via --include-tests flag).
content_pattern_exemptions:
  - pattern_substring: "TODO"
    reason: "Free-form TODO inside docstrings is acceptable in non-production helpers; prefer to delete rather than file new TODOs in code on production paths"
    paths:
      - "docs/**"
      - "scripts/dev/**"
      - "third_party/**"

  - pattern_substring: "FIXME"
    reason: "FIXME markers in third_party/ are upstream's, not ours"
    paths:
      - "third_party/**"

# Paths excluded entirely from scanning (never even read).
exclude_paths:
  - "**/__pycache__/**"
  - ".compgen_cache/**"
  - ".crg-artifacts/**"
  - "results/**"
  - ".git/**"
  - "third_party/**"
  - "**/*.lock"
  - "**/*.pyc"
  - "user_extensions/**"
  - "tmp/**"
