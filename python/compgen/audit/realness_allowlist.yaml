# Allowlist for the no-stub source scan (M-31A.2).
#
# Each entry names a path glob (relative to repo root) where one or more
# scan-pattern hits are intentionally tolerated, and a list of production
# paths the symbol is NOT allowed to be imported on. The realness_scan
# CLI fails on any hit OUTSIDE this allowlist; the import_provenance
# audit fails if any allowlisted-but-restricted symbol is loaded by a
# production run.
#
# Add entries deliberately. Every entry is a small admission that
# something synthetic exists in the tree; better to declare it than to
# pretend it doesn't.

allowed_nonproduction_symbols:
  - path: python/compgen/llm/mock_client.py
    reason: "test/offline LLM provider; selected explicitly via mock-client modes"
    forbidden_in:
      - graph_compilation.run
      - evidence_pack
      - promotion_gates
      - fresh_agent_task_pack
      - trust_report

  - path: python/compgen/memory/embeddings.py
    reason: "MockEmbeddingProvider is a fallback when sentence-transformers is absent; CI installs the real package, so this path is dead in production"
    forbidden_in:
      - evidence_pack
      - fresh_agent_task_pack

  - path: python/compgen/runtime/transport.py
    reason: "StubNetworkTransport is the test-only transport for the distributed runtime"
    forbidden_in:
      - graph_compilation.run
      - evidence_pack
      - promotion_gates

  - path: python/compgen/kernels/providers/claude_code_default.py
    reason: "StubCodegen is the no-op codegen used when no provider is configured; legitimate fallback, but flagged outside production lanes"
    forbidden_in:
      - evidence_pack
      - promotion_gates

  - path: python/compgen/capture/unsupported/synthesize_fake.py
    reason: "Synthesizes a typed-blocked record for an unsupported op (this IS the production handling of unsupported ops)"
    forbidden_in: []  # legitimate production behavior

  - path: python/compgen/ir/quant/ops.py
    reason: "FakeQuantOp is the canonical PyTorch quantization op name; not a stub"
    forbidden_in: []  # legitimate IR op

  - path: python/compgen/ir/payload/passes/runtime_stubs.py
    reason: "Placeholder runtime passes pre-dating the M-26 promotion bridge; flagged until renamed"
    forbidden_in:
      - graph_compilation.run

  - path: python/compgen/api.py
    reason: "Public API; comments discuss the no-silent-stub policy. Auditing the comments keeps the policy honest, but the file itself does not contain stubs"
    forbidden_in: []

  - path: python/compgen/api_llm.py
    reason: "Provider dispatch; the literal string \"mock\" is a public API value selecting MockLLMClient. The dispatch IS production behavior"
    forbidden_in: []

  - path: python/compgen/kernels/measure.py
    reason: "Measurement module whose docstring enforces the no-placeholder discipline (\"Every placeholder latency_us=0.0 is a bug\"). Audit-friendly because it discusses the rule it enforces"
    forbidden_in: []

  - path: python/compgen/kernels/errors.py
    reason: "Typed kernel errors; docstring describes the real-vs-placeholder distinction. No stubs"
    forbidden_in: []

  - path: python/compgen/kernels/contract_translator.py
    reason: "Triton-template code generator that emits a deliberate '# TODO: codegen body' marker inside the template so missing-codegen kernels fail loud, not silent. The TODO is an intentional placeholder in *generated* code, not a stub in compgen"
    forbidden_in: []

  - path: python/compgen/kernels/tile_oracle.py
    reason: "Packing-oracle docstring uses the word 'Stub' to describe a hint-returning function. Real implementation; legacy docstring wording"
    forbidden_in: []

  - path: python/compgen/kernels/exo_adapter.py
    reason: "Exo backend adapter; 'for now' / 'placeholder' phrasing in comments documents incremental scheduling residuals. Tracked separately"
    forbidden_in:
      - graph_compilation.run

  - path: python/compgen/kernels/autocomp_adapter.py
    reason: "Autocomp adapter raises NotImplementedError for genuinely-unsupported pattern types and uses 'placeholder 1.0' as a typed sentinel for unknown speedups. The sentinel is the production behavior — the alternative is silent zero"
    forbidden_in: []

  - path: python/compgen/kernels/exo_schedule_agent.py
    reason: "Exo schedule agent has one placeholder line tracked as a follow-up. Forbidden on production graph_compilation paths"
    forbidden_in:
      - graph_compilation.run

  - path: python/compgen/runtime/bundle_emit.py
    reason: "Runtime bundle emitter; 'placeholder' refers to FX graph placeholder nodes (a PyTorch domain term, NOT a stub)"
    forbidden_in: []

  - path: python/compgen/runtime/errors.py
    reason: "Typed-error module whose docstring documents the older silent-stub pattern that was REPLACED. NotImplementedError subclasses (UnsupportedTopologyError, SymbolicShapeUnsupportedError) are legitimate Python idiom"
    forbidden_in: []

  - path: python/compgen/runtime/glue.py
