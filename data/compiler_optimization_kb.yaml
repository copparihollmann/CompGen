schema_version: '1.0'
summary:
  op_wisdom: 9
  target_patterns: 50
  transform_recipes: 11
  kernel_wisdom: 27
  compiler_heuristics: 21
  anti_patterns: 16
op_wisdom:
  matmul:
    op_family: matmul
    tiling_guidance:
    - target_class: gpu
      tile_sizes:
      - 128
      - 128
      - 32
      rationale: Maximises tensor core utilisation on NVIDIA Ampere/Hopper; 128x128 output tile saturates the warp scheduler
        and 32-deep K tile fits comfortably in shared memory (~128 KB budget at fp16).
      source: CUTLASS
      confidence: high
    - target_class: gpu
      tile_sizes:
      - 64
      - 64
      - 32
      rationale: Better choice for medium-sized matrices (M,N < 2048) where 128x128 tiles cause wave quantisation waste.  Still
        fills tensor cores.
      source: Triton
      confidence: high
    - target_class: cpu
      tile_sizes:
      - 256
      - 256
      - 512
      rationale: Outer blocking targets L2 cache (256 KB - 1 MB per core).  The 256x256 output tile and 512-deep K panel stream
        through L1 in a GEBP micro-kernel pattern, matching MKL/BLIS designs.
      source: Exo/MKL
      confidence: high
    - target_class: cpu
      tile_sizes:
      - 6
      - 16
      rationale: 'Inner register block for AVX-512: 6 rows x 16 columns keeps 6 accumulators in ZMM registers (6 x 16 fp32
        = 6 ZMMs) with headroom for A and B panels.'
      source: Exo/MKL
      confidence: high
    - target_class: npu
      tile_sizes:
      - 16
      - 16
      - 16
      rationale: Matches common systolic array dimensions (16x16 PE grid).  Hardware accumulates a 16x16 output tile per cycle.
      source: Gemmini/Exo
      confidence: medium
    - target_class: npu
      tile_sizes:
      - 32
      - 32
      - 32
      rationale: Larger systolic arrays (32x32 PE grid) use this tile size; common on custom TPU-style accelerators.
      source: Gemmini/Exo
      confidence: medium
    fusion_opportunities:
    - pattern: matmul+bias+relu
      description: 'Epilogue fusion: bias addition and ReLU activation are folded into the matmul kernel, avoiding a separate
        memory-bound kernel launch and an extra round-trip to global memory for the intermediate result.'
      conditions:
      - Bias is broadcastable along the N dimension.
      - ReLU (or other pointwise) immediately follows bias addition.
      source: CUTLASS
      confidence: high
    - pattern: matmul+softmax
      description: 'Attention pattern: when matmul feeds directly into softmax (as in Q@K^T -> softmax), fusing avoids materialising
        the full N x N attention matrix in global memory.'
      conditions:
      - Second operand is attention scores (Q @ K^T result).
      - Softmax operates along the last dimension.
      source: cuDNN
      confidence: high
    layout_preferences:
    - target_class: gpu
      preferred_layout: NT (row-major A, col-major B)
      rationale: CUTLASS NT layout enables coalesced loads for both A (row-major, consecutive elements in K) and B (col-major,
        consecutive elements in K), maximising global memory bandwidth utilisation.
      source: CUTLASS
    - target_class: cpu
      preferred_layout: row-major A, row-major B (packed)
      rationale: 'Row-major storage with BLIS-style packing: B is packed into column-panels for sequential access in the micro-kernel.  Avoids
        TLB misses on large matrices.'
      source: BLIS/MKL
    backend_guidance:
    - target_class: gpu
      recommended_backend: Triton/CUTLASS
      conditions: fp16/bf16/tf32 operands, M*N*K > 2^18
      rationale: Tensor core utilisation via mma.sync; CUTLASS for peak throughput, Triton for faster iteration and fused
        epilogues.
      source: CUTLASS/Triton
    - target_class: cpu
      recommended_backend: Exo/MKL
      conditions: fp32/int8 operands, server-class CPU with AVX-512 or AMX
      rationale: Exo generates cache-tuned micro-kernels; MKL provides hand-optimised fallback with AMX int8/bf16 support.
      source: Exo/MKL
    - target_class: npu
      recommended_backend: accel dialect / Exo
      conditions: Systolic array target with custom ISA
      rationale: Accel dialect maps matmul to hardware matrix engine instructions; Exo generates explicit DMA + compute schedules.
      source: Gemmini/Exo
    pitfalls:
    - 'Bank conflicts in shared memory when tile sizes are not multiples of 32 (GPU): use padding or swizzled layouts to avoid
      32-bank conflicts.'
    - Register pressure with large tile sizes (e.g., 256x256 on GPU) causes spills to local memory, negating the benefit of
      tiling.
    - 'Wave quantisation waste: if grid_dim * block_size does not evenly divide the number of SMs, some waves run with partially-filled
      SMs.  Choose tile sizes so ceil(M/tile_M) * ceil(N/tile_N) is a multiple of the SM count.'
    - 'Incorrect K-tile alignment for tensor cores: K tile must be a multiple of 8 (fp16) or 4 (tf32) to use mma.sync instructions.'
    performance_bounds:
    - Compute-bound when arithmetic intensity (2*M*N*K / (M*K + K*N + M*N) * elem_size) exceeds the device's ops:byte ratio
      (e.g., ~200 ops/byte on A100 fp16).
    - Memory-bound for tall-skinny or short-fat matrices where one dimension is < 128.
    - 'Theoretical peak: 312 TFLOPS fp16 on A100, 989 TFLOPS fp8 on H100.'
  conv2d:
    op_family: conv2d
    tiling_guidance:
    - target_class: gpu
      tile_sizes:
      - 1
      - 64
      - 16
      - 16
      rationale: Tile over batch (1), output channels (64), and spatial dims (16x16).  Balances occupancy and shared memory
        usage for implicit GEMM on GPU.
      source: cuDNN
      confidence: high
    - target_class: cpu
      tile_sizes:
      - 1
      - 16
      - 14
      - 14
      rationale: Smaller spatial tiles fit L1 cache; 16 output channels match AVX-512 vector width for fp32.
      source: oneDNN
      confidence: high
    fusion_opportunities:
    - pattern: conv2d+batchnorm+relu
      description: 'Canonical CNN fusion: batch normalisation (scale + shift) and ReLU are folded into the convolution epilogue,
        eliminating two intermediate tensors.'
      conditions:
      - BatchNorm is in inference mode (running mean/var, no gradient).
      - ReLU (or ReLU6 / clamp) immediately follows BatchNorm.
      source: cuDNN/TensorRT
      confidence: high
    - pattern: conv2d+add (residual)
      description: ResNet-style residual addition fused into convolution output, avoiding an extra elementwise kernel.
      conditions:
      - Residual tensor has same shape as conv output.
      source: cuDNN
      confidence: high
    layout_preferences:
    - target_class: gpu
      preferred_layout: NHWC
      rationale: cuDNN's fastest convolution algorithms (implicit GEMM, Winograd) require NHWC.  Tensor cores expect channel-last
        layout.
      source: cuDNN
    - target_class: cpu
      preferred_layout: 'NCHW (blocked: nChw16c)'
      rationale: oneDNN uses blocked layout (nChw16c for AVX-512) for SIMD-friendly channel access while keeping spatial locality.
      source: oneDNN
    backend_guidance:
    - target_class: gpu
      recommended_backend: cuDNN / Triton
      conditions: Standard kernel sizes (1x1, 3x3, 5x5, 7x7), NHWC layout
      rationale: cuDNN auto-tunes algorithm selection (implicit GEMM, Winograd, FFT).  Triton for custom fused convolutions.
      source: cuDNN/Triton
    - target_class: cpu
      recommended_backend: oneDNN
      conditions: x86 CPU with AVX-512 or AMX
      rationale: oneDNN provides optimised JIT convolution kernels for Intel CPUs.
      source: oneDNN
    - target_class: npu
      recommended_backend: accel dialect
      conditions: Accelerator with conv/matmul engine
      rationale: Map to hardware convolution instructions via accel dialect.
      source: CompGen
    pitfalls:
    - Winograd convolution is only worthwhile for 3x3 and 5x5 kernels with stride 1; for other sizes the transform overhead
      exceeds the FLOPs saving.
    - 'im2col (explicit GEMM) has significant memory overhead: the im2col buffer is C_in * K_h * K_w times larger than the
      input spatial dims.'
    - 'Algorithm selection matters enormously: cuDNN''s auto-tuner can find 2-5x differences between algorithms for the same
      problem size.'
    - Depthwise convolution needs a completely different kernel strategy (per-channel); do not use the same tiling as standard
      convolution.
    performance_bounds:
    - Compute-bound for large batch sizes and high channel counts.
    - Memory-bound for depthwise and 1x1 pointwise convolutions.
    - Winograd reduces FLOPs by up to 2.25x for 3x3 (F(4x4, 3x3) transform) but adds transform overhead.
  attention:
    op_family: attention
    tiling_guidance:
    - target_class: gpu
      tile_sizes:
      - 64
      - 64
      rationale: FlashAttention tiles over sequence length in blocks of 64.  Each thread block computes a 64-token slice of
        Q against 64-token blocks of K/V, accumulating the softmax statistics in registers (online softmax).
      source: FlashAttention
      confidence: high
    - target_class: gpu
      tile_sizes:
      - 128
      - 128
      rationale: FlashAttention-2 uses larger tiles (128) for better tensor core utilisation on Hopper GPUs with larger shared
        memory.
      source: FlashAttention-2
      confidence: high
    fusion_opportunities:
    - pattern: Q@K^T -> scale -> softmax -> @V
      description: 'FlashAttention pattern: the entire multi-head attention computation is fused into a single kernel that
        never materialises the N x N attention matrix in global memory.  Uses online softmax (log-sum-exp tracking) to compute
        exact softmax in a single pass.'
      conditions:
      - Standard multi-head attention (Q, K, V with compatible shapes).
      - Causal or non-causal masking (both supported).
      - Head dimension is a power of 2 and <= 256.
      source: FlashAttention/Triton
      confidence: high
    - pattern: attention+dropout
      description: Dropout mask is generated and applied inside the fused attention kernel, avoiding materialisation of the
        dropout mask tensor.
      conditions:
      - Training mode with dropout probability > 0.
      source: FlashAttention
      confidence: high
    layout_preferences:
    - target_class: gpu
      preferred_layout: (batch, heads, seq_len, head_dim) contiguous
      rationale: FlashAttention expects Q, K, V in (B, H, S, D) layout with the last dimension contiguous for coalesced loads.
      source: FlashAttention
    backend_guidance:
    - target_class: gpu
      recommended_backend: Triton (FlashAttention)
      conditions: Sequence length > 128, head_dim in {64, 128}
      rationale: Triton FlashAttention kernel achieves near-peak memory bandwidth and avoids O(N^2) memory for the attention
        matrix.
      source: FlashAttention/Triton
    - target_class: cpu
      recommended_backend: fused attention kernel
      conditions: Inference with moderate sequence lengths
      rationale: CPU fused attention avoids materialising the attention matrix; block-wise computation fits in L2 cache.
      source: oneDNN/PyTorch
    pitfalls:
    - Naive attention materialises an O(N^2) intermediate matrix (seq_len x seq_len), causing OOM for long sequences (e.g.,
      8192+ tokens on 40 GB GPU).
    - 'Memory-bound for long sequences even with FlashAttention: total I/O scales as O(N^2 * d / M) where M is SRAM size.'
    - Causal masking requires careful handling in the tiled kernel to avoid wasted computation on masked-out tiles (skip fully-masked
      blocks).
    - 'Numerical precision: online softmax must track running max and log-sum-exp carefully to match the numerics of the unfused
      version.'
    performance_bounds:
    - Memory-bound for seq_len > 512 on most GPUs when not using FlashAttention.
    - 'FlashAttention is IO-aware: complexity is O(N^2 * d^2 / M) HBM accesses vs O(N^2 * d + N^2) for standard attention.'
    - Compute-bound with FlashAttention when head_dim is large (128+) and seq_len is moderate (< 2048).
  reduction:
    op_family: reduction
    tiling_guidance:
    - target_class: gpu
      tile_sizes:
      - 256
      rationale: 256-thread block for intra-block tree reduction using shared memory.  Warp-level reductions via __shfl_down_sync
        for the final 32 elements, then shared memory for cross-warp combination.
      source: Triton/CUDA handbook
      confidence: high
    - target_class: cpu
      tile_sizes:
      - 16
      rationale: 'SIMD horizontal reduction: reduce 16 fp32 elements (AVX-512) per instruction, then scalar reduction across
        lanes.'
      source: oneDNN
      confidence: high
    fusion_opportunities:
    - pattern: reduction+broadcast+elementwise
      description: 'Softmax pattern: reduce(max) -> subtract -> exp -> reduce(sum) -> divide.  Fusing the entire chain avoids
        multiple kernel launches and intermediate tensor allocations.'
      conditions:
      - Reduction and broadcast are along the same dimension.
      - Elementwise ops are between reductions.
      source: Triton/TVM
      confidence: high
    layout_preferences:
    - target_class: gpu
      preferred_layout: Reduce along contiguous (innermost) dimension
      rationale: Coalesced reads when reducing along the last dimension.  Reducing along non-contiguous dimensions requires
        a transpose or strided access.
      source: CUDA handbook
    backend_guidance:
    - target_class: gpu
      recommended_backend: Triton
      conditions: Any reduction axis, any dtype
      rationale: Triton's tl.reduce primitives generate efficient warp-shuffle and shared-memory reduction code.
      source: Triton
    - target_class: cpu
      recommended_backend: native vectorisation
      conditions: Reduction over contiguous axis
      rationale: LLVM auto-vectorises simple reductions effectively with -O3.
      source: LLVM/oneDNN
    pitfalls:
    - Cross-warp reduction on GPU requires __shfl instructions (warp shuffle); naive shared memory atomic approach causes
      serialisation.
    - Global atomics have severe contention for large grids; prefer a two-pass approach (per-block partial reduction, then
      final reduction kernel).
    - 'Softmax numerical stability: always subtract the row maximum before exp() to avoid overflow in fp16/bf16.'
    - Reduction along non-contiguous dimensions is much slower; consider transposing first if the reduction is the bottleneck.
    performance_bounds:
    - 'Reduction is almost always memory-bound: one pass over input data with minimal compute per element.'
    - Theoretical throughput limited by memory bandwidth / element_size.
  elementwise:
    op_family: elementwise
    tiling_guidance:
    - target_class: gpu
      tile_sizes:
      - 1024
      rationale: Block size of 1024 threads with vectorised loads (float4 / 128-bit).  Grid-stride loop over the full tensor.  Maximises
        memory bandwidth utilisation by keeping all SMs busy.
      source: Triton/CUDA
      confidence: high
    - target_class: cpu
      tile_sizes:
      - 64
      rationale: Process 64 elements per inner loop iteration (4 AVX-512 vectors of 16 fp32 elements) to hide instruction
        latency.
      source: oneDNN
      confidence: medium
    fusion_opportunities:
    - pattern: elementwise chain
      description: Always fuse consecutive elementwise operations (e.g., add -> relu, mul -> sigmoid, gelu = x * 0.5 * (1
        + erf(x/sqrt(2)))) into a single kernel to avoid redundant global memory round-trips.
      conditions:
      - All ops have compatible shapes (broadcasting allowed).
      source: TVM/XLA/Triton
      confidence: high
    - pattern: matmul epilogue
      description: Fuse elementwise ops (bias, activation, residual add) into the matmul epilogue rather than launching separate
        kernels.
      conditions:
      - Elementwise op immediately consumes matmul output.
      - No other consumer of the intermediate matmul result.
      source: CUTLASS/Triton
      confidence: high
    layout_preferences:
    - target_class: gpu
      preferred_layout: contiguous (any order, as long as innermost dim is contiguous)
      rationale: Elementwise ops only need coalesced access; layout order is irrelevant.
      source: Triton
    backend_guidance:
    - target_class: gpu
      recommended_backend: Triton or fused into matmul epilogue
      conditions: Any pointwise operation
      rationale: Standalone elementwise kernels in Triton are trivial to write; but prefer fusing into a producer kernel's
        epilogue when possible.
      source: Triton/CUTLASS
    - target_class: cpu
      recommended_backend: native vectorisation
      conditions: Any pointwise operation
      rationale: LLVM vectorises elementwise loops automatically with proper pragmas.
      source: LLVM
    pitfalls:
    - Do NOT launch a separate GPU kernel for a single elementwise op if it can be fused with its producer or consumer.  Kernel
      launch overhead (~5 us) dominates for small tensors.
    - Broadcasting can cause non-coalesced access if the broadcast dimension is the innermost one.  Materialise the broadcast
      explicitly for large tensors.
    - GELU and SiLU have expensive transcendental functions (erf, sigmoid); use polynomial approximations when fp16 precision
      is acceptable.
    performance_bounds:
    - 'Always memory-bound: arithmetic intensity is O(1) -- one op per element loaded.'
    - Peak throughput = memory_bandwidth / element_size.
    - Fusion is the ONLY lever for improving elementwise performance (turn memory-bound elementwise into part of a compute-bound
      fused kernel).
  transpose:
    op_family: transpose
    tiling_guidance:
    - target_class: gpu
      tile_sizes:
      - 32
      - 32
      rationale: '32x32 tile in shared memory: read a 32x32 tile with coalesced loads, transpose in shared memory, write back
        with coalesced stores.  Padding shared memory to 33 columns avoids bank conflicts.'
      source: CUDA handbook
      confidence: high
    fusion_opportunities:
    - pattern: transpose+matmul
      description: Avoid explicit transpose by using transposed GEMM variant (e.g., CUTLASS TN/NT layout).  The matmul kernel
        reads the matrix in transposed order directly.
      conditions:
      - Transpose feeds directly into a matmul operand.
      source: CUTLASS
      confidence: high
    layout_preferences: []
    backend_guidance:
    - target_class: gpu
      recommended_backend: Triton or vendor kernel
      conditions: Standalone transpose required
      rationale: Triton generates shared-memory-based transpose kernels.  Prefer fusing into consumer when possible.
      source: Triton
    - target_class: cpu
      recommended_backend: native (loop interchange)
      conditions: Any transpose
      rationale: Cache-oblivious recursive transpose or tiled copy.
      source: BLIS
    pitfalls:
    - Naive GPU transpose causes completely uncoalesced writes (or reads), reducing effective bandwidth by up to 10x.  Always
      use shared memory staging.
    - Permutations of more than 2 dimensions may require multiple passes or generalised copy kernels; check if a view/stride
      change suffices.
    performance_bounds:
    - 'Memory-bound: 2 * tensor_size bytes transferred (read + write).'
    - 'Achievable bandwidth: 80-90% of peak HBM bandwidth with shared memory staging.'
  gather:
    op_family: gather
    tiling_guidance: []
    fusion_opportunities: []
    layout_preferences: []
    backend_guidance:
    - target_class: gpu
      recommended_backend: custom Triton kernel
      conditions: Irregular index patterns
      rationale: Triton's tl.load with mask handles irregular gather patterns.  No vendor library covers the general case
        well.
      source: Triton
    - target_class: cpu
      recommended_backend: native loops
      conditions: Any gather/scatter
      rationale: AVX-512 has vpgatherdd/vpscatterdd but throughput is limited; scalar loops may be faster for irregular patterns.
      source: Intel intrinsics guide
    pitfalls:
    - Irregular access patterns defeat caching and vectorisation.  Pre-sort indices when possible to improve spatial locality.
    - Scatter with duplicate indices has undefined order; use atomic operations or segment-based reduction for correctness.
    - GPU gather/scatter is limited by L2 cache hit rate on the index pattern.  Random indices achieve only 10-20% of peak
      bandwidth.
    performance_bounds:
    - Throughput depends entirely on index pattern locality.
    - 'Best case (sequential indices): approaches memcpy bandwidth.'
    - 'Worst case (random indices): limited by cache line fetch rate.'
  batch_norm:
    op_family: batch_norm
    tiling_guidance:
    - target_class: gpu
      tile_sizes:
      - 256
      rationale: Reduce over spatial dimensions (H, W) and batch (N) per channel.  One thread block per channel with 256 threads
        for the reduction.
      source: cuDNN
      confidence: high
    fusion_opportunities:
    - pattern: conv2d+batch_norm
      description: 'Fold BatchNorm into preceding convolution weights at inference time: W_fused = W * gamma / sqrt(var +
        eps), b_fused = (b - mean) * gamma / sqrt(var + eps) + beta.  Zero runtime cost.'
      conditions:
      - Inference mode (running statistics, no gradient).
      - Preceding op is conv2d or linear.
      source: cuDNN/TensorRT/oneDNN
      confidence: high
    - pattern: batch_norm+relu
      description: Fuse activation into the BatchNorm output pass.
      conditions:
      - ReLU or clamp immediately follows BatchNorm.
      source: cuDNN
      confidence: high
    layout_preferences:
    - target_class: gpu
      preferred_layout: NHWC
      rationale: Channel-last layout enables coalesced reduction over spatial dims.
      source: cuDNN
    backend_guidance:
    - target_class: gpu
      recommended_backend: cuDNN
      conditions: Standard batch normalisation
      rationale: cuDNN's fused BN kernels handle forward, backward, and inference.
      source: cuDNN
    - target_class: cpu
      recommended_backend: oneDNN
      conditions: Standard batch normalisation
      rationale: oneDNN provides optimised BN with SIMD reduction.
      source: oneDNN
    pitfalls:
    - Training BN requires two passes (mean, then variance) unless using Welford's online algorithm in a single pass.
    - Small batch sizes make BN statistics noisy; consider GroupNorm or LayerNorm.
    - 'BN is often the fusion boundary: always try to fold into preceding conv/linear.'
    performance_bounds:
    - 'Memory-bound: two passes over the activation tensor (compute stats, then normalise).'
    - 'Inference: can be completely eliminated by folding into preceding linear op.'
  layer_norm:
    op_family: layer_norm
    tiling_guidance:
    - target_class: gpu
      tile_sizes:
      - 256
      rationale: Reduce over the normalisation axis (typically the last dimension).  One thread block per token/sample with
        256 threads for the reduction.
      source: Triton/cuDNN
      confidence: high
    fusion_opportunities:
    - pattern: layer_norm+linear
      description: Fuse LayerNorm into the subsequent linear layer's prologue to avoid writing the normalised intermediate
        to global memory.
      conditions:
      - Linear immediately follows LayerNorm.
      source: Triton/Megatron-LM
      confidence: medium
    layout_preferences:
    - target_class: gpu
      preferred_layout: (..., D) with D contiguous
      rationale: Reduction over the last (contiguous) dimension is fastest.
      source: Triton
    backend_guidance:
    - target_class: gpu
      recommended_backend: Triton
      conditions: Standard layer normalisation
      rationale: Triton LayerNorm kernel with online Welford reduction.  Often fused with adjacent ops.
      source: Triton
    - target_class: cpu
      recommended_backend: oneDNN
      conditions: Standard layer normalisation
      rationale: oneDNN layer_normalization primitive with SIMD.
      source: oneDNN
    pitfalls:
    - LayerNorm with large hidden dimensions (e.g., 12288 in GPT-3) benefits from warp-level reduction; ensure enough threads
      per block.
    - 'RMSNorm (used in LLaMA) is cheaper: skip mean subtraction, only compute root-mean-square.  Do not use full LayerNorm
      when RMSNorm suffices.'
    performance_bounds:
    - 'Memory-bound: single pass over the normalisation dimension.'
    - Throughput limited by reduction bandwidth, not compute.
target_patterns:
  gpu:
  - target_class: gpu
    category: memory_hierarchy
    pattern_name: shared_memory_staging
    description: Stage data from global memory into shared memory (scratchpad) for reuse across threads within a thread block.  Amortises
      the cost of high-latency HBM reads over many compute operations.
    implementation_notes:
    - 'Allocate shared memory tile: __shared__ float tile[TILE_M][TILE_K].'
    - 'Cooperative load: each thread loads one or more elements from global memory.'
    - __syncthreads() before consuming the tile.
    - Pad shared memory to TILE_K+1 columns to avoid 32-bank conflicts.
    - 'Double-buffer: overlap next tile''s load with current tile''s compute.'
    source: CUTLASS/Triton
    confidence: high
  - target_class: gpu
    category: memory_hierarchy
    pattern_name: l2_persistent_kernels
    description: 'Persistent kernel design: launch exactly as many thread blocks as the GPU has SMs, and loop over work items
      within each block.  Improves L2 cache residency by keeping the working set in L2 across iterations.'
    implementation_notes:
    - Set grid_dim = num_SMs (or 2 * num_SMs for latency hiding).
    - 'Each block loops: while (tile_idx = atomicAdd(&counter, 1)) < total_tiles.'
    - Tile ordering (Hilbert curve or row-major) affects L2 hit rate.
    - Use cudaFuncSetAttribute to set max shared memory if needed.
    source: CUTLASS
    confidence: medium
  - target_class: gpu
    category: memory_hierarchy
    pattern_name: register_tiling
    description: Tile the innermost compute loop into registers.  Each thread computes a small output sub-tile (e.g., 8x8
      fp16 elements) entirely in registers, maximising arithmetic intensity before writing back.
    implementation_notes:
    - 'Declare register arrays: float acc[TM][TN] for the output sub-tile.'
    - Load A and B fragments into registers from shared memory.
    - 'Compute outer product: acc[i][j] += a[i] * b[j] in the inner loop.'
    - 'Monitor register usage: NVIDIA GPUs have 256 32-bit registers per thread; exceeding this causes spills to local memory.'
    source: CUTLASS/Triton
    confidence: high
  - target_class: gpu
    category: parallelism
    pattern_name: output_tile_mapping
    description: Map each thread block to one output tile.  The 2D grid covers the output matrix (or tensor), and each block
      computes its tile by iterating over the reduction (K) dimension.
    implementation_notes:
    - grid_dim = (ceil(M/TILE_M), ceil(N/TILE_N)).
    - block_dim = (WARP_M * 32, WARP_N) where warps tile the output tile.
    - K-loop is sequential within each block.
    - For batched ops, add a third grid dimension for the batch.
    source: CUDA programming guide
    confidence: high
  - target_class: gpu
    category: parallelism
    pattern_name: warp_cooperative_ops
    description: Use warp-level matrix operations (mma.sync / WMMA) to exploit tensor cores.  Multiple threads in a warp cooperatively
      compute a small matrix multiply (e.g., 16x16x16).
    implementation_notes:
    - Use nvcuda::wmma or inline PTX mma.sync.aligned.m16n8k16.
    - 'Fragment types: matrix_a (row_major), matrix_b (col_major), accumulator.'
    - Each warp computes one fragment-sized output; warps tile the thread block's output.
    - 'Supported types: fp16, bf16, tf32, int8, fp8 (Hopper).'
    source: NVIDIA PTX guide
    confidence: high
  - target_class: gpu
    category: parallelism
    pattern_name: wave_quantisation
    description: Choose grid dimensions so that the total number of thread blocks is a multiple of the number of SMs.  Partial
      waves (the last wave with fewer blocks than SMs) waste GPU resources.
    implementation_notes:
    - Compute num_blocks = ceil(M/TILE_M) * ceil(N/TILE_N).
    - Adjust TILE_M, TILE_N so num_blocks % num_SMs == 0 (or close to 0).
    - For small problems, consider reducing tile sizes to fill more SMs.
    - A100 has 108 SMs; H100 has 132 SMs.  Target multiples of these.
    source: CUDA programming guide
    confidence: high
  - target_class: gpu
    category: data_movement
    pattern_name: async_copy
    description: Use cp.async (Ampere+) to overlap global-to-shared-memory copies with computation.  The copy bypasses L1
      cache and runs in the background while the SM executes math instructions.
    implementation_notes:
    - Use cp.async.cg.shared.global for 16-byte copies.
    - Group copies with cp.async.commit_group and cp.async.wait_group.
    - 'Combine with double buffering: compute on buffer 0 while loading buffer 1.'
    - Hopper TMA (Tensor Memory Accelerator) further automates this.
    source: CUTLASS/CUDA toolkit
    confidence: high
  - target_class: gpu
    category: data_movement
    pattern_name: double_buffering
    description: Allocate two shared memory buffers.  While the kernel computes on one buffer, the next tile is being loaded
      into the other.  Hides memory latency behind compute.
    implementation_notes:
    - Declare smem[2][TILE_M][TILE_K] for double buffering.
    - 'Iteration i: compute on smem[i % 2], load into smem[(i+1) % 2].'
    - 'Requires careful sync: __syncthreads() between compute and next load.'
    - Increases shared memory usage by 2x; ensure it fits in the SM budget.
    source: CUTLASS
    confidence: high
  - target_class: gpu
    category: data_movement
    pattern_name: l1_prefetch
    description: Prefetch data into L1 cache for subsequent access.  Useful when access patterns are predictable but shared
      memory staging is not needed.
    implementation_notes:
    - Use __ldg() for read-only data (uses texture cache path on some arches).
    - LDG.128 (128-bit loads) maximise bandwidth utilisation.
    - 'Cache hints: prefetch.global.L1 for data needed soon.'
    source: CUDA toolkit
    confidence: medium
  - target_class: gpu
    category: instruction_selection
    pattern_name: tensor_core_mma
    description: Select tensor core instructions (mma.sync) for matrix multiply-accumulate operations in fp16, bf16, tf32,
      int8, or fp8.  Delivers 2-16x higher throughput than CUDA cores for supported types.
    implementation_notes:
    - 'fp16 mma.sync.aligned.m16n8k16: 256 FLOPs per instruction per warp.'
    - 'tf32 mma: use float inputs truncated to tf32 for 8x throughput with ~fp16 accuracy.'
    - 'int8 mma: for quantised inference, 2x throughput over fp16.'
    - 'Hopper fp8 (e4m3/e5m2): 2x throughput over fp16 mma.'
    source: NVIDIA PTX guide
    confidence: high
  - target_class: gpu
    category: instruction_selection
    pattern_name: vector_loads
    description: Use 128-bit vector loads (LDG.128) to maximise memory bandwidth.  Each load fetches 4 fp32 or 8 fp16 elements
      in one transaction.
    implementation_notes:
    - Align data to 16 bytes for LDG.128.
    - Use float4 or half8 types for 128-bit loads.
    - Ensure consecutive threads access consecutive 128-bit words for coalescing.
    source: NVIDIA PTX guide
    confidence: high
  - target_class: gpu
    category: instruction_selection
    pattern_name: fma_instructions
    description: Use fused multiply-add (FMA) instructions for better accuracy and throughput.  One FMA = 2 FLOPs with a single
      rounding.
    implementation_notes:
    - 'CUDA FMA: fmaf(a, b, c) or __fmaf_rn(a, b, c).'
    - Most compilers emit FMA automatically; verify with SASS disassembly.
    - FMA count is the basis for roofline peak FLOPS calculations.
    source: NVIDIA PTX guide
    confidence: high
  cpu:
  - target_class: cpu
    category: memory_hierarchy
    pattern_name: l1_tiling
    description: Tile innermost loops so the working set fits in L1 cache (32-64 KB per core).  For matmul, this means the
      micro-kernel's A panel and B panel must fit in L1.
    implementation_notes:
    - 'Typical L1 tile: 6 rows of A (6 * K * 4B) + one column-panel of B (K * 16 * 4B).'
    - 'Total: ~(6 + 16) * K * 4B; for K=512, this is ~44 KB -- fits in 48 KB L1d.'
    - Access pattern must be sequential to benefit from hardware prefetcher.
    - Align tiles to cache line boundaries (64 bytes).
    source: oneDNN/BLIS
    confidence: high
  - target_class: cpu
    category: memory_hierarchy
    pattern_name: l2_tiling
    description: Tile outer loops so the working set fits in L2 cache (256 KB - 1 MB per core).  The GEBP (General Block Panel)
      pattern keeps a block of A in L2 while streaming panels of B through.
    implementation_notes:
    - 'GEBP: A block is MC x KC, B panel is KC x NC.'
    - MC * KC * elem_size should fit in L2 (e.g., 256 * 512 * 4B = 512 KB).
    - Iterate over NC-wide panels of B, reusing A block from L2.
    - Pack A and B into contiguous buffers for sequential access.
    source: BLIS/Exo
    confidence: high
  - target_class: cpu
    category: memory_hierarchy
    pattern_name: register_blocking
    description: Block the micro-kernel to use all available SIMD registers as accumulators.  For AVX-512, this means filling
      32 ZMM registers with output tiles.
    implementation_notes:
    - 'AVX-512: 32 ZMM registers, each holding 16 fp32 or 32 bf16 elements.'
    - 'Typical micro-kernel: 6x16 (6 rows x 16 cols = 6 ZMM accumulators), leaving registers for A and B fragments.'
    - 'AMX: 8 tile registers of 16x16 bytes each; use for int8/bf16 matmul.'
    - Register blocking is the innermost tiling level.
    source: Exo/oneDNN
    confidence: high
  - target_class: cpu
    category: parallelism
    pattern_name: openmp_outer_parallel
    description: Parallelise outer loops with OpenMP.  Each thread gets a chunk of the output to compute independently, minimising
      synchronisation.
    implementation_notes:
    - '#pragma omp parallel for schedule(static) on the outermost loop.'
    - Chunk size should give each thread at least one L2 tile.
    - 'Avoid false sharing: ensure thread-local output tiles are on separate cache lines.'
    - Thread count = number of physical cores (not hyperthreads) for compute-bound work.
    source: oneDNN/MKL
    confidence: high
  - target_class: cpu
    category: parallelism
    pattern_name: simd_vectorisation
    description: Vectorise inner loops with SIMD instructions (AVX-512, AVX2, NEON).  Process multiple data elements per instruction
      cycle.
    implementation_notes:
    - 'AVX-512: 16 fp32 elements per instruction (512 bits).'
    - 'AVX2: 8 fp32 elements per instruction (256 bits).'
    - 'ARM NEON/SVE: 4-16 fp32 elements depending on vector length.'
    - Use intrinsics or let the compiler auto-vectorise with -O3 -march=native.
    - Ensure loop trip count is a multiple of vector width (or add remainder loop).
    source: oneDNN/MKL
    confidence: high
  - target_class: cpu
    category: parallelism
    pattern_name: numa_aware_allocation
    description: Allocate data on the NUMA node where it will be consumed.  Cross-node memory access has 2-3x higher latency
      and lower bandwidth.
    implementation_notes:
    - Use numactl --membind or libnuma's numa_alloc_onnode().
    - 'First-touch policy: initialise data on the thread that will use it.'
    - For multi-socket systems, partition work so each socket operates on local memory.
    - Check topology with numactl -H or hwloc.
    source: oneDNN
    confidence: high
  - target_class: cpu
    category: data_movement
    pattern_name: software_prefetch
    description: Issue software prefetch instructions to bring data into cache before it is needed, hiding memory latency
      for predictable access patterns.
    implementation_notes:
    - _mm_prefetch(ptr, _MM_HINT_T0) for L1 prefetch.
    - _mm_prefetch(ptr, _MM_HINT_T1) for L2 prefetch.
    - Prefetch 2-4 cache lines ahead of the current access.
    - Effective for sequential and strided access; useless for random access.
    source: BLIS/MKL
    confidence: medium
  - target_class: cpu
    category: data_movement
    pattern_name: cache_line_alignment
    description: Align data structures and allocation boundaries to cache line size (typically 64 bytes) to avoid false sharing
      and partial cache line loads.
    implementation_notes:
    - Use aligned_alloc(64, size) or posix_memalign(&ptr, 64, size).
    - Pad structure members to 64-byte boundaries for thread-local data.
    - Matrix leading dimensions should be multiples of 16 (64B / 4B per float).
    source: BLIS/oneDNN
    confidence: high
  - target_class: cpu
    category: data_movement
    pattern_name: matrix_packing
    description: Pack matrices into contiguous buffers with the micro-kernel's access pattern.  Converts arbitrary stride
      layouts into sequential access, eliminating TLB misses on large matrices.
    implementation_notes:
    - Pack B into column-panels of width NR (e.g., 16 for AVX-512).
    - Pack A into row-panels of height MR (e.g., 6 for the 6x16 micro-kernel).
    - Packing is O(N^2) for an NxN matrix; amortised over the O(N^3) compute.
    - Pack into pre-allocated buffers to avoid allocation overhead.
    source: BLIS/MKL
    confidence: high
  - target_class: cpu
    category: instruction_selection
    pattern_name: avx512_fp32
    description: Use AVX-512 instructions for fp32 computation.  Process 16 fp32 elements per instruction with ZMM registers.
    implementation_notes:
    - 'vfmadd231ps: fused multiply-add, 16 FLOPs per instruction.'
    - vmovups/vmovaps for 512-bit loads/stores.
    - vbroadcastss for scalar broadcast into ZMM register.
    - 'Throughput: 2 FMA per cycle on Skylake-X and later (64 FLOPs/cycle/core).'
    source: Exo/oneDNN
    confidence: high
  - target_class: cpu
    category: instruction_selection
    pattern_name: amx_matmul
    description: Use Intel AMX (Advanced Matrix Extensions) for int8 and bf16 matrix multiply.  Each TDPB* instruction computes
      a 16x16 tile in one cycle.
    implementation_notes:
    - 8 tile registers (tmm0-tmm7), each 16 rows x 64 bytes (16x16 int32 accumulator).
    - 'TDPBSSD: int8 matmul with int32 accumulation.'
    - 'TDPBF16PS: bf16 matmul with fp32 accumulation.'
    - Requires explicit tile configuration via LDTILECFG.
    - Available on Sapphire Rapids and later.
    source: Exo/oneDNN
    confidence: high
  npu:
  - target_class: npu
    category: memory_hierarchy
    pattern_name: explicit_scratchpad
    description: NPU/accelerator local memory is a software-managed scratchpad, not a hardware cache.  All data movement must
      be explicitly programmed via DMA or load/store instructions.
    implementation_notes:
    - Scratchpad sizes are typically 64 KB - 512 KB per PE or cluster.
    - Partition scratchpad into input buffer, output buffer, and weight buffer.
    - Size each buffer to hold exactly one tile of the computation.
    - 'No cache coherence: software must manage consistency.'
    source: Gemmini/Exo
    confidence: high
  - target_class: npu
    category: memory_hierarchy
    pattern_name: dma_data_movement
    description: Use DMA engines for bulk data transfer between main memory and scratchpad.  DMA runs independently of the
      compute units, enabling overlap of data movement and computation.
    implementation_notes:
    - 'Configure DMA: src_addr, dst_addr, transfer_size, stride, padding.'
    - 2D DMA for strided access (e.g., extracting a tile from a larger matrix).
    - DMA completion is signalled via interrupt or polling a status register.
    - Tile sizes must account for DMA setup overhead (~100-1000 cycles).
    source: Gemmini/Exo
    confidence: high
  - target_class: npu
    category: memory_hierarchy
    pattern_name: software_managed_cache
    description: Some accelerators provide a software-managed cache (SMC) that behaves like a scratchpad with cache-like lookup.  Requires
      explicit allocate/invalidate but supports flexible reuse patterns.
    implementation_notes:
    - Allocate cache lines explicitly for tiles that will be reused.
    - Invalidate after use to free space for new tiles.
    - Useful for irregular access patterns where pure scratchpad is wasteful.
    source: Exo
    confidence: low
  - target_class: npu
    category: parallelism
    pattern_name: systolic_array_mapping
    description: 'Map matrix multiply onto a systolic array: data flows through a 2D grid of processing elements (PEs), with
      each PE performing a multiply-accumulate and forwarding data to its neighbour.'
    implementation_notes:
    - 'Output-stationary: each PE accumulates one output element.'
    - 'Weight-stationary: each PE holds one weight, inputs flow through.'
    - 'Row-stationary: each PE processes one row of the output.'
    - Tile sizes must match the PE array dimensions (e.g., 16x16 or 32x32).
    - Underutilisation when problem dimensions do not divide array dimensions.
    source: Gemmini
    confidence: high
  - target_class: npu
    category: parallelism
    pattern_name: pe_utilisation
    description: 'Maximise PE array utilisation by choosing tile sizes that fill the array.  Partial tiles waste compute:
      a 10x10 problem on a 16x16 array uses only 39% of PEs.'
    implementation_notes:
    - Pad matrices to multiples of the array dimension when possible.
    - For non-square problems, consider remapping to better fill the array.
    - 'Monitor utilisation: effective_ops / peak_ops ratio.'
    - Pipeline multiple tiles through the array for throughput.
    source: Gemmini
    confidence: high
  - target_class: npu
    category: parallelism
    pattern_name: pipeline_stages
    description: 'Pipeline the computation into stages: load, compute, store.  Each stage operates on a different tile, achieving
      steady-state throughput where all units are busy.'
    implementation_notes:
    - 'Three-stage pipeline: DMA_in[i+1] | Compute[i] | DMA_out[i-1].'
    - Requires at least 3 tile buffers in scratchpad (triple buffering).
    - Steady-state throughput = max(DMA_time, compute_time) per tile.
    - Pipeline fill and drain add latency for small workloads.
    source: Gemmini/Exo
    confidence: high
  - target_class: npu
    category: data_movement
    pattern_name: dma_double_buffering
    description: Overlap DMA transfers with computation using double buffering.  While the accelerator computes on buffer
      A, DMA loads the next tile into buffer B, and vice versa.
    implementation_notes:
    - 'Allocate 2x scratchpad space: buffer[0] and buffer[1].'
    - 'Iteration i: compute(buffer[i%2]), DMA_load(buffer[(i+1)%2]).'
    - 'Synchronise: wait for DMA completion before computing on new buffer.'
    - Effective when compute_time >= DMA_time (compute-bound regime).
    source: Exo/Gemmini
    confidence: high
  - target_class: npu
    category: data_movement
    pattern_name: explicit_address_computation
    description: Compute scratchpad addresses explicitly in software.  There is no hardware address translation (no TLB, no
      virtual memory).
    implementation_notes:
    - Base address + row * stride + col * element_size.
    - Account for padding/alignment requirements of the DMA engine.
    - Tile layout in scratchpad may differ from layout in main memory.
    - Exo's memory-aware scheduling handles this automatically.
    source: Exo
    confidence: high
  - target_class: npu
    category: data_movement
    pattern_name: blocking_for_local_memory
    description: Choose tile sizes so each tile fits in the accelerator's local memory.  The tile must include input, output,
      and any intermediate buffers.
    implementation_notes:
    - Available = scratchpad_size - firmware_reserved.
    - Tile memory = input_tile + output_tile + weight_tile (for matmul).
    - 'If double buffering: 2 * tile_memory <= available.'
    - Iterate over tiles in an order that maximises data reuse.
    source: Exo/Gemmini
    confidence: high
  - target_class: npu
    category: instruction_selection
    pattern_name: matrix_engine_instructions
    description: Use the accelerator's custom matrix engine instructions (e.g., Gemmini's mvin/mvout/compute, Google TPU's
      MXU ops) for matrix multiply.
    implementation_notes:
    - 'Instructions are typically: load_to_accumulator, matmul_accumulate, store_from_accumulator.'
    - Operand sizes must match the hardware array dimensions.
    - Accumulator precision is usually higher than input precision (e.g., int8 -> int32).
    - Some engines require explicit accumulator initialisation.
    source: Gemmini/Exo
    confidence: high
  - target_class: npu
    category: instruction_selection
    pattern_name: config_state_management
    description: Many accelerators require explicit configuration of compute mode, precision, and layout before issuing compute
      instructions.
    implementation_notes:
    - 'Config instruction sets: dataflow mode, activation function, precision.'
    - Configuration changes have latency; batch operations with the same config.
    - Save/restore config state when switching between op types.
    - Exo platform definitions encode legal configurations.
    source: Exo/Gemmini
    confidence: medium
