kernel_wisdom:
- library: cutlass
  topic: threadblock_tile_sizes
  insight: Use 128x128, 128x256, or 256x128 threadblock tiles for large GEMMs. Fall back to 64x64 for small or skinny GEMMs.
    Warp tiles of 32x32 or 64x32 map well to tensor core shapes.
  conditions:
  - GEMM problem size >= 512 in each dimension for large tiles
  confidence: high
- library: cutlass
  topic: epilogue_fusion
  insight: Fuse bias addition, activation functions (relu, gelu, silu), and residual add into the GEMM epilogue to avoid separate
    kernel launches and redundant global memory traffic.
  conditions:
  - Epilogue ops are element-wise or row-broadcast
  confidence: high
- library: cutlass
  topic: persistent_kernels
  insight: Persistent kernels keep thread blocks alive across multiple output tiles, improving SM utilization by amortizing
    launch overhead and enabling software-managed scheduling. Crucial for small problem sizes that would otherwise under-occupy
    the GPU.
  conditions:
  - CUTLASS 3.x or later
  - Problem size small enough to under-occupy SMs
  confidence: high
- library: cutlass
  topic: swizzle_patterns
  insight: Swizzle patterns remap thread IDs to data elements to avoid shared memory bank conflicts. A 128B swizzle aligns
    128-byte access patterns across threads in a warp.
  conditions:
  - Shared memory used for tile staging
  confidence: high
- library: cutlass
  topic: pipeline_stages
  insight: Use 2-4 asynchronous copy pipeline stages (cp.async / TMA) to overlap global-to-shared memory transfers with MMA
    computation. More stages hide more latency but consume more shared memory.
  conditions:
  - Ampere or later GPU architecture
  confidence: high
- library: cutlass
  topic: mixed_precision
  insight: Use fp16 or bf16 for compute operands with fp32 accumulator to prevent error accumulation in large reductions.
    The tensor core natively supports this mixed-precision mode.
  conditions:
  - Tensor core capable GPU
  - Acceptable accuracy trade-off
  confidence: high
- library: cutlass
  topic: warp_specialization
  insight: 'In CUTLASS 3.x, warps within a CTA can be specialized for different roles: producer warps issue TMA loads while
    consumer warps execute MMA, enabling a pipelined producer-consumer overlap.'
  conditions:
  - Hopper architecture (sm_90+)
  - CUTLASS 3.x
  confidence: high
- library: cutlass
  topic: split_k
  insight: For skinny GEMMs (small M or N, large K), split the K dimension across multiple thread blocks and accumulate partial
    results, trading extra memory for higher parallelism.
  conditions:
  - M or N < ~256 and K >> M*N
  confidence: medium
- library: cudnn
  topic: algorithm_selection
  insight: cuDNN provides multiple algorithms for each operation (IMPLICIT_GEMM, IMPLICIT_PRECOMP_GEMM, GEMM, FFT, WINOGRAD,
    WINOGRAD_NONFUSED). Profile all and pick the fastest for each specific input shape -- there is no single best algorithm.
  conditions:
  - Shape known at compile time or amortized across iterations
  confidence: high
- library: cudnn
  topic: workspace_management
  insight: Allocate the workspace buffer once and reuse across layers. Some algorithms require O(N^2) workspace; pre-query
    max workspace to avoid repeated allocations.
  conditions:
  - Static graph with known shapes
  confidence: high
- library: cudnn
  topic: tensor_core_enforcement
  insight: Set CUDNN_TENSOR_OP_MATH explicitly to enable tensor core paths. Default math mode may not use tensor cores even
    when available.
  conditions:
  - Volta or later GPU
  - fp16 or bf16 data
  confidence: high
- library: cudnn
  topic: graph_api
  insight: cuDNN 8.x graph API builds an execution plan for an entire subgraph, enabling inter-kernel fusion and global optimization
    across multiple operations (e.g., conv + bias + relu + residual).
  conditions:
  - cuDNN 8.x or later
  - Subgraph of supported operations
  confidence: high
- library: cudnn
  topic: nhwc_preference
  insight: cuDNN tensor core kernels strongly prefer NHWC layout. Using NCHW forces a layout transpose or falls back to non-tensor-core
    paths.
  conditions:
  - Tensor core capable GPU
  confidence: high
- library: onednn
  topic: jit_code_generation
  insight: oneDNN JIT-compiles optimized kernels at runtime for specific tensor shapes and CPU features. This eliminates the
    need to ship pre-compiled variants for every shape.
  conditions:
  - x86 CPU with AVX2 or later
  confidence: high
- library: onednn
  topic: brgemm_primitive
  insight: The batch-reduce GEMM (BRGEMM) is oneDNN's universal building block. Convolutions, attention, and other ops are
    lowered to BRGEMM calls, amortizing optimization effort.
  conditions:
  - x86 CPU
  - AMX or AVX-512 available
  confidence: high
- library: onednn
  topic: memory_format_propagation
  insight: Let oneDNN choose optimal blocked formats (nChw16c, nChw8c, etc.) and propagate them through the graph. Inserting
    manual reorders at every op boundary destroys performance.
  conditions:
  - Graph of oneDNN-supported ops
  confidence: high
- library: onednn
  topic: post_ops_fusion
  insight: oneDNN supports appending post-ops (eltwise, sum, binary) to primitives. Fusing relu or residual add into convolution
    avoids separate passes over memory.
  conditions:
  - Post-op is element-wise or broadcast-compatible
  confidence: high
- library: triton
  topic: block_pointers
  insight: Block pointers (tl.make_block_ptr) enable the compiler to reason about structured memory access patterns and emit
    TMA instructions on Hopper. Prefer them over manual pointer arithmetic.
  conditions:
  - Hopper GPU for TMA
  - Regular access patterns
  confidence: high
- library: triton
  topic: dot_operand_placement
  insight: tl.dot requires both operands to reside in shared memory (or registers) on pre-Hopper architectures. Failing to
    stage operands to shared memory before tl.dot causes correctness issues or poor performance.
  conditions:
  - Pre-Hopper GPU (sm_80, sm_86)
  confidence: high
- library: triton
  topic: accumulator_dtype
  insight: Always use fp32 accumulators with fp16/bf16 inputs in tl.dot. fp16 accumulation over large K dimensions leads to
    catastrophic numerical errors.
  conditions:
  - K dimension > 256
  - fp16 or bf16 operands
  confidence: high
- library: triton
  topic: autotuning_knobs
  insight: Key autotuning parameters are BLOCK_M, BLOCK_N, BLOCK_K, num_warps, and num_stages. Sweep a grid of these; optimal
    values vary dramatically across shapes and GPUs.
  conditions:
  - Performance-critical kernel
  confidence: high
- library: triton
  topic: mask_handling
  insight: Use boolean masks for boundary conditions and pass other=0.0 to tl.load for safe out-of-bounds padding. Incorrect
    masking is the most common source of Triton kernel bugs.
  conditions:
  - Tensor dimensions not divisible by block size
  confidence: high
- library: triton
  topic: persistent_reduction
  insight: For reductions, keep partial results in registers across loop iterations instead of writing to shared memory. This
    turns a multi-pass algorithm into a single efficient pass.
  conditions:
  - Reduction dimension fits in register budget
  confidence: high
- library: exo
  topic: cursor_navigation
  insight: Use cursor-based navigation (proc.find(...) and cursor forwarding) for stable references to program points across
    transforms. Name-based references break when surrounding code changes.
  conditions:
  - Exo 2 or later
  confidence: high
- library: exo
  topic: schedule_libraries
  insight: Compose fine-grained scheduling primitives (split, reorder, stage_mem, set_memory, replace) into reusable scheduling
    functions that encapsulate target-specific patterns.
  conditions:
  - Reusable schedule across similar ops
  confidence: high
- library: exo
  topic: config_hoisting
  insight: Hoist stateful accelerator configuration instructions (e.g., Gemmini config_ld, config_matmul) out of hot loops
    to avoid redundant reconfiguration on every iteration.
  conditions:
  - Accelerator with stateful configuration registers
  confidence: high
- library: exo
  topic: replace_instruction
  insight: Define hardware instructions with semantic bodies (EXO instruction definitions), then use replace_all to match
    equivalent loop nest patterns in the scheduled code. This ensures the mapping from loops to instructions is semantics-preserving.
  conditions:
  - Target has custom instructions with known semantics
  confidence: high
compiler_heuristics:
- compiler: tvm
  topic: auto_scheduling
  heuristic: 'Start from a naive loop nest and apply a fixed sequence of sketch rules: multi-level tiling, fusion, cache read/write
    insertion, vectorization, and parallelization. Each rule generates candidate programs; a cost model prunes the search
    space.'
  conditions:
  - Using Ansor auto-scheduler
  confidence: high
- compiler: tvm
  topic: cost_model
  heuristic: Train an XGBoost model on profiled program features (loop structure, memory access patterns, arithmetic intensity)
    to predict kernel runtime. Transfer-learning from similar workloads reduces measurement budget on new targets.
  conditions:
  - AutoTVM or Ansor with profiling data
  confidence: high
- compiler: tvm
  topic: operator_fusion
  heuristic: Classify ops as injective, reduction, or complex. Fuse injective ops greedily into their consumers. Fuse elementwise
    ops into the epilogue of reductions. Never fuse two reductions unless they share the same reduction axis.
  conditions:
  - Relay or Relax graph-level optimization
  confidence: high
- compiler: tvm
  topic: layout_transformation
  heuristic: Insert explicit layout_transform ops at boundaries between subgraphs with different preferred layouts (e.g.,
    NCHW for compute, NCHWc for vectorized inner kernel). Run a global pass to minimize total transformation cost.
  conditions:
  - Heterogeneous layout preferences across ops
  confidence: medium
- compiler: tvm
  topic: dynamic_shapes
  heuristic: Use symbolic shape variables with declared upper bounds. Pad tensors to the upper bound at kernel boundaries
    and mask out padding. This keeps the kernel code static while handling dynamic input sizes.
  conditions:
  - Dynamic batch size or sequence length
  confidence: medium
- compiler: tvm
  topic: schedule_templates
  heuristic: Define a schedule template that encodes the high-level structure (number of tile levels, parallelism strategy)
    and leave tile sizes, unroll factors, and vectorization widths as tunable parameters. Search fills in the concrete values.
  conditions:
  - AutoTVM template-based tuning
  confidence: high
- compiler: halide
  topic: compute_at_vs_store_at
  heuristic: compute_at places a producer's computation inside a consumer's loop for fusion. store_at controls where the intermediate
    buffer is allocated. Use compute_at for fusion, and store_at at a coarser loop level when the producer's values are reused
    across consumer iterations.
  conditions:
  - Producer-consumer pair in a Halide pipeline
  confidence: high
- compiler: halide
  topic: bound_inference
  heuristic: Halide automatically infers the required input bounds for each stage by backward-propagating output bounds through
    the dependency graph. The compiler inserts boundary checks or clamping. Trust the inference rather than manually computing
    bounds.
  conditions:
  - Standard Halide pipeline
  confidence: high
- compiler: halide
  topic: sliding_window
  heuristic: For stencil computations, compute only the newly required rows of the producer as the consumer slides over the
    output. This reduces redundant computation from O(filter_size * output) to O(output).
  conditions:
  - Stencil/convolution with spatial reuse
  - Consumer iterates in order
  confidence: high
- compiler: halide
  topic: unroll_and_vectorize
  heuristic: Unroll small inner loops to expose instruction-level parallelism, then vectorize over the fastest-varying dimension
    (innermost contiguous). Unrolling the vectorized dimension itself wastes registers.
  conditions:
  - Inner loop trip count small and known at compile time
  confidence: high
- compiler: halide
  topic: split_reorder_parallelize
  heuristic: Split the outermost loop to create parallel tiles, reorder loops to place the parallel dimension outermost and
    the vectorizable dimension innermost. This is the canonical parallelization pattern.
  conditions:
  - Sufficient output size for parallelism
  confidence: high
- compiler: iree
  topic: flow_stream_hal
  heuristic: 'IREE decomposes execution into three levels: Flow (coarse-grained device placement and partitioning), Stream
    (fine-grained asynchronous ordering within a device), and HAL (hardware dispatch and resource management). Map high-level
    decisions to the appropriate level.'
  conditions:
  - IREE-based compilation pipeline
  confidence: high
- compiler: iree
  topic: tiling_heuristics
  heuristic: Tile to workgroup level first (mapping to GPU thread blocks or CPU threads), then tile again within each workgroup
    to distribute work across invocations. Workgroup tile sizes should match shared memory capacity; invocation tiles should
    match register file size.
  conditions:
  - GPU or multi-core CPU target
  confidence: high
- compiler: iree
  topic: buffer_planning
  heuristic: Perform lifetime analysis on stream-ordered commands and reuse buffers whose lifetimes do not overlap. This reduces
    peak memory without inserting unnecessary synchronization.
  conditions:
  - Static execution plan or bounded dynamic shapes
  confidence: high
- compiler: iree
  topic: dispatch_region_formation
  heuristic: Group ops into dispatch regions that execute together on one device. The grouping respects data dependencies
    and device affinity. Minimize the number of dispatches to reduce launch overhead.
  conditions:
  - IREE Flow dialect
  confidence: high
- compiler: iree
  topic: executable_caching
  heuristic: Compile each dispatch executable once and cache the resulting VMFB. On re-execution, load from cache to skip
    compilation. Keyed by source hash, target triple, and compilation flags.
  conditions:
  - Repeated execution of the same model
  confidence: high
- compiler: xla
  topic: operator_fusion
  heuristic: Fuse element-wise ops greedily into their consumers. Stop at reduction boundaries (reduce, reduce-window) because
    reductions change the parallelism structure. After fusion, each fused computation becomes a single HLO fusion instruction.
  conditions:
  - XLA HLO optimization pipeline
  confidence: high
- compiler: xla
  topic: spmd_partitioning
  heuristic: Annotate tensors with sharding specs over a device mesh. The GSPMD partitioner propagates sharding through the
    graph and inserts all-gather, all-reduce, and reduce-scatter collectives at boundaries. Minimize cross-device communication
    by aligning sharding with computation locality.
  conditions:
  - Multi-device execution
  - TPU or multi-GPU
  confidence: high
- compiler: xla
  topic: memory_optimization
  heuristic: 'Schedule HLO instructions to minimize peak memory by using liveness analysis: free buffers as soon as their
    last consumer executes. Recomputation (rematerialization) trades compute for memory when peak is too high.'
  conditions:
  - Memory-constrained device (GPU, TPU)
  confidence: high
- compiler: xla
  topic: buffer_assignment
  heuristic: Share physical buffers between non-interfering logical buffers using an interference graph. Color the graph to
    minimize total memory. Respect alignment constraints and aliasing rules.
  conditions:
  - Static shape graph
  confidence: high
- compiler: xla
  topic: algebraic_simplification
  heuristic: 'Run algebraic simplifications early: constant folding, strength reduction (x * 2 -> x + x), dead computation
    elimination, and identity removal (add 0, multiply 1). These reduce graph size before expensive optimization passes.'
  conditions:
  - Any HLO graph
  confidence: high
anti_patterns:
- name: tile_too_small
  description: Choosing tile sizes that are too small causes launch overhead and loop control overhead to dominate useful
    computation. Each tile carries fixed costs (kernel launch, barrier setup, index math) that must be amortized over enough
    work.
  symptoms:
  - Kernel launch overhead dominates runtime profile
  - Low arithmetic intensity per tile
  - GPU occupancy is high but throughput is low
  fix: Increase tile sizes until compute-to-overhead ratio is favorable. For GPU, aim for at least 64x64 output tiles. Profile
    to confirm launch overhead is negligible.
  source: CUTLASS tuning guide / CUDA best practices
- name: tile_too_large
  description: Choosing tile sizes that are too large causes register spilling to local memory and shared memory overflow,
    both of which destroy performance. On CPUs, overly large tiles cause L1/L2 cache thrashing.
  symptoms:
  - High local memory (lmem) traffic in profiler
  - Shared memory allocation exceeds hardware limit (compilation failure)
  - Register spill count is non-zero in PTX/SASS analysis
  - L1 cache miss rate spikes on CPU
  fix: Reduce tile sizes to fit within shared memory budget and register file. Use occupancy calculator to verify. For CPU,
    tile to L1/L2 cache size.
  source: CUTLASS tuning guide / Triton autotuning
- name: fuse_across_reduction_without_sync
  description: Fusing operations across a reduction boundary without proper synchronization produces incorrect results. A
    reduction changes the parallelism structure; downstream ops depend on the fully reduced value.
  symptoms:
  - Numerical mismatches vs reference implementation
  - Results change with different thread counts or block sizes
  - Race conditions detected by compute-sanitizer
  fix: Insert a barrier or kernel boundary at reduction boundaries. Only fuse across a reduction if the fused kernel correctly
    implements the two-phase reduction pattern (partial + final).
  source: TVM fusion rules / XLA fusion pass
- name: naive_transpose
  description: Transposing a matrix by directly swapping indices causes uncoalesced global memory access on GPUs. One of the
    two accesses (read or write) will stride across memory, reducing effective bandwidth by 8-32x.
  symptoms:
  - Global memory throughput far below peak bandwidth
  - High L2 sector-miss rate
  - Transpose kernel slower than expected for a memory-bound op
  fix: 'Use shared memory as a staging buffer: read a tile coalesced into shared memory, apply the transpose in shared memory
    (with padding to avoid bank conflicts), then write the tile coalesced to global.'
  source: CUDA transpose optimization guide
- name: materialize_attention_matrix
  description: Computing the full N x N attention matrix before applying softmax and V multiplication consumes O(N^2) memory,
    making it infeasible for long sequences and wasting memory bandwidth.
  symptoms:
  - Out-of-memory errors on long sequences (N > 2048)
  - Memory usage grows quadratically with sequence length
  - Attention computation dominates both time and memory
  fix: Use tiled attention (FlashAttention) to compute attention in blocks with O(N) memory. Fuse Q@K, softmax, and @V within
    each tile using online softmax.
  source: FlashAttention paper
- name: separate_elementwise_kernels
  description: Launching a separate GPU kernel for each elementwise operation (relu, add, mul, etc.) wastes kernel launch
    overhead and forces each intermediate result to round-trip through global memory.
  symptoms:
  - Many small kernels in profiler trace
  - Kernel launch overhead visible in timeline
  - Low compute utilization despite high SM activity
  - Memory bandwidth is the bottleneck for trivially compute-bound ops
  fix: Fuse chains of elementwise ops into a single kernel. Most compiler frameworks (TVM, XLA, Triton) do this automatically.
    For manual kernels, write a single kernel with a grid-stride loop.
  source: XLA fusion / TVM operator fusion
- name: unaligned_memory_access
  description: Issuing loads and stores at addresses that are not aligned to the access width (e.g., 128-bit loads at non-16-byte-aligned
    addresses) forces multiple memory transactions and can be 2-8x slower.
  symptoms:
  - Low global memory throughput despite high access volume
  - Excessive memory transactions per request in profiler
  - Performance cliff when tensor dimensions change slightly
  fix: Pad tensor dimensions to alignment boundaries (typically 128 bits / 16 bytes). Ensure base pointers are aligned. Use
    aligned load/store intrinsics when available.
  source: CUDA C++ Programming Guide / Triton best practices
- name: wrong_memory_space
  description: Keeping data in global memory when it could reside in shared memory or registers wastes bandwidth. Conversely,
    staging data to shared memory with no reuse just adds overhead.
  symptoms:
  - High global memory traffic for data that is reused within a block
  - Shared memory allocation for data accessed only once
  - Performance does not improve with shared memory staging
  fix: Stage to shared memory only when reuse factor > 1 across threads in a block. Keep scalars and per-thread accumulators
    in registers. Use the roofline model to determine whether you are bandwidth-bound.
  source: CUDA best practices / CUTLASS design
- name: missing_barrier
  description: Omitting __syncthreads() (or equivalent barrier) between shared memory writes and reads causes race conditions.
    Some threads read stale or partially written data.
  symptoms:
  - Non-deterministic numerical results across runs
  - Results differ between debug and release builds
  - compute-sanitizer reports hazards
  fix: Insert __syncthreads() after all threads have written to shared memory and before any thread reads from it. Minimize
    barriers by restructuring the algorithm to reduce shared memory communication points.
  source: CUDA C++ Programming Guide
- name: wave_quantization_waste
  description: If the grid (total thread blocks) is not a multiple of the number of SMs, the last wave has idle SMs. For small
    grids, this causes significant utilization loss.
  symptoms:
  - Achieved occupancy much lower than theoretical occupancy
  - GPU utilization drops for certain problem sizes
  - Performance cliff at specific batch sizes or tile configurations
  fix: Choose tile sizes so that the total number of blocks is a multiple of the SM count, or use persistent kernels that
    keep all SMs busy. Pad the grid if needed.
  source: CUDA occupancy analysis / CUTLASS persistent kernels
- name: over_parallelization
  description: Launching more threads than there is useful work creates idle warps that still consume scheduling resources.
    On CPUs, over-subscribing cores with threads adds context-switch overhead.
  symptoms:
  - Many threads with zero or trivial work in profiler
  - High warp stall rate due to insufficient work per warp
  - CPU performance degrades beyond optimal thread count
  fix: 'Size the grid to match the work: one thread block per output tile, one thread per element within the tile. On CPU,
    use thread count equal to physical core count, not logical.'
  source: CUDA best practices / oneDNN threading guide
- name: fp16_accumulation_instability
  description: Accumulating many fp16 values (e.g., a dot product over K > 256) in fp16 precision causes catastrophic loss
    of significance. The limited dynamic range and mantissa bits of fp16 make large sums inaccurate.
  symptoms:
  - Large numerical errors vs fp32 reference
  - Errors grow with K dimension or sequence length
  - Training diverges or evaluation metrics degrade
  fix: Use fp32 accumulators with fp16/bf16 operands. Tensor cores natively support this mixed-precision mode. For Triton,
    set acc_dtype=tl.float32 in tl.dot.
  source: NVIDIA mixed-precision guide / Triton best practices
- name: cache_thrashing_poor_tiling
  description: Tile sizes that do not align with cache line sizes or cache capacity cause repeated eviction and re-fetch of
    the same data (thrashing). This is especially severe for matrix operations with strided access.
  symptoms:
  - Cache miss rate far above expected for working set size
  - Performance varies non-monotonically with tile size
  - Hardware performance counters show high LLC misses
  fix: 'Tile to fit within the target cache level (L1: 32-64KB, L2: 256KB-1MB). Align tile boundaries to cache line size (64
    bytes). For matrices, tile both dimensions to keep the working set within cache.'
  source: Halide scheduling guide / oneDNN tuning
- name: dma_without_double_buffering
  description: Issuing DMA transfers synchronously (load, wait, compute, store) stalls the compute pipeline while waiting
    for data. Without double buffering or pipelining, compute and memory transfer cannot overlap.
  symptoms:
  - Compute unit idle time visible in profiler
  - Achieved throughput well below roofline for both compute and memory
  - Performance does not improve with faster compute
  fix: 'Use double or multi-buffering: while computing on buffer A, prefetch the next tile into buffer B. On GPUs, use cp.async
    with multiple pipeline stages. On NPUs, overlap DMA with systolic execution.'
  source: CUTLASS async pipeline / Gemmini double buffering
- name: single_device_placement
  description: Placing all operations on a single device in a multi-device system leaves other devices idle and may cause
    memory pressure on the overloaded device.
  symptoms:
  - Only one device shows utilization in system monitor
  - Out-of-memory on one device while others have free memory
  - Training/inference time scales linearly despite multiple devices
  fix: Partition the computation across devices using pipeline parallelism, tensor parallelism, or data parallelism. Use the
    solver-backed placement planner to minimize cross-device communication.
  source: XLA GSPMD / IREE multi-device
- name: excessive_synchronization
  description: Inserting unnecessary barriers or device synchronizations (e.g., cudaDeviceSynchronize after every kernel)
    serializes execution and prevents the hardware from overlapping independent work.
  symptoms:
  - Profiler shows large gaps between kernel launches
  - GPU utilization is low despite many kernels
  - Removing sync points speeds up execution significantly
  fix: 'Use fine-grained synchronization: CUDA events or stream ordering instead of device-wide sync. Only synchronize when
    there is a true data dependency between operations.'
  source: CUDA best practices / IREE stream dialect
