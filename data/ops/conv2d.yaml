op_family: conv2d
tiling_guidance:
- target_class: gpu
  tile_sizes:
  - 1
  - 64
  - 16
  - 16
  rationale: Tile over batch (1), output channels (64), and spatial dims (16x16).  Balances occupancy and shared memory usage
    for implicit GEMM on GPU.
  source: cuDNN
  confidence: high
- target_class: cpu
  tile_sizes:
  - 1
  - 16
  - 14
  - 14
  rationale: Smaller spatial tiles fit L1 cache; 16 output channels match AVX-512 vector width for fp32.
  source: oneDNN
  confidence: high
fusion_opportunities:
- pattern: conv2d+batchnorm+relu
  description: 'Canonical CNN fusion: batch normalisation (scale + shift) and ReLU are folded into the convolution epilogue,
    eliminating two intermediate tensors.'
  conditions:
  - BatchNorm is in inference mode (running mean/var, no gradient).
  - ReLU (or ReLU6 / clamp) immediately follows BatchNorm.
  source: cuDNN/TensorRT
  confidence: high
- pattern: conv2d+add (residual)
  description: ResNet-style residual addition fused into convolution output, avoiding an extra elementwise kernel.
  conditions:
  - Residual tensor has same shape as conv output.
  source: cuDNN
  confidence: high
layout_preferences:
- target_class: gpu
  preferred_layout: NHWC
  rationale: cuDNN's fastest convolution algorithms (implicit GEMM, Winograd) require NHWC.  Tensor cores expect channel-last
    layout.
  source: cuDNN
- target_class: cpu
  preferred_layout: 'NCHW (blocked: nChw16c)'
  rationale: oneDNN uses blocked layout (nChw16c for AVX-512) for SIMD-friendly channel access while keeping spatial locality.
  source: oneDNN
backend_guidance:
- target_class: gpu
  recommended_backend: cuDNN / Triton
  conditions: Standard kernel sizes (1x1, 3x3, 5x5, 7x7), NHWC layout
  rationale: cuDNN auto-tunes algorithm selection (implicit GEMM, Winograd, FFT).  Triton for custom fused convolutions.
  source: cuDNN/Triton
- target_class: cpu
  recommended_backend: oneDNN
  conditions: x86 CPU with AVX-512 or AMX
  rationale: oneDNN provides optimised JIT convolution kernels for Intel CPUs.
  source: oneDNN
- target_class: npu
  recommended_backend: accel dialect
  conditions: Accelerator with conv/matmul engine
  rationale: Map to hardware convolution instructions via accel dialect.
  source: CompGen
pitfalls:
- Winograd convolution is only worthwhile for 3x3 and 5x5 kernels with stride 1; for other sizes the transform overhead exceeds
  the FLOPs saving.
- 'im2col (explicit GEMM) has significant memory overhead: the im2col buffer is C_in * K_h * K_w times larger than the input
  spatial dims.'
- 'Algorithm selection matters enormously: cuDNN''s auto-tuner can find 2-5x differences between algorithms for the same problem
  size.'
- Depthwise convolution needs a completely different kernel strategy (per-channel); do not use the same tiling as standard
  convolution.
performance_bounds:
- Compute-bound for large batch sizes and high channel counts.
- Memory-bound for depthwise and 1x1 pointwise convolutions.
- Winograd reduces FLOPs by up to 2.25x for 3x3 (F(4x4, 3x3) transform) but adds transform overhead.
