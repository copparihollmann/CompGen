schema_version: model_admission_source_candidates_v1

# One row per real model_id. ``candidate_ref`` is a *proposed* HuggingFace
# repo identifier; ``python -m compgen.model_admission verify-sources`` will
# confirm each via HfApi().model_info() and rewrite configs/models/<id>.yaml
# with the canonical ref + revision SHA + source_verified=true on success.
#
# Edit candidate_ref to the correct upstream repo BEFORE running verify-sources
# if you know the right one. Empty / TO_BE_VERIFIED candidates are skipped.
#
# The verifier only does a single read-only API call per row -- no downloads.

candidates:
  - model_id: qwen3_vl_8b
    candidate_ref: Qwen/Qwen3-VL-8B-Instruct
    # FP8 / AWQ variants exist (Qwen3-VL-8B-Instruct-FP8 and -AWQ) but neither
    # works on a compute-capability 7.5 GPU like TITAN RTX. Keep BF16 here.

  - model_id: qwen3_vl_235b_a22b_instruct
    candidate_ref: Qwen/Qwen3-VL-235B-A22B-Instruct

  - model_id: qwen2_5_vl
    candidate_ref: Qwen/Qwen2.5-VL-7B-Instruct
    # AWQ variant exists (Qwen2.5-VL-7B-Instruct-AWQ) but its CPU kernel mis-shapes
    # and the GPU AWQ kernel needs newer CUDA. Keep BF16 here.

  - model_id: llava
    candidate_ref: llava-hf/llava-1.5-7b-hf

