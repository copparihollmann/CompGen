name: release

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Publish to TestPyPI instead of PyPI"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
      - name: Install dependencies
        run: uv sync --frozen
      - name: Resolve version
        id: version
        run: |
          version=$(uv run python -c "import compgen; print(compgen.__version__)")
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "compgen version: $version"
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF#refs/tags/v}"
            if [ "$tag" != "$version" ]; then
              echo "tag $tag does not match package version $version" >&2
              exit 1
            fi
          fi
      - name: Build
        run: uv build
      - name: Metadata check
        run: |
          uv run --with twine python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/**
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 10
    # Trusted Publishing: no stored PyPI token. The `pypi` / `testpypi`
    # environments must be configured on GitHub with the matching
    # publisher set up at https://pypi.org/manage/account/publishing/.
    environment:
      name: ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true') && 'testpypi' || 'pypi' }}
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to TestPyPI (dry run)
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist
      - name: Publish to PyPI
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
      - name: Create GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
