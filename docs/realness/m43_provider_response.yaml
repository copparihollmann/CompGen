forbidden:
- accepting a response without validating contract_hash match
- silently routing a fatal failure as recoverable
- letting an artifact path escape the sandboxed artifact_dir
- appending non-typed failure kinds to RECOVERABILITY (every key must bucket)
- crashing on malformed JSON instead of recording it as schema_invalid
- bypassing the attempt trail (every commit must append to attempts log)
- emitting a kernel certificate (M-45's job) before M-44 verification runs
