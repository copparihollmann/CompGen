claim: |
  M-43 (Phase C): the kernel-codegen provider protocol — a typed
  ``kernel_codegen_response_v1`` schema, a sandbox-enforcing
  validator, a commit tool that writes the attempt trail, and four
  MCP tools (emit, run, commit, inspect) — closes the kernel-codegen
  subagent loop end-to-end.

  Every provider response goes through ``commit_response`` which:

  1. Persists the response (even malformed) under
     ``04_kernel_codegen/attempts/<task_id>/attempt_<N>/response.json``.
  2. Validates against the M-42 task contract via
     ``validate_response``. Eleven typed failure_kind values bucketed
     into four recoverability classes (recoverable_provider_failure,
     provider_protocol_violation, transient,
     protocol_or_contract_fatal).
  3. Appends to the per-task attempts log
     ``kernel_codegen_attempts.json`` (append-only).
  4. Routes:
     - accept → ``verifier_pending`` (M-44 takes over when it lands).
     - recoverable failure → emits
       ``kernel_codegen_retry_request.json`` with typed feedback.
     - fatal failure → emits ``kernel_codegen_failure_report.json``
       as a ``downstream_retry_request_v1`` so M-15B picks it up.
     - 3 attempts exhausted → emits the same downstream-retry shape
       with ``failed_check=kernel_codegen_attempts_exhausted`` so
       the OUTER agent reconsiders the candidate.

  Sandbox enforcement is the load-bearing M-43 invariant: every
  ``response.artifacts[*]`` path MUST resolve under
  ``request.artifact_dir``. Absolute paths reject; ``../`` escapes
  reject. ``forbidden_path_write`` is unconditionally fatal.
