notes: |
  Phase C M-43. Real-driven stress test:

  Phase A — invalid JSON response. Submitted "not json" via the
  commit MCP. Result: failure_kind=schema_invalid,
  recoverability=recoverable_provider_failure, next_action=retry.
  ``kernel_codegen_retry_request.json`` emitted with typed
  suggested_fix.

  Phase B — contract_hash mismatch. Submitted a well-shaped response
  with a wrong contract_hash. Result: failure_kind=contract_hash_mismatch,
  recoverability=protocol_or_contract_fatal, next_action=fatal_reject.
  ``kernel_codegen_failure_report.json`` (downstream_retry_request_v1
  shape) emitted.

  Phase C — sandbox escape. Submitted artifacts pointing at absolute
  paths (/tmp/escape.c, /etc/passwd). Result:
  failure_kind=forbidden_path_write, immediate fatal. The validator
  rejected without writing or reading any of the rogue paths.

  Phase D — well-formed response. Submitted a real response with
  artifacts under the sandbox. Result: accepted=True,
  next_action=verifier_pending (awaiting M-44 + M-45).

  Phase E — final inspection. The append-only log shows all 4
  attempts in order, each with its typed status. The MCP inspect tool
  surfaces request, attempts (including the malformed one as a
  bounded-preview), attempts_log, retry_request, and failure_report.

  Bug surfaced + fixed by the stress test: ``_read_json_or_none`` in
  the MCP inspect tool initially crashed on a non-JSON
  ``response.json`` written by a rejected attempt. Now it degrades
  gracefully and the inspect view labels the response as
  ``{"_malformed": true, "preview": "..."}``.

  Caveat: M-44 (the verifier) is not yet implemented. Until it lands,
  ``next_action=verifier_pending`` is the most honest the commit
  tool can return on accept. M-45's certificate is not emitted by
  M-43; that's wired when both M-44 and M-45 land.

  M-43.1 follow-up: the ``compgen_run_kernel_codegen_task`` MCP tool
  currently returns ``operator_action_required=True`` for new tasks
  — the harness-driven Claude Code subagent spawn is wired in M-43.1
  (the parent MCP server gains an Agent-tool wrapper). The
  file-based protocol works without it (operator writes the response
  by hand or via any other path).

  Tests: 14 cases in test_kernel_codegen_response.py covering all
  failure-class buckets + attempt trail + accept path + MCP inspect
  + recoverability-table-completeness invariant.
