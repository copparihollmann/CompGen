claim: |
  M-57 (Phase D): the kernel-codegen pipeline now runs a multi-bidder
  auction over ``KernelContractV3`` between every applicable provider.
  Default mode is ``multi-bidder``: collect bids from all applicable
  providers, fulfil top-K (default 3), verify each via M-44, emit M-45
  certificate per verified bid, and select the winner by
  ``perf_estimate_us``. The winner is promoted into the standard M-43
  response location so M-46+ work unchanged.

  Hard contract:

  1. ``run_kernel_auction(run_dir, *, mode, bid_cutoff, registry=None)``
     in ``graph_compilation/kernel_auction.py`` is the orchestrator.
     Mode in ``{"multi-bidder", "first-fit", "disabled"}``;
     ``"disabled"`` is a strict no-op (today's M-43 commit path
     remains canonical). The CLI flag ``--auction-mode`` defaults to
     ``"multi-bidder"`` and ``--bid-cutoff`` defaults to 3.
  2. New ``--stop-after kernel-auction`` boundary lands the auction
     report without proceeding to M-46. Existing
     ``--stop-after kernel-codegen-request`` is unchanged.
  3. Artifact layout under
     ``04_kernel_codegen/auction/<task_id>/``:
     ``fulfilled/<provider_name>/{kernel.<ext>, kernel_metadata.json,
     launch_config.json, provider_claims.json}``,
     ``verified/<provider_name>/<provider_name>.certificate.json``,
     ``auction_report.json`` (schema ``auction_report_v1``),
     ``winner.json``, ``runners_up.json``.
  4. ``CReferenceProvider`` (``kernels/providers/c_reference.py``) is
     an in-tree always-on baseline: deterministic cffi-C matmul,
     ``-O2 -fno-fast-math``, accumulator f32, row-major. Bids
     ``confidence=0.85, perf_estimate_us=2*M*N*K/1e12*1e6+2us,
     time_to_generate_s=0.5``. Registered by ``default_registry()``
     ahead of entry-point providers so the auction always has at
     least one bidder for host_cpu+matmul contracts.
  5. The auction is contract-faithful: every fulfilled bid runs the
     M-44 contract-driven verifier (M-44's ``_run_m44_verifier``
     unchanged); only verified bids are eligible to win. The winner's
     M-45 certificate carries ``paper_claimable=True`` (no fallback);
     loser certificates land in the auction tree under
     ``verified/<provider_name>/`` for tactician analysis.
  6. ``compgen_compare_kernel_bids(run_dir, task_id) -> dict`` MCP
     tool surfaces a ranked summary of every bid + fulfill +
     verifier verdict + certificate path so the agent can re-rank
     without reading the full per-bid JSON.
  7. ``--auction-mode disabled`` short-circuits before the auction
     stage runs; with this mode the M-43 commit path remains the
     canonical kernel-codegen surface.
