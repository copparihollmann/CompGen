notes: |
  Phase D centerpiece. M-55 made registry applicability explicit; M-56
  introduced bid()/fulfill(); M-57 composes both into the auction.

  Pre-existing scaffolding consumed (Phase D zero-new-design
  philosophy):
  - ``ProviderRegistry.applicable`` (M-55) — the auction's bid-source
    list.
  - ``collect_bids`` + ``compute_bid`` (M-56) — the auction's pre-codegen
    pruning.
  - ``KernelProvider.search`` (legacy v1 contract) — the auction's
    fulfill() path uses this unchanged via the
    ``_v3_to_legacy_contract`` bridge.
  - ``_run_m44_verifier`` + ``_reconstruct_contract_from_dict``
    (kernel_codegen_response.py from Phase C) — the auction's
    verification per bid.
  - ``emit_certificate`` (kernel_certificate.py from M-45) —
    certificate emission for the winner; loser certificates land in
    a per-provider auxiliary slot.

  Real-driven stress (`/tmp/m57_stress` and `/tmp/m57_e2e`):
  - merlin_mlp_wide host_cpu pipeline → kernel-auction stop boundary →
    `auction_report.json` shows: 1 bid (CReferenceProvider conf=0.85,
    perf_estimate=2.02us), 1 fulfilled (kernel.c written),
    1 verified (M-44 PASS), winner=c_reference,
    contract_hash=4838412db0b5c6b8 (matches M-55 + M-56).
  - Same model with `--stop-after glue-emit`: cert at
    `04_kernel_codegen/certificates/4838412db0b5c6b8.json`,
    `region_kernel_bindings.json` shows bound_count=1 unbound_count=0,
    emitted `06_glue_emit/generated_plan_executor.py` lands.

  Tests: 6 in tests/graph_compilation/test_kernel_auction.py covering
  disabled-mode short-circuit, no-applicable-providers + auction
  report still emitted, multi-bidder full path with CReferenceProvider
  winning on merlin_mlp_wide, first-fit mode, stub providers (one
  succeeding + one failing fulfill — selector picks the verified
  one), no-winner case (all fulfills fail).

  Honest residuals:
  - The auction picks by ``perf_estimate_us`` from the BidPreview;
    those numbers are unverified at bid time (M-56 documented
    residual). M-66's four-bidder stress will land genuine perf
    measurements via M-22.1's profiler harness — at that point the
    winner becomes "lowest measured-perf among verified bids" not
    "lowest claimed-perf".
  - Loser certificates currently land in
    ``auction/<task_id>/verified/<provider_name>/``; promotion to
    the global ``certificates/`` directory keys on the winner only
    (since the canonical filename is contract-hash-keyed).
  - ``CReferenceProvider`` only covers matmul today; pointwise +
    reduce families wait for the corresponding archetype tests in
    M-65 vertical slice 2.
  - The CLI flag ``--auction-mode multi-bidder`` is the default but
    the auction is a no-op when no applicable providers are
    registered (clean checkout). Adding more providers (entry-point,
    user-space M-62) lights up real auctions automatically.
