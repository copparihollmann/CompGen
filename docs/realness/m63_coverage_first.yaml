claim: |
  M-63 (Phase D): adds a coverage-first scheduling analysis pass that
  walks every region dossier under
  ``02_graph_analysis/region_dossiers/``, derives a coverage signature
  for each compute_tiled (matmul) region, and looks up matching M-45
  certificates. Sibling regions whose shape signature matches an
  existing cert get coverage-inflated bindings appended to the M-46
  ``region_kernel_bindings.json``. A second pass produces a
  specialization report ranking regions by analytical cost so a
  downstream tactician can pick high-value candidates for shape-
  specialized auction rounds.

  Hard contract:

  1. ``run_coverage_first(run_dir, *, mode)`` in
     ``graph_compilation/coverage_first.py`` is the orchestrator. Mode
     in ``{both (default), first-pass-coverage, specialize, disabled}``.
     ``disabled`` is a strict no-op.
  2. ``_coverage_signature(dossier, target_name)`` returns a stable
     string of the form
     ``"<target>|compute_tiled|<dtype>|row_major|<input_shapes>|<output_shapes>"``
     with the dossier's first 2 input shapes (matmul kernel reads
     lhs + rhs only; trailing fused-bias shapes are sliced off).
     Returns empty string when the dossier doesn't have enough
     shape information.
  3. ``_signature_from_certificate(run_dir, cert)`` reads the cert's
     source contract file from disk and produces the same signature
     so dossier-side and cert-side hashes align byte-for-byte for
     identical region shapes.
  4. The coverage pass appends rows to
     ``05_execution_plan/region_kernel_bindings.json`` with
     ``coverage_source: True`` flag so the M-47 emitter audits the
     M-63 addition. ``bound_count`` is recomputed;
     ``coverage_inflated_count`` records the size of the M-63
     addition.
  5. ``coverage_report.json`` (schema ``coverage_report_v1``)
     records per-signature groups + cert presence + inflation count.
     ``specialization_report.json`` (schema
     ``specialization_report_v1``) records every compute_tiled
     region sorted by analytical_cost descending with covered/
     uncovered status; the top-N uncovered are tagged as
     ``recommended_specialization_targets``.
  6. CLI flag ``--kernel-coverage-mode {both, first-pass-coverage,
     specialize, disabled}`` (default ``both``); the pipeline stage
     runs after ``execution-plan-emit`` and before ``glue-emit``.
