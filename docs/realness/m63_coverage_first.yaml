notes: |
  Phase D step 9 — Section 7's "maximum model coverage with the least
  amount of kernels" claim made real. The pass is analytical: it
  doesn't trigger additional auction rounds (that's M-66 stress
  territory); it produces reports that surface what coverage-first
  WOULD save and what regions WOULD benefit from shape-specialization.

  Pre-existing scaffolding consumed:
  - ``KernelCertificate.canonical_contract_hash`` (M-58) — surfaced in
    the coverage report; the matching primitive is the per-shape
    signature, not the canonical hash directly (the canonical hash
    today includes tile-choice attrs that aren't a kernel-shape
    fact; M-66 may pivot once the contract schema separates tile
    from shape).
  - ``find_certificate_by_canonical_hash`` (M-58) — present but
    unused for now (signature comparison is more direct on
    today's contract schema). Reserved for the M-66 stress.
  - ``RegionKernelBinding`` (M-46) — extended with a
    ``coverage_source: True`` flag in inflated rows; the M-46
    bindings file format is preserved (M-47 reads it unchanged).

  Real-driven evidence (`/tmp/m63_stress`):
  - merlin_mlp_wide has 3 matmul regions with DIFFERENT shapes
    (matmul_0: 16x16 @ 16x32, matmul_1: 16x32 @ 32x32, matmul_2:
    16x32 @ 32x16). coverage_report shows 3 distinct groups,
    1 with a cert (matmul_0), inflation=0 (no shape-sibling).
  - specialization_report ranks all 3 regions; matmul_1 and
    matmul_2 are tagged ``uncovered`` and recommended for
    specialization. Honest output — merlin_mlp_wide isn't a
    "share one kernel across many regions" model. M-66's
    four-bidder stress on a model with sibling matmuls (or a
    multi-layer model where every layer's matmul has the same
    shape) will exercise the inflation path.
  - End-to-end pipeline still passes glue-emit; original M-46
    bindings preserved (bound_count=1, coverage_inflated_count=0).

  Tests: 7 in tests/graph_compilation/test_coverage_first.py
  covering coverage signature byte-identity (dossier + cert sides),
  empty-dossiers no-op, mode flags (disabled / first-pass / both /
  specialize), real-pipeline coverage inflation, specialization
  report ranks regions descending by cost. Cross-suite regression
  preserved 160/160 across 15 test suites.

  Honest residuals:
  - Coverage matching is shape-EQUAL today (not shape-class). When
    one matmul covers (16, 16, 32) and another is (16, 16, 64),
    coverage-first today says "different signatures, no reuse".
    Shape-class match (e.g. "any K divisible by 16") needs the
    contract schema to expose dim divisibility, which is M-64's
    refinement work.
  - The pass is post-hoc — doesn't yet trigger additional auction
    rounds for the recommended_specialization_targets. The
    specialization report is advisory; iterating the pipeline +
    auction on the top-N uncovered regions is M-66's plumbing.
  - Pointwise + reduce families are not covered today. The pass
    filters on ``dossier.kind == "matmul"`` — extending to
    pointwise add_relu / softmax / layer_norm rides the M-65
    vertical-slice 2 fusion path.
  - The dossier-side signature slices to the first 2 inputs (matmul
    kernel arity = 2). When fused matmul + bias (3 dossier inputs)
    promotes to a fused contract via M-65, the slice will need
    archetype-aware adjustment.
