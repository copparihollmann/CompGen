claim: |
  M-49 (Phase C, paper-facing): the M-47 emitted Python SYNC plan
  executor passes end-to-end differential against the eager PyTorch
  reference for every region's selected kernel candidate. The
  differential applies the M-37.13 layered check:

  - For declared bit_equality: tiled output equals eager bit-exactly
    (max_abs_error == 0 AND max_rel_error == 0).
  - For declared tolerance_eps: ``|sim - eager| <= 4 * K * eps *
    max|A| * max|B|`` (Higham's matmul bound, derived per-case).

  Report at ``06_glue_emit/glue_differential_report.json``. M-15B
  downstream-retry detector picks up status=fail via the table entry
  ``("glue_differential", ..., "glue_differential_check")`` so the
  outer agent reconsiders the candidate via the standard typed
  retry surface.

  Once green, the paper claim is real:

   "CompGen emits per-workload glue from a validated execution plan.
   The generated executor calls verified shape-specialized kernels,
   checks plan invariants at launch, and passes end-to-end
   differential testing against the original model."
