notes: |
  Phase C M-52 — CUDA ASYNC + graph capture executor. Real-driven
  stress test (5 phases on a 2-region plan with target="cuda_sm75"):

  Phase A — mode="sync": 2-region linear plan; dispatch_calls=2,
  synchronize_calls=3 (one between regions × 2, plus end), terminal
  output==bias_out.

  Phase B — mode="async": per-region threading + EventTensor
  handshake. Sleep injected into matmul; observed order
  ['matmul_0', 'bias_add_0']; terminal output==bias_out. Same M-51
  semantics routed through the CUDA stub adapter.

  Phase C — capture multi-region rejected: capture=True on a 2-region
  plan raises ValueError("requires exactly one bound region; this
  plan has 2") instead of degrading to per-region capture.

  Phase D — capture available: rebuilt single-region plan; capture
  returned a non-None handle; replay called; capture_status=captured.

  Phase E — capture unavailable honest: stub adapter returns None
  from capture_graph; M-52 fell back to a single dispatch and
  returned capture_status=unavailable_no_cuda + captured_graph=None.

  Tests: 12 in tests/runtime/test_glue_emit_python_cuda.py
  (skip-on-non-cuda, emit-on-cuda, parses + imports, sync, async,
  bogus mode, capture-unavailable, capture-available, capture-multi
  rejected, unbound region plan violation, default adapter selection).

  Honest residuals:
  - The emitted code passes ``contract=<region_id>`` (a string) to
    ``runtime.dispatch``; the real :class:`CudaRuntimeAdapter`
    expects a real :class:`KernelContractV3` object. M-49+ wiring of
    the contract-load-from-disk protocol is the milestone that fixes
    this for SYNC, ASYNC, and CUDA adapters jointly. Tests therefore
    use a stub CUDA adapter that emulates the runtime protocol
    without inspecting the contract object. The
    ``test_default_adapter_is_cuda`` test only verifies adapter
    SELECTION, not real dispatch.
  - Multi-region graph capture (one big captured graph spanning
    several dispatched regions) is out of scope. The single-region
    capture path mirrors :class:`CudaGraphCaptureWrapper`'s contract;
    multi-region capture would require a fused-region forward fn
    that the M-46 plan does not yet emit.
  - The async path uses Python threading for the host-side spawn
    (matches M-51). True CUDA-stream-level concurrency (a per-region
    stream + cross-stream events) is a follow-on once the contract
    object protocol lands.
