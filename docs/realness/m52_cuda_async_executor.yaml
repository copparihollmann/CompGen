claim: |
  M-52 (Phase C): when the M-46 plan's target is CUDA-class
  (matches :func:`compgen.runtime.glue.select_adapter`'s CUDA family
  predicate — names starting with ``cuda``, or matching ``titan-rtx``
  / ``test-gpu-simt``), emit
  ``06_glue_emit/generated_plan_executor_cuda.py`` alongside the M-47
  SYNC and M-51 ASYNC executors. The CUDA executor exposes
  ``compgen_run_cuda(io, kernels, runtime, *, mode, capture=False,
  timeout_s=30.0)``.

  Modes and behavioural guarantees:

  1. ``mode="sync"``: each region dispatches sequentially with
     ``runtime.synchronize()`` between launches; matches M-47's
     contract topologically; output is the terminal region's value.
  2. ``mode="async"``: per-region threading + EventTensor handshake
     (mirrors M-51's CPU async pattern but routed through
     :class:`CudaRuntimeAdapter`). Producer→consumer dependency edges
     enforce ordering through ``EventTensor.notify`` /
     ``EventTensor.wait``. Honours ``timeout_s`` for missing-notify
     deadlock detection.
  3. ``mode="bogus"`` raises ``ValueError`` honestly — no silent
     fallback to "sync".
  4. ``capture=True`` with exactly one bound region wraps the region's
     dispatch via :class:`CudaGraphCaptureWrapper` (through the
     adapter's ``capture_graph`` / ``replay`` methods) and returns
     ``{"output": <out>, "captured_graph": <handle>,
     "capture_status": "captured"}``. When the adapter reports
     capture is unavailable (CPU-only host, no CUDA), the call falls
     back to a single dispatch and returns
     ``"capture_status": "unavailable_no_cuda"`` rather than silently
     pretending capture worked.
  5. ``capture=True`` with multi-region plan raises ``ValueError``
     honestly — multi-region graph capture is not supported in this
     milestone.

  Non-CUDA targets skip the emit (``overall=skipped``) — the
  M-47/M-51 files are the artifacts. The default-adapter selection
  via ``select_adapter(PLAN_TARGET)`` on a CUDA target returns a
  :class:`CudaRuntimeAdapter`, completing the
  dispatch-mode-as-Recipe-decision protocol started in M-50.
