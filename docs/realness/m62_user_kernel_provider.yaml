claim: |
  M-62 (Phase D, Section 7 step 8): users plug their own kernels into
  the M-57 auction by pointing CompGen at a directory of
  ``kernel_manifest.yaml`` + sibling kernel sources. The indexer
  validates each manifest, sha256-hashes every locked file, and
  persists derived index entries under
  ``.compgen/user_kernel_index/<sha8>/manifest.yaml``. A
  ``UserKernelProvider`` registered in ``default_registry()`` reads
  the index at bid time, matches incoming ``KernelContractV3`` against
  declared signatures, bids high-confidence on exact-dim match, and
  fulfils from disk after a fresh locked-files audit.

  Hard contract:

  1. ``user_kernel_manifest_v1`` schema declares ``op_name``,
     ``archetype``, ``target_name``, ``language``, ``kernel_source``
     (path relative to manifest), ``entry_symbol``, ``inputs[*]``,
     ``outputs[*]``, ``numerics``, ``dispatch_model``, optional
     ``perf_priors``. Schema-version mismatch raises typed
     ``UserKernelManifestError``; missing required fields raises the
     same; ``kernel_source`` escaping the manifest's directory raises.
  2. ``index_one_manifest`` writes the derived entry under
     ``index_root/<index_id>/manifest.yaml`` where
     ``index_id = sha8(absolute_manifest_path)``. ``locked_files``
     records ``sha256[:16]`` for the manifest + every source file
     declared in ``kernel_source``. ``reindex`` walks the search
     path, indexes every manifest in lex order, and writes
     ``registry.yaml`` summarising the entries.
  3. ``audit_locked_files(entry)`` re-hashes every file and raises
     :class:`UserKernelHashDriftError` on any mismatch (including
     missing files). The provider calls this on every fulfil — a
     kernel edited after indexing is rejected.
  4. ``UserKernelProvider`` (``kernels/providers/user_path.py``)
     implements the M-56 ``bid()`` interface:
     - **exact-dim match** → ``confidence=0.95`` (or manifest's
       ``perf_priors.confidence`` when set), ``cache_hit=True``.
     - **archetype + target + dtype + layout match, dims differ** →
       ``confidence=0.6`` (or ``perf_priors.confidence``).
     - **no match** → ``confidence=0.0``.
     The provider records ``_last_match`` so the auction's subsequent
     ``search()`` call serves the right kernel.
  5. ``default_registry()`` auto-registers ``UserKernelProvider`` when
     ``.compgen/user_kernel_index/`` contains at least one entry.
     Empty index = no provider registered (no overhead). Priority 20
     beats the in-tree ``CReferenceProvider`` (5).
  6. CLI ``--user-kernel-path <dir>`` flag and
     ``COMPGEN_USER_KERNEL_PATH`` env var trigger reindex before the
     pipeline runs (the auction sees a fresh index).
  7. Three MCP tools:
     - ``compgen_list_kernel_providers(target?)`` — enumerate every
       registered provider with priority + applicability metadata.
     - ``compgen_describe_kernel_provider(provider_id)`` — deep view;
       for ``user_path``, surfaces every indexed kernel's manifest.
     - ``compgen_discover_user_kernels(path)`` — drive the indexer.
  8. Skill ``/compgen-discover-user-kernels`` orchestrates: agent
     calls the MCP tool, surfaces the indexed signatures, and saves
     the user-kernel-path location to memory.
