forbidden:
- writing index entries outside .compgen/user_kernel_index/ (the index_root is a closed sandbox; arbitrary writes to user paths are not allowed)
- silently using a tampered kernel after the locked-files audit detects drift (UserKernelHashDriftError must propagate)
- bidding without checking target_name match (a host_cpu kernel must not bid on a cuda_sm75 contract)
- the indexer following symlinks outside the search_path (declared kernels must live alongside their manifest; cross-tree symlinks fail kernel_source-escapes-manifest-dir)
- registering UserKernelProvider when the index is empty (no entries → no provider; lazy registration only)
