notes: |
  Phase D step 8 — Section 7's "users can plug in other kernel
  providers in their own user space" claim made real. Mirrors the
  ``compgen.graph_compilation.extension_*`` pattern (manifest +
  locked-files audit + sandboxed index dir).

  Pre-existing scaffolding consumed:
  - ``ProviderRegistry`` + ``default_registry()`` (M-55) — extended
    to auto-register ``UserKernelProvider`` when the index has
    entries.
  - ``BidPreview`` + ``compute_bid`` (M-56) — the user-space
    provider implements ``bid()`` natively; cache_hit=True signals
    the auction that fulfil is essentially free (disk read +
    audit).
  - ``canonical_contract_hash`` (M-58) — used for exact-match
    detection (the manifest declares concrete dims; the contract's
    canonical hash matches when dims agree).
  - Extension-materialize sandbox pattern (Phase B
    extension_verify) — mirrored for kernel-source locked-files
    audit.

  Real-driven evidence (`/tmp/m62_stress` regenerated):
  - User indexes a kernel at ``/tmp/m62_user_kernels/matmul`` with
    perf_priors confidence=0.99, estimated_us=1.5.
  - ``reindex`` produces ``.compgen/user_kernel_index/0b2572e4/``
    + ``registry.yaml``; locked_files map carries SHAs for both
    files.
  - Pipeline runs ``--auction-mode multi-bidder``: 2 bids
    (user_path conf=0.99 perf=1.5us rationale=exact_match:0b2572e4
    + c_reference conf=0.85 perf=2.016us). Winner: ``user_path`` —
    user kernel beats in-tree baseline on both confidence + perf.
  - End-to-end auction.overall=pass; winner promoted to standard
    M-43 response location.

  Tests: 20 in tests/kernels/test_user_kernel_index.py covering
  manifest schema (round-trip + missing fields + unknown version),
  indexer (single + reindex + registry write), locked-files audit
  (clean + tampered source + missing file), provider bid (no index +
  exact match + compat match + target mismatch), provider search
  (after bid + without bid + tampered refusal), MCP tools (discover +
  list + describe), end-to-end auction (user kernel wins against
  c_reference). Cross-suite regression preserved 158/158 across 15
  test suites.

  Honest residuals:
  - Filesystem indexing only today. PyPI entry-point providers are
    listed by ``compgen_list_kernel_providers`` but don't go
    through ``compgen_discover_user_kernels`` (they're already
    registered by the entry-point system).
  - Multi-file kernels (e.g. Triton ``.py`` + ``.h``) need every
    file declared in ``kernel_source`` today; the manifest schema
    accepts a single path. Multi-file support is a future
    extension.
  - The provider's ``compat_match`` (archetype-match without
    exact-dim) is informational only — the auction's M-44 verifier
    still runs against the actual kernel artifact, so a misdeclared
    user kernel that bids high but produces wrong outputs gets
    caught honestly. Misleading bids waste top-K capacity but don't
    let unsafe artifacts through.
  - The skill saves the user-kernel-path location to memory for
    future-session recall, but the underlying memory write is the
    agent's responsibility (the skill instructs but the agent
    executes via the standard memory protocol).
