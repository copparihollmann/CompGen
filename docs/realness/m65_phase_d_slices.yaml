claim: |
  M-65 (Phase D, vertical-slice stress): runs the M-55..M-64 substrate
  end-to-end on two Phase D vertical slices and emits per-slice
  evidence JSONs that record the auction / coverage / specialization /
  bindings / contract-versioning state. Honest gaps are documented
  rather than papered over.

  Hard contract:

  1. ``compgen.graph_compilation.phase_d_slice_evidence`` ships two
     emitters: ``emit_slice_evidence`` (walks an existing run_dir
     and summarises) and ``emit_deferred_slice_evidence`` (records a
     slice that couldn't run with a typed deferral reason).
  2. Slice 2 (proxy_vla on host_cpu fusion path): the recipe planner
     selects a fusion candidate; M-42 routes to
     ``request_kind=not_applicable`` (M-42 covers only
     ``set_tile_params`` today). The slice evidence records this as
     ``overall=honest_gap`` with the specific
     ``not_applicable_reason``. Auction stage doesn't run; the
     evidence carries an ``auction_summary.ran=false`` row.
  3. Slice 3 (merlin_mlp_wide on cuda_sm75 via Triton):
     ``configs/targets/cuda_sm75.yaml`` does not ship; the slice is
     marked ``overall=deferred``. CUDA-bound providers
     (TritonTemplate + Claude-Code GPU codegen) need a CUDA-capable
     host. M-66 covers the CPU path of TritonTemplate via the
     fallback provider.
  4. Evidence schema ``phase_d_slice_evidence_v1`` carries five
     summary blocks: ``auction_summary``, ``coverage_summary``,
     ``specialization_summary``, ``bindings_summary``,
     ``contract_versioning_summary`` â€” one per Phase D milestone
     surface. Each has ``ran: bool`` plus per-block fields when ran.
