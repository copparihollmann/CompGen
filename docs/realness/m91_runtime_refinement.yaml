notes: |
  Phase G M-91 â€” closes Â§12 Dream 6 ("runtime as a verification
  target, not just an executor"). The Â§12 framing was that "the
  emitted C is a refinement of the plan", "ABI conformance is
  mechanical", and "resource budget is trivially checkable" â€” all
  three are now mechanical checks with named typed errors and
  negative-control coverage.

  Negative controls (the Â§3 verification ladder's analogue for
  the runtime layer): each gate has at least one fault-injection
  test that proves the gate is real, not decorative.

  - plan-refinement: drop a dispatch / add a phantom dispatch /
    swap order â†’ RuntimeRefinementError with the named kind.
  - ABI conformance: inject cudaMalloc / hipLaunchKernel /
    vkCmdDispatch â†’ AbiConformanceError listing the symbol.
  - resource budget: overcommit push-constants / binding slots â†’
    ResourceBudgetError naming the resource.

  Honest residuals:
  - The ABI gate runs on the raw emit source, not the
    pre-processed translation unit. M-88 / M-89 never emit user
    macros, so this is fine in practice; if M-94 baremetal codegen
    starts emitting macros, the gate gains a ``preproces=true``
    option.
  - Per-region resource budgets (e.g. each kernel's declared
    shared-memory footprint) are not checked here; that lives in
    the M-44 verifier (kernel-level) + M-67 placement planner
    (plan-level) and is consumed by M-91 only when the plan's
    manifest carries the budgets.
  - The gate writes its report under ``06_glue_emit/`` regardless
    of which emit (C11 / C++) it inspected; if both emits exist
    the C11 emit is checked first by convention.
