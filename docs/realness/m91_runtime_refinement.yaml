claim: |
  M-91 (Phase G â€” Â§12 Dream 6): the emitted Layer-1 plan executor
  is a **verification target**, not just an executor. Three
  mechanical post-emit gates run on every emit and reject any
  Layer-1 that drifts from the plan it was generated from:

  1. ``compgen.runtime.verification.plan_refinement.check_plan_refinement``
     â€” parses the emitted ``.c`` / ``.cpp`` and confirms every plan
     op corresponds to one ``cg_rt_command_buffer_dispatch`` of the
     matching ``compgen_kernel_<region_id>`` extern, in the
     declared topological order. Failure kinds:
     ``count_mismatch``, ``missing_dispatch``, ``unknown_dispatch``,
     ``order_mismatch``.  Raises ``RuntimeRefinementError`` naming
     the kind.
  2. ``compgen.runtime.verification.abi_conformance.check_abi_conformance``
     â€” scans the emit for every function-call symbol (after
     stripping comments + string literals) and rejects any that
     isn't ``cg_rt_*`` / ``compgen_kernel_*`` / a small allowlist
     of control-flow keywords. Vendor primitives (``cudaMalloc``,
     ``cuLaunchKernel``, ``hipMalloc``, ``vkCmdDispatch``, ...) are
     named explicitly in the typed ``AbiConformanceError``.
  3. ``compgen.runtime.verification.resource_budget.check_resource_budget``
     â€” checks the emit's static allocations (push-constants bytes,
     binding slots, kernel-extern count) against the plan-declared
     budget and the libcompgen_rt static caps (256 bytes push
     constants, 32 binding slots). Raises ``ResourceBudgetError``
     naming the resource that overcommits.

  ``compgen.runtime.verification.run_runtime_verification`` is the
  aggregator: it runs all three with ``raise_on_fail=False`` so the
  report is complete, persists
  ``06_glue_emit/runtime_verification_report.json``, and only then
  re-raises the first failing gate's typed error. The report's
  schema is ``runtime_verification_report_v1``.

  All three typed errors are real, named subclasses of
  ``RuntimeError`` in ``compgen.runtime.errors`` â€”
  ``RuntimeRefinementError``, ``AbiConformanceError``,
  ``ResourceBudgetError``. Each carries the structured payload an
  operator needs to triage (kind / symbols / resource & numeric
  budget delta).

  Test coverage (13 in tests/runtime/test_runtime_verification.py):
  happy paths on the C11 and C++ emits; three plan-refinement
  negative controls (drop dispatch, add phantom dispatch, swap
  order); three ABI-conformance negative controls (inject
  ``cudaMalloc`` / ``hipLaunchKernel`` / ``vkCmdDispatch``);
  two resource-budget negative controls (push-constants /
  binding-slots overcommit); one aggregator test
  (report persisted on failure).
