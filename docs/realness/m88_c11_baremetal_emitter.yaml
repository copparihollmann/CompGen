feature_id: m88_c11_baremetal_emitter
notes: |
  Phase G M-88 — first §12 Dream-1 emit target beyond Python.

  Architectural framing: the dream is that "the runtime is part of
  the recipe". M-47/M-51/M-52 already emit Python plan executors;
  M-88 emits the same shape of artefact in C11 so the same plan
  can drive a baremetal / Saturn-OPU target without a Python
  interpreter in the launch loop. The C emit calls libcompgen_rt
  (the §12 Layer-2 HAL); the operator links a kernel pack (the §12
  Layer-3 artefact pool) that defines the ``compgen_kernel_*``
  externs the emit references.

  Tests landed: 15 in tests/runtime/test_glue_emit_c11_baremetal.py
  covering:
  - schema (emit produces .c + .h + manifest);
  - byte stability across reruns;
  - cc -fsyntax-only syntactic validity (compiler-gated);
  - ABI lint: only cg_rt_* and compgen_kernel_* externs (the
    M-91 D6 pre-check);
  - topology: multi-region emits respect dependency-edge order;
  - unbound region triggers PLAN_VIOLATION_UNBOUND_REGION path;
  - PLAN_VIOLATION codes are present in header + manifest with
    stable integer values;
  - contract-driven dtype/shape/bytes/layout checks emit the right
    C-level PLAN_VIOLATION_<KIND> sites;
  - M-61 predicates (mod_eq, byte_size_le, dtype_in) emit named
    typed checks.
  - negative control: dropping a dispatch call from a corrupted emit
    is detectable by the M-91 D6 plan-refinement gate.

  Honest residuals:
  - The kernel pack (compgen_kernel_<region_id> externs) is M-49's
    responsibility; M-88 emits the references and expects the
    operator's build system to link them in. Without a kernel pack
    the emit links but unresolved-symbol-errors at load time — the
    typed error path is M-89's territory (CUDA driver) and M-94's
    (baremetal codegen).
  - Push-constants and bindings arrays are reserved 256-byte and
    32-slot blocks today; the M-49 binding map (which region inputs
    populate which slots) wires the real contents.
  - The driver name is fixed to "cpu_sync" in M-88; M-89 overrides
    to "cuda"; M-90's PlanDispatchTable can pick per-plan.
  - The M-91 D6 ABI-conformance gate runs the same allowlist check
    end-to-end on the emitted .c; the M-88 ABI lint test is a
    pre-check using the same allowlist so the gate can never reject
    an emit M-88 produced.
