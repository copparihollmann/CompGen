claim: |
  M-88 (Phase G — §12 Dream 1): a **C11 plan executor is emitted**
  per-workload from ``05_execution_plan/execution_plan.yaml`` and
  the M-46 region_kernel_bindings, calling the same ``libcompgen_rt``
  ABI (``cg_rt_*``) that the existing CPU + CUDA + cpu_task drivers
  already implement. The emitter at
  ``compgen.runtime.glue_emit.c11_baremetal.emit_c11_baremetal_executor``
  produces three artefacts under ``06_glue_emit/``:

  - ``generated_plan_executor.c`` — the ``compgen_run(io, status)``
    entry point. Asserts plan invariants at the top of the function
    and stores a named ``COMPGEN_PLAN_VIOLATION_<KIND>`` code into
    ``status->code`` on failure (§12 D4). Calls only ``cg_rt_*``
    symbols; M-49 supplies the kernel pack with
    ``compgen_kernel_<region_id>`` externs.
  - ``generated_plan_executor.h`` — the public ABI: ``compgen_io_t``,
    ``compgen_tensor_t``, ``compgen_status_t``, the dtype + layout
    enums, and the ``COMPGEN_PLAN_VIOLATION_<KIND>`` code macros.
  - ``plan_executor_c11_manifest.json`` — schema-versioned manifest
    listing the emit, the bound/unbound regions, the topological
    region order, the stable PLAN_VIOLATION code map, and an
    ``abi.uses_only_cg_rt`` flag the M-91 D6 gate consumes.

  Generated executor invariants (proven by 15 unit tests):

  - Calls ``cg_rt_command_buffer_dispatch`` exactly once per bound
    region in the topological order shared with M-47's Python SYNC
    emitter.
  - Calls ``cg_rt_queue_submit`` and ``cg_rt_semaphore_wait`` exactly
    once each per invocation.
  - Inlines typed ``COMPGEN_PLAN_VIOLATION_<KIND>`` checks for every
    M-48 invariant: ``INPUT_COUNT``, ``INPUT_DTYPE``, ``INPUT_SHAPE``,
    ``INPUT_BYTES``, ``LAYOUT``, ``UNBOUND_REGION``, ``EVENT_WRITERS``,
    and the M-61 predicate kinds ``PRECONDITION_MOD_EQ``,
    ``PRECONDITION_BYTE_SIZE_LE``, ``PRECONDITION_DTYPE_IN``.
  - Calls **only** ``cg_rt_*`` and ``compgen_kernel_*`` externs; the
    M-91 ABI-conformance gate rejects any emit that calls a vendor
    primitive directly.
  - Byte-stable across reruns of the same plan; the manifest carries
    a single ``generated_at_utc`` field that is stripped from
    equality checks.

  Compilation acceptance: the emit compiles cleanly with
  ``cc -std=c11 -Wall -Wextra -fsyntax-only`` against
  ``runtime/native/libcompgen_rt/include`` (verified by
  ``test_emit_parses_with_cc_fsyntax_only``).
