    max_relative_error=1e-3, contract_hash=45a9df00c6234506.

  Distinct contract_hash per region+tile, byte-stable across reruns
  (negative control: test_e2e_byte_stable_across_reruns).

  Load-bearing invariant (M-40's negative control):
  ``kernel_facing_to_dict`` MUST NOT serialize any field present only
  in ``compiler_only()``. The test
  ``TestKernelFacingNoLeak.test_no_compiler_only_fields_in_view`` and
  its on-disk counterpart
  ``test_e2e_view_does_not_leak_compiler_only_fields_on_real_run``
  fail loud if a regression introduces a leak. List of forbidden
  field names: ``wait_on``, ``blocking``, ``lifetimes``, ``fusion``,
  ``is_boundary``, ``fusable_with``, ``prefer_inline_into``,
  ``observability``, ``emit_dispatch_event``, ``emit_completion_event``,
  ``cost_emit_period``, ``max_concurrent_invocations``,
  ``retry_on_recoverable_error``, ``providers``, ``metadata``.

  M-41 unifies all callers on hash_contract (today M-39's emitter
  still uses derive_contract_hash; M-41 retires it).
  M-42 supersedes M-39's request schema and unifies the directory
  layout under 04_kernel_codegen/.
