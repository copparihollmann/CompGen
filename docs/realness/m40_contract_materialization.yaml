claim: |
  M-40 (Phase C): a selected Recipe IR decision plus the region's
  dossier facts and the target profile materialize into a fully-
  populated ``KernelContractV3``. The contract is the calling
  convention every Phase C consumer trusts:
  ``compgen.promotion.contract_hash.hash_contract`` keys the cache
  (M-41); the ``kernel_facing()`` projection bounds what a kernel-
  codegen provider may read (M-42 + M-43); the ``compiler_only()``
  projection is strictly invisible to the kernel.

  Pipeline-stage wrapper at
  ``compgen.graph_compilation.kernel_contract_materialization`` reads
  ``03_recipe_planning/candidate_selection.json``, the recipe-gate
  verdict, the region dossier, and the target YAML; emits two artifacts
  per selected ``set_tile_params`` candidate:

  - ``04_kernel_codegen/contracts/<region_id>.<contract_hash>.json`` —
    the full materialized contract.
  - ``04_kernel_codegen/views/<region_id>.kernel_facing.json`` — the
    kernel-facing projection, sandbox-safe.

  Plus a per-run summary at
  ``04_kernel_codegen/contract_materialization_summary.json``.

  Non-``set_tile_params`` candidates emit a typed ``not_applicable``
  row — never silently skipped.
