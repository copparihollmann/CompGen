feature_id: m40_contract_materialization
forbidden:
- compiler-only fields (wait_on, blocking, lifetimes, fusion, observability,
  max_concurrent_invocations, providers, metadata) leaking into the
  kernel_facing view
- silently skipping unsupported candidate kinds (must emit not_applicable)
- contract content drifting across reruns (byte-stability across reruns)
- hand-authored contracts in the production path (must use from_recipe)
- bypassing hash_contract for the canonical contract hash
- emitting a contract without an associated kernel_facing view file
realness_level: decision_affecting
required_evidence:
- python/compgen/kernels/contract_v3.py (KernelContractV3.from_recipe)
- python/compgen/graph_compilation/kernel_contract_materialization.py
- python/compgen/graph_compilation/run.py (M-40 wired into kernel-specialization-request boundary)
- tests/graph_compilation/test_kernel_contract_materialization.py
- 04_kernel_codegen/contracts/<region>.<hash>.json on a real merlin_mlp_wide run
- 04_kernel_codegen/views/<region>.kernel_facing.json on a real run
- 04_kernel_codegen/contract_materialization_summary.json on a real run
notes: |
  Phase C M-40 — first milestone of the contract-as-spine track.

  Verified on canonical pair:
  - merlin_mlp_wide (matmul_0: M=16 N=32 K=16, tile_M16_N16_K16):
    declared_refinement=bit_equality, max_relative_error=0.0,
