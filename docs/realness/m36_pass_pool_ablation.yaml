notes: |
  Section 20 / M-36. Fifth milestone behind the M-31A audit gate.
  Closes the "does the agent's choice differ from greedy?" question
  with a measurement harness that emits typed cells and detects
  divergence automatically.

  Three sub-milestones shipped:

    M-36.1  AblationResult / AblationPack / run_one_cell / run_suite
            library + CLI wrapper
    M-36.2  Real ablation runs on merlin_mlp_wide + proxy_vla +
            holdout_mlp_odd_shapes confirming the harness extracts
            greedy-resolver choices end-to-end:
              - merlin_mlp_wide  → set_tile_params/tile_M16_N16_K16
              - proxy_vla        → fuse_producer_consumer/fuse_add_0_into_aten_relu_default_0
              - holdout_mlp_odd_shapes → no candidate (M-15B blocked)
    M-36.3  realness contract + trust report

  Honest residuals (declared, deferred):
  - The pipeline does not yet *execute* multi-step pass plans —
    M-34 ships the validator, not the executor. The harness compares
    single-step decisions today. Multi-pass-plan execution is a
    Section 21+ scope item.
  - llm-live mode requires API keys + network. The CLI does not drive
    it; an operator can record a live decision and feed it into
    agent-file mode.
  - Verification rate per mode requires running stop_after >=
    differential-verification, which is heavier. Today the harness
    runs to agent-decision-request; deeper runs are an operator
    parameter.
