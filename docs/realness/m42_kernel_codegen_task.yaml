claim: |
  M-42 (Phase C): the kernel-codegen task is the canonical bounded
  surface a kernel-codegen provider (cffi-C, Triton template, Claude
  Code subagent, autocomp) sees. The pipeline emits one
  ``kernel_codegen_request_v1`` per selected kernel-bearing region
  to ``04_kernel_codegen/requests/<task_id>.request.json`` and
  creates a sandboxed per-task artifact directory at
  ``04_kernel_codegen/artifacts/<task_id>/`` that the M-43 commit
  tool will treat as the only legal write location for provider
  outputs.

  M-42 supersedes M-39's ``kernel_specialization_request_v1`` schema:

  - directory unified under ``04_kernel_codegen/`` (legacy
    ``04_kernel_specialization/`` is no longer written).
  - request POINTS to the M-40 materialised contract files via
    ``contract_paths.full`` and ``contract_paths.kernel_facing``
    instead of embedding shape/tile/layout/dtype inline.
  - ``forbidden`` list and ``allowed_backends`` are explicit;
    ``required_outputs`` names the four files the provider MUST
    produce inside ``artifact_dir/``.
  - ``task_id`` is deterministic from (region_id, candidate_id) so
    the same task is byte-stable across reruns.

  The legacy emitter
  ``compgen.graph_compilation.kernel_specialization`` is converted
  to a deprecated shim — its ``run_kernel_specialization_request``
  and ``build_kernel_specialization_request`` raise
  ``DeprecationError`` so any rogue caller fails loud.
