feature_id: m42_kernel_codegen_task
forbidden:
- writing to the legacy 04_kernel_specialization/ directory in production
- emitting a request without a matching M-40 materialised contract
- request.contract_paths pointing at files outside 04_kernel_codegen/
- artifact_dir being absent or shared across distinct task_ids
- kernel-facing surface leaking compiler-only fields (the M-40 invariant)
- non-deterministic task_id (timestamps, RNG, pid)
- silently widening the forbidden / required_outputs / allowed_backends list
