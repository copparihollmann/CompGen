notes: |
  Phase C M-42. Real-driven stress test:

  Phase 1 — clean migration. Drove merlin_mlp_wide /
  tiny_mlp / tiny_attention / tiny_conv_block /
  holdout_mlp_odd_shapes / proxy_vla through
  --stop-after kernel-codegen-request. None of them created the
  legacy 04_kernel_specialization/ directory. All 6 created the
  04_kernel_codegen/{requests,contracts,views,artifacts} layout.

  Phase 2 — request schema fidelity. 5/6 set_tile_params runs
  produced kernel_codegen request_kind with full
  contract_paths.{full, kernel_facing} resolving on disk; proxy_vla
  produced not_applicable with a typed reason (fusion candidate not
  yet supported).

  Phase 3 — sandbox enforcement readiness. All 6 runs created
  04_kernel_codegen/artifacts/<task_id>/ as an EMPTY directory
  awaiting M-43's provider response. Distinct task_ids per (region,
  candidate); no collisions.

  Phase 4 — kernel_facing leakage check on disk. Read each emitted
  view file; none contained any compiler-only field (wait_on,
  blocking, lifetimes, fusion, observability, max_concurrent,
  providers, metadata). Confirms M-40's negative-control
  invariant carries through M-42's pointer surface.

  Phase 5 — alias compatibility. The pre-M-42 flag
  --stop-after kernel-specialization-request still works (the
  boundary block runs both M-40 and M-42 unconditionally). Makes
  the migration safe for callers that still pass the old flag.

  Tests: 12 e2e + schema + negative controls in
  tests/graph_compilation/test_kernel_codegen_request.py. 23 total
  pass when combined with M-40's 11. 764/1 pass across
  promotion+passes+analysis+audit+ir.recipe+memory.
