notes: |
  Real-driven stress test (the user's framing — drive a workload, not
  more pytests):

  Phase 1 — read/write parity across 6 models. Drove
  merlin_mlp_wide / tiny_mlp / tiny_attention / tiny_conv_block /
  holdout_mlp_odd_shapes / proxy_vla through the
  --stop-after kernel-specialization-request boundary. For each model,
  read the contract_hash that M-39's request emitter wrote AND the
  contract_hash that M-40 materialised independently. 5/5 set_tile_params
  models matched bit-for-bit; proxy_vla (fuse_producer_consumer)
  honestly produced an empty contract_hash on both paths, since
  M-40 emits ``not_applicable`` for non-tile candidates (M-42 widens scope).
  Distinct contract_hashes per (model, region, tile) — no collisions.

  Phase 2 — byte-stability across processes. Ran merlin_mlp_wide
  twice from clean output dirs. Contract bodies and hashes
  byte-identical. (Hash 4838412db0b5c6b8 in both processes.)

  Phase 3 — end-to-end warm-cache loop. Wiped .compgen_cache, ran
  merlin_mlp_wide cold (populated cache with new hash), then ran
  again warm. Warm run surfaced the just-cached recipe as
  ``match_kind=exact_contract`` with hash 4838412db0b5c6b8 — the
  canonical write→read roundtrip works under M-41.

  Phase 4 — graceful degradation against pre-M-41 cache.
  Restored the original 1875-recipe cache (whose entries were
  written under the old derive_contract_hash). Re-ran merlin_mlp_wide.
  19568 promoted candidates surfaced (69 ``exact_contract`` matches
  from happens-to-align hashes; 19499 ``region_pattern`` matches from
  graceful fallback). Selected candidate identical to pre-M-41
  (cand_tile_matmul_0_tile_M16_N16_K16__ccb97c43). No regression in
  end-to-end behaviour.

  Phase 5 — full inspection harness. Ran scripts/dev/inspect_models.py
  on the canonical 6 small models. **6/6 warm-cache hits**, matching
  the M-37.12 baseline. Outcome distribution unchanged.

  Honest residual: existing pre-M-41 promoted recipes are
  unfindable by exact_contract under the new hash. Region-signature
  fallback still works. New runs populate the cache under the
  canonical hash; the cache organically migrates over time. No
  paper-claimable behaviour change — warm-cache hit rate measured
  per workload, not per individual recipe entry.
