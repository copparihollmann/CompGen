claim: |
  M-41 (Phase C): the M-26 exact-kernel ``contract_hash`` is derived
  via exactly one canonical path —
  ``compgen.promotion.contract_hash.hash_contract`` applied to the
  ``KernelContractV3`` materialised by ``KernelContractV3.from_recipe``
  (M-40). Every callsite in the production tree routes through
  ``compgen.graph_compilation.kernel_contract_materialization.hash_contract_from_run_dir``;
  the legacy ``derive_contract_hash`` in ``promotion_bridge.py`` is
  retired (raises a typed runtime error if called).

  Pre-M-41 there were two parallel hashing schemes:

  - ``derive_contract_hash`` (raw-dict hash of candidate_kind +
    recipe_delta + region_signature_fields).
  - ``hash_contract`` (canonical SHA256 of the ``kernel_facing()``
    projection).

  They could drift. M-41 collapses them; promotion-write,
  promotion-read, and agent-decision-time retrieval all derive
  byte-identical keys because they hash byte-identical
  ``KernelContractV3`` content.
