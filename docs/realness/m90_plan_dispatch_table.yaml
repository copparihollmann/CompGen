notes: |
  Phase G M-90 — closes §12 Dream 5 ("multi-plan dispatch for dynamic
  workloads"). The dream's central claim is that **each plan is
  independently verified; the dispatcher is trivial**. This is the
  exact structure the implementation produces: each inner plan is
  an M-47/M-51/M-52/M-88/M-89 emit, individually verifiable; the
  dispatcher is a typed lookup table the M-91 D6 gate can certify
  against the spec hash.

  Tests landed: 19 in tests/runtime/test_multi_plan_dispatch.py:
  - 4 spec-validation tests (empty entries, missing default, etc.);
  - 4 ``select_plan`` determinism tests (first match wins; multi-
    feature; default fallback; 1 000-vector determinism);
  - 2 Python-emit tests (parses, imports, matches pure selector);
  - 3 native-emit tests (C11 produces typed entries; cc + c++ -
    fsyntax-only pass);
  - 1 byte-stability test (two emits identical for all three
    targets);
  - 1 manifest schema test (round-trip);
  - 3 Recipe IR op tests (round-trip, empty-entries rejected,
    unknown-feature rejected);
  - 1 ABI-lint test (C dispatcher calls only control-flow + its
    own selector — no vendor primitives).

  Architectural framing: the per-plan inner emits (M-47/M-51/M-52
  for Python; M-88/M-89 for native) are §12 Dream-1 outputs. M-90
  is §12 Dream-5 — it composes those outputs into a single emit
  that handles dynamic shapes without sacrificing static-plan
  performance. The dispatcher itself is small enough (under 100
  LOC of generated source) that it pays the static-plan cost only
  once per workload.

  Honest residuals:
  - The Recipe IR ``plan_dispatch_table`` op is registered but no
    Recipe-IR-side seed generator emits it automatically yet —
    operators construct it explicitly when authoring a dynamic-
    shape recipe. M-90.1 will add the seed-time emission.
  - The Python dispatcher's ``plan_loader`` callable is operator-
    supplied; the convention is ``operator.import_module(plan_ref)``
    where each ``plan_ref`` resolves to a per-plan generated
    executor module under ``06_glue_emit_<plan_ref>/``.
  - String-typed features (``dtype="f32"``) are accepted; the C11
    emit uses a stable enum mapping the manifest serialises.
  - Resolution of ``plan_ref`` symbols to on-disk
    ``05_execution_plan/<plan_name>/`` directories is the M-91 D6
    gate's job; M-90 emits and verifies the dispatcher, not the
    plans it points at.
