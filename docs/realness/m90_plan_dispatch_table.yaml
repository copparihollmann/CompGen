claim: |
  M-90 (Phase G — §12 Dream 5): a **multi-plan dispatch table** lets
  a single Layer-1 emit carry several plans, each independently
  verified, with the dispatcher itself a trivial typed lookup.

  Two pieces ship together:

  1. ``recipe.plan_dispatch_table`` op (xDSL, registered in the
     Recipe dialect) authors the dispatcher in IR. It declares
     ``feature_keys`` (the runtime feature names — ``batch``,
     ``seqlen``, ``dtype``, ...), an ordered list of
     ``entries`` (each a ``{features → plan_ref}`` dict), and a
     ``default_plan_ref``. The op's ``verify_`` rejects empty
     entries, unknown feature keys, and missing defaults.
  2. ``compgen.runtime.glue_emit.dispatch_table.emit_dispatch_table``
     consumes a normalised :class:`PlanDispatchSpec` and emits the
     dispatcher in **all three Layer-1 targets**:

     - ``generated_plan_dispatcher.py`` — ``select_plan_ref`` +
       ``compgen_dispatch_run(runtime_features, io, kernels, runtime,
       plan_loader)``.
     - ``generated_plan_dispatcher.c`` — ``compgen_select_plan_ref``
       over a typed ``compgen_features_t`` struct + a static
       ``COMPGEN_DISPATCH_ENTRIES`` table.
     - ``generated_plan_dispatcher.cpp`` — same as the C11 emit
       under ``extern "C"`` linkage.

     The manifest at ``plan_dispatch_table_manifest.json`` carries
     the spec hash, the feature keys, the entry table, the default
     plan ref, and every emit path so the M-91 D6 plan-refinement
     gate can verify "the dispatcher resolves to a verified plan
     for every reachable runtime feature vector".

  Selection invariants (proven by 19 unit tests):

  - Entries are tried in declaration order; first match wins.
  - Multi-feature entries require **all** declared features to
    equal the runtime vector (no partial match).
  - Unknown features fall through to ``default_plan_ref``.
  - Deterministic across 1 000 randomised feature vectors —
    ``select_plan(spec, fv)`` is byte-stable across reruns.
  - The Python emit's ``select_plan_ref`` matches the pure
    ``select_plan`` selector on every randomised feature vector.

  Compilation acceptance: both the C11 and C++ dispatcher emits
  pass ``cc/c++ -std=c11/-std=c++17 -fsyntax-only`` (compiler-gated
  tests).
