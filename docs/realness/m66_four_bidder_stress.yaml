claim: |
  M-66 (Phase D paper-claim closure): the Section-7 dream's flagship
  four-bidder stress. Four distinct providers (CReferenceProvider +
  ClaudeCodeKernel-stub + TritonTemplate-cpu-fallback +
  UserKernelProvider) bid against the same KernelContractV3 in the
  same auction; all reach M-44 verification; the selector picks the
  winner by perf among verified bids; runner-up certificates and
  bids land in the auction report for tactician analysis. The
  canonical_contract_hash of every bidder's certificate matches
  byte-for-byte (M-58 + M-64 invariants hold under multi-provider
  fulfilment).

  Hard contract:

  1. The auction is run in-process via
     ``compgen.graph_compilation.kernel_auction.run_kernel_auction``
     with an explicit ``ProviderRegistry`` carrying all four
     providers. ``mode="multi-bidder"`` and ``bid_cutoff=4`` so all
     four reach ``fulfill()``.
  2. All four providers must appear in ``auction_report.json::bids``;
     ``fulfilled`` size matches; ``verified`` size matches.
     ``winner_provider`` is non-empty;
     ``runners_up.json::runners_up`` lists the three losers.
  3. Every certificate emitted (winner + per-provider runner-up
     under ``auction/<task>/verified/<provider>/``) shares the same
     ``canonical_contract_hash`` — proves that four different
     provider implementations targeting the same contract produce
     bit-equivalent canonical-hash kernels.
  4. The user-supplied kernel (``UserKernelProvider``) bids the
     highest confidence (0.92) + lowest perf (1.4us) and wins; the
     in-tree CReferenceProvider (0.85 / 2us) is one of the runner-
     ups. The win order proves that user-space kernels can beat
     baseline, not just place.
