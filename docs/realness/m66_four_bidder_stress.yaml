notes: |
  Phase D step 12 — the paper-claim closure. The test runs in
  ~1m40s and exercises every Phase D surface: M-55 registry, M-56
  bid/fulfill, M-57 auction, M-58 canonical hash, M-59 contract
  feedback, M-60 contract field completion, M-61 predicates, M-62
  user-space provider, M-63 coverage-first, M-64 versioning.

  Pre-existing scaffolding consumed:
  - ``CReferenceProvider`` (M-57) — in-tree baseline.
  - ``UserKernelProvider`` (M-62) — filesystem-indexed user
    kernel from a tmp dir.
  - ``ProviderRegistry`` + ``run_kernel_auction`` (M-55+M-57) —
    explicit registration; the default_registry()'s entry-point
    discovery is bypassed for test determinism.

  Stub providers (test-local):
  - ``_ClaudeCodeStubProvider`` — stand-in for the real Claude-Code
    in-session subagent, which would invoke the M-43 commit flow
    rather than fulfilling in-process. Same bid + result shape;
    different kernel source string.
  - ``_TritonTemplateCpuFallbackProvider`` — stand-in for the real
    TritonTemplateProvider on a non-CUDA host. Bids low confidence
    (0.4) since CPU + Triton template isn't a real path.

  Honest residuals:
  - The two stubs are TEST-LOCAL stand-ins; they prove the auction
    surface accommodates four bidders, not that real Claude-Code
    + real Triton would produce these specific bids on a CUDA
    host. Replacing the stubs with the real providers when running
    against cuda_sm75 is the M-65 Slice 3 path (deferred).
  - The user kernel's perf priors (1.4us, 0.92 confidence) are
    declared in the test's user_kernel_manifest.yaml. Real-world
    user manifests should declare perf priors based on actual
    measurements; the auction's M-44 verifier still runs on every
    bid so misleading priors waste top-K capacity but don't let
    unsafe artifacts through.
  - The bid_cutoff=4 lets all four bidders reach fulfill();
    bid_cutoff=3 (the default) would drop the lowest-confidence
    bidder (TritonTemplate-cpu-fallback at 0.4) — sound triage,
    but it'd produce a 3-bidder report instead of a 4-bidder one.
