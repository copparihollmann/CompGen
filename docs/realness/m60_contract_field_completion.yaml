claim: |
  M-60 (Phase D): populates today-empty kernel-facing contract fields
  from the target profile YAML and the M-17.1 region dossier. Every
  field a real kernel codegen provider would use is now non-default
  for at least one canonical model.

  Hard contract:

  1. ``KernelContractV3.from_recipe`` reads five new optional fields
     from ``target_profile``:
     - ``peak_compute_per_dtype`` (dict[str, float], TFLOPS per dtype)
     - ``mma_shapes`` (dict[str, tuple[int,int,int]] — empty on CPUs)
     - ``codegen_hints`` (tuple[str, ...] — provider prompt context)
     - ``register_quota_per_thread`` (int, bytes — defaults 256)
     - ``max_concurrent_blocks`` (int — defaults 0 = unbounded)
     Each is read with a sensible default so pre-M-60 target YAMLs
     still work unchanged.
  2. ``configs/targets/host_cpu.yaml`` ships the M-60 fields:
     ``peak_compute_per_dtype: {f32: 0.1, fp32: 0.1}``;
     ``codegen_hints`` carrying AVX2/AVX-512 SIMD guidance, row-major
     access preference, and accumulator-in-registers; empty
     ``mma_shapes`` (CPUs have no hardware MMA tiles);
     ``register_quota_per_thread: 256``; ``max_concurrent_blocks: 0``.
  3. ``KernelContractV3.from_recipe`` now derives ``MemorySpec``
     (input_tiers, output_tiers, lifetimes) from the region dossier's
     ``reuse.inputs[*].lifetime_class`` and ``reuse.outputs[*]``
     facts via the new module-level helpers ``_lifetime_class_to_tier``
     and ``_live_after_for_consumer_count``.
     The mapping: ``transient`` → ``MemoryTier.SCRATCHPAD``;
     ``persistent`` / ``input`` / unknown → ``MemoryTier.HOST``
     (CPUs main memory; CPUs are the contract pipeline default).
     Per-output ``BufferLifetime.live_after`` is derived from
     ``consumer_count``: 0 → ``end_of_region``, 1 → ``next_consumer``,
     >1 → ``all_consumers``.
  4. ``contract_to_dict`` (kernel_contract_materialization.py) and
     ``_reconstruct_contract_from_dict`` (kernel_codegen_response.py)
     both round-trip the M-60 hardware fields. Pre-M-60 cert bodies
     still load (defaults preserve compatibility); fresh runs carry
     the new fields verbatim.
  5. ``_derive_memory_spec`` falls back to today's hardcoded
     SCRATCHPAD-everywhere default when the dossier lacks reuse facts,
     defending the V3 ``__post_init__`` arity invariants on dossier
     omissions. ``in_place_safe`` stays False; matmul outputs do not
     alias matmul inputs by contract.
