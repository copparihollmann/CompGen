forbidden:
- HardwareEnvelope new fields leaking into compiler_only() (they belong in kernel_facing(); the kernel codegen genuinely needs codegen_hints + mma_shapes + peak_compute to make register/tile decisions)
- contract_to_dict dropping any of the M-60 hardware fields (round-trip must preserve every kernel-facing field, otherwise the M-44 verifier reads a different shape than M-40 wrote)
- region dossier omissions raising — _derive_memory_spec falls back to defaults (the dossier may lawfully omit reuse facts on partial pipelines)
- silently using SCRATCHPAD for input tensors when the dossier marks them as "input" (input-class tensors come from main memory; mapping them to SCRATCHPAD would break the M-44 memory-tier obligation)
- target YAMLs declaring a non-CPU mma_shapes value as an empty list (mma_shapes is a dict; empty dict is the CPU default; any list-typed value is malformed and should fall back to {})
