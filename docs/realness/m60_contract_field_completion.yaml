notes: |
  Phase D step 6 — closes Section 7's "the contract is the calling
  convention" claim by populating the kernel-facing fields a real
  codegen provider would use.

  Pre-existing scaffolding consumed:
  - ``HardwareEnvelope`` dataclass (kernels/contract_v3.py from
    Phase B). M-60 was always going to be a population pass, not a
    schema change — the fields existed; from_recipe just left them
    at default.
  - ``MemoryTier`` enum (REGISTER, SCRATCHPAD, L2, DEVICE_DRAM, HOST)
    — M-60 picks the right enum value per lifetime_class.
  - Region dossier (M-17.1) ``reuse.inputs`` / ``reuse.outputs``
    fields — the canonical lifetime + consumer-count facts.

  Real-driven evidence (`/tmp/m60_stress`, regenerated post-fix):
  - Materialised contract for merlin_mlp_wide matmul_0 carries
    ``codegen_hints`` (3 entries from host_cpu.yaml),
    ``peak_compute_per_dtype.f32 = 0.1``,
    ``register_quota_per_thread = 256``,
    ``max_concurrent_blocks = 0``,
    ``mma_shapes = {}``.
  - ``input_tiers = [host, scratchpad]`` (one input-class, one
    transient-class), ``output_tiers = [scratchpad]`` (transient).
    ``lifetimes[0].live_after = "next_consumer"`` (consumer_count=1).
  - Round-trip through M-44 reconstruct + canonical_contract_hash
    yields a stable hash; tampering compiler-only fields doesn't
    change it.

  Tests: 8 in tests/graph_compilation/test_contract_field_completion.py
  covering host_cpu.yaml drives HardwareEnvelope, dossier drives
  MemorySpec input/output tiers + lifetimes,
  _lifetime_class_to_tier unit, _live_after_for_consumer_count unit,
  _derive_memory_spec with dossier + fallback when missing,
  round-trip preserves every M-60 field, empty target_profile falls
  back to defaults.

  Cross-suite regression: 142/142 across 14 test suites
  (test_provider_routing, test_provider_bid, test_kernel_certificate,
  test_contract_verifier, test_canonical_contract_hash,
  test_kernel_codegen_request, test_kernel_codegen_response,
  test_kernel_contract_materialization, test_kernel_auction,
  test_registry_wired, test_contract_feedback_apply,
  test_contract_field_completion, test_contract_hash,
  test_region_kernel_binding).

  Honest residuals:
  - Only host_cpu.yaml ships M-60 fields today; cuda_sm75 etc. fall
    back to defaults. M-65's vertical slice 3 will exercise GPU
    targets; populating GPU mma_shapes / peak_compute_per_dtype
    happens then.
  - The ``HOST`` tier is used as the default for input-class /
    persistent / unknown lifetime_class. CPU contracts get the
    correct mapping; GPU contracts will need the bridge to use
    ``DEVICE_DRAM`` instead. That's a 4-line target-aware refinement
    in M-65.
  - M-44 verifier obligations cover input/output shape, dtype,
    layout, accumulator, dispatch_model. M-60's new HardwareEnvelope
    fields don't yet drive verifier obligations (the contract just
    carries them through to the provider). M-61's predicate DSL adds
    obligations that consume them.
