claim: |
  M-48 (Phase C): the body of ``assert_plan(io)`` in the M-47 emitted
  executor is GENERATED from each region's M-40 contract + the M-46
  binding. Every check fires a typed ``PLAN_VIOLATION_<KIND>``
  subclass naming the failed invariant.

  Generated typed kinds:

  ::

      PLAN_VIOLATION_IO_TYPE          io is not a dict
      PLAN_VIOLATION_INPUT_COUNT      not enough io tensors for contract inputs
      PLAN_VIOLATION_INPUT_DTYPE      io tensor dtype not in contract.dtype_class
      PLAN_VIOLATION_INPUT_SHAPE      io tensor shape != contract dims
      PLAN_VIOLATION_INPUT_BYTES      numel * element_size != expected bytes
      PLAN_VIOLATION_LAYOUT           tensor non-contiguous when contract says row_major
      PLAN_VIOLATION_BUFFER_SIZE      planner-allocated buffer size mismatch (M-49 wires)
      PLAN_VIOLATION_EVENT_WRITERS    >1 producer for an event
      PLAN_VIOLATION_UNBOUND_REGION   region declared in plan with no certified kernel

  All subclasses inherit from ``PlanViolation(RuntimeError)`` so
  callers can ``except PlanViolation`` for any of them. The test
  suite asserts every kind is reachable via fault injection.
