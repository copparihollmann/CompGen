notes: |
  Phase C M-48. Real-driven stress test:

  Phase 1 — drove merlin_mlp_wide through ``--stop-after glue-emit``
  with a contract-compliant provider response. The emitted module
  carries the M-48 typed PlanViolation hierarchy and the generated
  per-region assertion body.

  Phase 2 — for each typed kind, injected one fault and asserted the
  matching subclass fires:
   - PLAN_VIOLATION_IO_TYPE: io = "not a dict" ✓
   - PLAN_VIOLATION_INPUT_COUNT: only 1 input when contract requires 2 ✓
   - PLAN_VIOLATION_INPUT_SHAPE: A.shape = (99, 99) instead of (16, 16) ✓
   - PLAN_VIOLATION_INPUT_DTYPE: A is float64 instead of float32 ✓
   - PLAN_VIOLATION_INPUT_BYTES: synthetic Tensor reports wrong numel/element_size ✓

  Phase 3 — well-formed io passes all assertions and dispatches; the
  runtime returns a Tensor of expected shape (16, 32). The asserts
  do not produce false positives.

  Tests: 7 in tests/runtime/test_plan_assertions.py covering each
  PLAN_VIOLATION_<KIND> negative control + the type-hierarchy
  invariant (every typed subclass is a PlanViolation).

  Honest residuals:
  - PLAN_VIOLATION_BUFFER_SIZE is declared as a typed class but the
    fault-injection path requires M-49 (the executor allocating
    planned buffers from the contract memory tier spec) before the
    assertion can fire. Today it's a forward-looking subclass.
  - PLAN_VIOLATION_EVENT_WRITERS is declared and the static check is
    generated, but only fires on multi-region plans where two
    regions declare the same event name. M-51 wires the runtime
    "exactly-N writers" check on EventTensor.
  - The IO binding is positional today (dict insertion order →
    contract input order). M-49 wires named binding (operator
    passes a dict that's resolved against contract input names).
