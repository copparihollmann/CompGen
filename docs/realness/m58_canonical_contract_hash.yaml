forbidden:
- canonical_contract_hash including compiler-only fields (FusionPolicy, ObservabilitySpec, dispatch concurrency_limit, observability hooks, lifetimes)
- canonical_contract_hash being computed off something other than kernel_facing() projection (the contract author defines the boundary; M-58 must not extend it)
- breaking the existing hash_contract contract (Phase B/C callers must continue working — hash_contract returns the instance hash, identical bytes)
- emitting a certificate without populating canonical_contract_hash (the helper is best-effort, but the field must always exist; empty string is the only acceptable degraded value)
- region_kernel_bindings.json dropping the canonical_contract_hash key (every bound row carries it; round-trip through to_dict/from_dict preserves it)
