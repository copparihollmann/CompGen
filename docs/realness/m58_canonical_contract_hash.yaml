claim: |
  M-58 (Phase D, Section 7 step 4): introduces the canonical
  shape-class hash so contracts that differ only in concrete shape
  values within the same class collide on a single hash, enabling
  cross-model recipe-library lookup. The historical
  ``hash_contract`` is renamed ``instance_contract_hash`` (with a
  backward-compatible alias) and a new ``canonical_contract_hash``
  ships alongside it.

  Hard contract:

  1. ``promotion/contract_hash.py`` exposes three functions:
     - ``instance_contract_hash(contract)`` — the historical hash,
       keyed on concrete kernel-facing fields (including dim ints).
     - ``canonical_contract_hash(contract)`` — same projection, but
       every IO ``shape.dims`` entry passes through
       :func:`compgen.promotion.region_signature._abstract_dim`
       before hashing. Concrete int dims are preserved verbatim;
       ``None`` becomes ``{"dynamic": true}``; pre-abstracted
       ``{"mod": k}`` entries are normalised. Two contracts with
       concrete dims that match within the same class hash
       identically.
     - ``hash_contract(contract)`` — backward-compatible alias for
       ``instance_contract_hash``. Phase B/C callers continue to
       work without churn; Phase D code uses the explicit names.
  2. Compiler-only fields (FusionPolicy, ObservabilitySpec, etc.)
     are excluded from BOTH hashes by construction — only fields the
     kernel codegen is allowed to read participate.
  3. ``KernelCertificate`` (M-45) gains a ``canonical_contract_hash``
     field. ``emit_certificate`` derives it from the materialised
     contract; the cert filename keeps the instance-hash convention
     for backward compatibility (Phase C cert lookups still work).
  4. ``find_certificate_by_canonical_hash(run_dir, canonical_hash)``
     in ``kernels/kernel_certificate.py`` walks
     ``04_kernel_codegen/certificates/*.json`` and returns the first
     cert whose ``canonical_contract_hash`` matches. This is the
     cross-model lookup primitive the M-63 coverage-first scheduler
     consumes.
  5. ``RegionKernelBinding`` (M-46) and ``BindingRow``
     (graph_compilation/execution_plan_emit.py) gain a
     ``canonical_contract_hash`` field. The plan emit pulls it from
     the certificate body; ``region_kernel_bindings.json`` carries
     both hashes so a downstream plan executor can perform the
     cross-model lookup without re-hashing.
