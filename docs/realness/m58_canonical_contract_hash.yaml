notes: |
  Phase D step 4. The cross-model cache leverage half of Section 7
  (Job 3 — caching). M-55..M-57 already gave the auction a way to
  produce verified kernels; M-58 makes those kernels reusable across
  models that share a shape class.

  Pre-existing scaffolding consumed:
  - ``encode_shape_class`` + ``_abstract_dim`` from
    ``promotion/region_signature.py`` (Phase B). M-58 lifts the
    abstraction primitive into the contract-hash pipeline rather
    than duplicating it.
  - ``hash_contract`` (M-41 / M-42 / M-43 / M-44 / M-45 / M-46
    callers) — kept as a thin alias so no Phase C call site needs
    churn.
  - ``KernelCertificate`` schema (M-45). The new field is appended
    with a default of ``""``, so ``from_dict`` on pre-M-58 cert
    bodies still works.

  Real-driven evidence (`/tmp/m57_e2e` from M-57 stress, regenerated):
  - ``04_kernel_codegen/certificates/4838412db0b5c6b8.json`` now
    carries ``canonical_contract_hash: 4838412db0b5c6b8`` (concrete
    contract → canonical == instance, as expected).
  - ``05_execution_plan/region_kernel_bindings.json`` bound row for
    matmul_0 carries the same canonical hash.
  - Test ``test_dynamic_concrete_pair_differ_on_instance_match_on_canonical``
    proves a contract with all dynamic dims hashes differently from
    its concrete instantiations under both functions — and the
    dynamic canonical hash is byte-stable across reruns.

  Tests: 11 in tests/kernels/test_canonical_contract_hash.py covering
  instance-vs-canonical equality on concrete contracts (3),
  byte-stability (2), kernel_facing field sensitivity + compiler_only
  invariance (2), certificate carries canonical (3), binding carries
  canonical (1). Phase C/D regression preserved (74/74 across
  test_kernel_certificate, test_contract_verifier, test_provider_bid,
  test_region_kernel_binding, test_kernel_codegen_response,
  test_kernel_auction, test_registry_wired, test_contract_hash).

  Honest residuals:
  - The shape-class abstraction today only handles ``None`` (dynamic)
    and ``{"mod": k}`` / ``{"dynamic": true}`` pre-abstracted entries.
    True divisibility classes (e.g. "any K divisible by 16")
    require ShapeClass to carry richer abstraction metadata —
    deferred to a future M-58.1 (or M-64's refinement-contract path).
  - The cert filename remains keyed on instance hash. Migrating to
    canonical-hash filenames is a deeper change (M-46 and the M-43
    commit path both index by filename); that's deferred until the
    coverage-first scheduler (M-63) actually exercises cross-model
    lookup at scale.
  - Promotion library (``promotion/promote.py``) does not yet route
    cache hits via canonical hash; it still keys promoted recipes
    on instance hash + region signature. M-63 will exercise the
    canonical path at scale; until then, M-58's cross-model
    primitive (find_certificate_by_canonical_hash) is the
    integration point.
