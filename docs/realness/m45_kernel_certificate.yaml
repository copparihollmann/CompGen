notes: |
  Phase C M-45. Real-driven stress test:

  Phase 1 — drive 6 canonical models through the full M-40 → M-42
  → M-43 → M-44 → M-45 chain. 5/5 set_tile_params models produced a
  certificate at the canonical path, all paper_claimable=True (no
  fallback used). proxy_vla honestly emitted not_applicable
  (fusion candidate; M-50+ widens scope).

  Phase 2 — tamper test: edited merlin_mlp_wide's kernel_source.c
  AFTER the certificate was emitted. Pre-tamper validate=True;
  post-tamper validate=False with failure_kind=artifact_hash_drift
  and drifted={"kernel_source"}. The cert correctly detects the
  drift and would refuse a downstream M-46 binding attempt.

  Tests: 12 cases in tests/kernels/test_kernel_certificate.py
  covering schema round-trip, emit, paper_claimable=False on
  fallback, and 5 typed-drift negative controls (artifact drift,
  report drift, missing artifact, missing report, fresh cert
  validates).

  Honest residuals:
  - The certificate is emitted only when the M-44 verifier returns
    overall=pass. When deferred verdicts dominate (e.g. matmul-only
    differential, M-47/M-48 deferred memory/event checks), the
    response surfaces as next_action=verifier_pending and no cert
    is emitted yet — the certificate is only meaningful with a
    completed verification.
  - Fallback policy is wired in M-43 (CLI flag), but the operator
    must opt in explicitly. The cert truthfully records the
    fallback state via paper_claimable.
