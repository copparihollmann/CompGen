claim: |
  M-45 (Phase C): when M-44's contract-driven verifier accepts a
  kernel response, M-43's commit tool emits a typed
  ``KernelCertificate`` at
  ``04_kernel_codegen/certificates/<contract_hash>.json``. The
  certificate is the single artifact M-46 (plan ↔ kernel binding) is
  allowed to consult — kernels without a matching certificate cannot
  be bound into an execution plan.

  The cert binds (contract_hash, task_id, region_id, candidate_id,
  per-artifact sha256[:16], verifier_report_hash, frozen claims,
  accepted_at_utc, paper_claimable, fallback_used). It is keyed by
  contract_hash so M-46 looks up by the canonical key from M-41.

  ``validate_certificate`` re-hashes every artifact + the verifier
  report and compares to the cert's recorded hashes. Any drift is a
  typed ``artifact_hash_drift`` or ``verifier_report_drift``. Missing
  files yield ``missing_artifact`` / ``missing_verifier_report``.
  This mirrors the M-37.13
  ``certificate_artifact_hash_changed`` negative-control pattern.

  ``paper_claimable`` is ``True`` only when no fallback was used
  during kernel codegen (e.g. the operator did NOT pass
  ``--kernel-fallback-policy explicit-reference-only``).
