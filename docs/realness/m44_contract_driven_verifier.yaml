claim: |
  M-44 (Phase C, LOAD-BEARING): the verifier obligation list is
  generated mechanically from ``KernelContractV3`` fields. There is
  no hardcoded check list; every contract field that has a verifiable
  invariant maps to one obligation, and every obligation maps to one
  ``verify_*`` callable. Adding a contract field without adding a
  verifier (or vice versa) breaks
  ``test_obligation_count_matches_contract_fields`` loud.

  Mapping (Section 7's table):

  ::

      io.inputs[*].shape           → input_shape_match
      io.inputs[*].dtype_class     → input_dtype_match
      io.inputs[*].layout          → input_layout_match
      io.outputs[*].shape          → output_shape_match
      numerics.accumulator_dtype   → accumulator_dtype_match
      numerics.max_relative_error  → differential_within_higham_bound
      numerics.deterministic       → deterministic_repeat_run (deferred to M-47)
      sync.event_decls             → event_signalled_once
      memory.input_tiers           → memory_tier_match (deferred to M-48)
      memory.output_tiers          → memory_tier_match (deferred to M-48)
      dispatch.model               → dispatch_model_match
      hardware.target_name         → target_name_match

  The differential check uses the M-37.13 Higham bound
  (``matmul_higham_bound``); never a hand-picked constant.
  Verification report lives at
  ``04_kernel_codegen/validation/<task_id>.validation.json``.
  Wired into the M-43 commit flow: an accepted response is verified
  immediately; a fail returns the typed failure_kind to the M-43
  retry policy; deferred obligations (memory tier, runtime
  determinism) wait for M-47/M-48.
