claim: |
  M-46 (Phase C): the ``ExecutionPlan`` carries one
  ``RegionKernelBinding`` per region whose M-45 certificate exists.
  The pipeline emits ``05_execution_plan/execution_plan.yaml`` plus a
  per-region sidecar ``05_execution_plan/region_kernel_bindings.json``
  describing the (region_id, contract_hash, certificate_path,
  kernel_artifact, dispatch_model) tuples.

  Hard rule: ``ExecutionPlan.validate_with_run_dir(run_dir)`` rejects
  any binding whose certificate file is missing OR whose certificate
  contract_hash does not match the binding contract_hash. The plan
  executor (M-47) refuses to call any kernel without a passing
  binding.

  Regions whose certificates do not yet exist (provider response not
  committed, or M-44 verification rejected) surface as ``unbound``
  with a typed ``unbound_reason``. The plan is still emitted ‚Äî M-47's
  runtime check will refuse to dispatch unbound regions, never
  silently elide them.
