notes: |
  Phase C M-46. Real-driven stress test:

  Phase 1 ‚Äî drove 6 canonical models through
  --stop-after execution-plan-emit BEFORE submitting any provider
  response. All 6 emitted the plan with bound=0/unbound=N rows, each
  carrying a typed unbound_reason ("no_certificate; provider response
  not yet committed").

  Phase 2 ‚Äî for each set_tile_params model, synthesized a contract-
  compliant provider response, ran commit_response (M-43 ‚Üí M-44 ‚Üí
  M-45 chain), and re-emitted the plan. All 5 flipped from
  unbound=1 to bound=1; the binding's certificate_path resolved to
  a real M-45 certificate; validate_with_run_dir passes. proxy_vla
  honestly remained not_applicable (fusion candidate, M-50+ widens).

  Phase 3 ‚Äî tamper test: edited merlin_mlp_wide's kernel.c AFTER
  the bind. M-46's validate_with_run_dir alone passes (it checks
  cert file existence + contract_hash match), but the M-45
  certificate validator (validate_certificate) immediately returns
  valid=False with failure_kind=artifact_hash_drift. M-47 chains
  both checks before dispatch.

  Tests: 10 cases in tests/runtime/test_region_kernel_binding.py
  covering schema round-trip, structural invariants (duplicate
  bindings, unknown region, empty fields, unknown dispatch_model),
  and run_dir-strict validation (missing cert, mismatched hash,
  well-formed). M-46 + M-45 together: 22 pass.

  Honest residuals:
  - The plan emits even when bound=0; M-47 surfaces this as a
    runtime PLAN_VIOLATION when the executor tries to dispatch
    unbound regions.
  - Multi-region plans (one model with 2+ matmul regions) emit one
    binding per region. Today's canonical set has at most one
    matmul region per model so this isn't exercised end-to-end yet.
