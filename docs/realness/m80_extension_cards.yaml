feature_id: m80_extension_cards
claim: |
  M-80: official provider / target / dialect cards land under
  ``python/compgen/{providers,targets,dialects}/cards/*.yaml``.

  Shipped inventory:

  * **19 provider cards** (1 over the original 18 — adds the
    existing ``claude_kernel`` agent-driven provider).
    paper_claimable=true only on ``cffi_c`` (promote) and ``triton``
    (promote); every other external-SDK provider stays at
    ``probe``. ``python_reference`` is at ``verify`` (correctness
    fallback, not paper-claimable). ``autocomp``, ``kernelblaster``,
    ``claude_kernel`` at ``generate``.
  * **13 target cards** spanning host_cpu, cuda_sm75/80/90,
    rocm_gpu, aws_neuron_trn/inf, google_tpu_v5e/v6e, gemmini_mx,
    radiance_muon, hexagon_npu, saturn_opu.
  * **10 dialect provider cards** for cuda_tile_ir, hexagon_mlir,
    pallas, nki, exo, gemmini_c, radiance_muon, iree, triton_mlir,
    stablehlo.

  ``python/compgen/providers/card_loader.py`` discovers cards and
  exposes ``iter_provider_cards``, ``iter_target_cards``,
  ``iter_dialect_cards``, ``load_all_cards``.

  Hard contract enforced by ``tests/providers/test_card_inventory.py``:

  1. Every card under the three roots loads via the M-79 schema.
  2. The complete Phase F roadmap inventory is present (no missing
     IDs).
  3. ``paper_claimable: true`` only at ``integration_level`` of
     ``verify`` or ``promote`` (hard rule 6).
  4. Every SDK-gated provider declares non-empty ``required_env`` /
     ``required_python_imports`` / ``required_commands`` so the
     M-81 probe can block honestly (no silent disappearance).
  5. The verify/promote count never outweighs probe/generate at
     a 2:3 ratio — catches paper-claim inflation drift.
  6. Every ``target_family`` a provider references has a matching
     ``TargetCard`` (modulo synthetic ``custom_accelerator`` /
     ``riscv_opu`` catch-alls).

  Tests (12/12 green):

  * ``tests/providers/test_card_inventory.py``

  Vendoring confirmed forbidden: every external-SDK card uses
  env vars (``CUDA_TILE_ROOT``, ``HEXAGON_MLIR_ROOT``,
  ``CUTLASS_ROOT``, ``THUNDERKITTENS_ROOT``, ``CHIPYARD_ROOT``,
  ``GEMMINI_ROOT``, ``RADIANCE_KERNELS_ROOT``,
  ``RISCV_TOOLCHAIN_PATH``, ``NEURON_HOME``, ``AUTOCOMP_ROOT``,
  ``KERNELBLASTER_ROOT``, ``KERNELBENCH_ROOT``, ``CAESAR_ROOT``,
  ``MIRAGE_ROOT``, ``TILELANG_ROOT``, ``IREE_ROOT``) — never a
  vendored checkout.
realness_level: production_path
forbidden:
  - card without integration_level
  - card with paper_claimable=true at integration_level <= probe
  - vendoring external repositories
  - declaring a status outside the typed enum
  - SDK-gated provider with empty required_env/imports/commands
  - paper-claim inflation (verify+promote outweighing probe+generate)
