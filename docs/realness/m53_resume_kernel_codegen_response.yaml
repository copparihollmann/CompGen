notes: |
  Phase C M-53 — closes the agentic-CLI-flow gap surfaced by the
  Phase C honest real-execution audit. The audit drove M-40 → M-47
  with a real cffi-compiled C matmul and discovered that the only way
  to keep the operator-committed response alive across the pipeline
  restart was to drop into Python and call M-46/M-47 emitters
  in-process. M-53 makes the same chain run from the CLI alone.

  Real-driven CLI smoke (/tmp/m53_smoke.py — preserved as evidence):

  Step 1: ``compgen.graph_compilation run --stop-after kernel-codegen-request``
  produces ``04_kernel_codegen/{requests,contracts,views}``.

  Step 2: operator writes a real cffi-C matmul (16x16 @ 16x32 = 16x32),
  compiles via ``ffi.compile(tmpdir=...)``, and calls
  ``kernel_codegen_response.commit_response()``. M-44 verifier
  accepts; M-45 emits ``certificates/4838412db0b5c6b8.json``.

  Step 3: ``compgen.graph_compilation run --stop-after glue-emit
  --resume-from kernel-codegen-response`` runs in 1.5s (vs ~12s
  full pipeline). cert + .so + attempts trail all SURVIVED. M-46
  emitted ``region_kernel_bindings.json`` with ``bound_count=1``.
  M-47 emitted ``generated_plan_executor.py`` with
  ``KERNEL_BINDINGS=['matmul_0']``.

  Step 4: imported the executor, plugged in the real cffi kernel,
  ran ``compgen_run({A, B}, kernels, runtime=CpuRuntimeAdapter())``.
  Output shape ``(16, 32)``, ``max_abs vs torch.matmul = 1.91e-6``,
  Higham bound ``1.07e-4`` — within bound.

  Tests: 5 in tests/graph_compilation/test_resume_from_kernel_codegen_response.py
  (preserve-artifacts-on-resume, drive-M-46-to-glue-emit, honest
  errors when requests dir missing, honest errors when contracts dir
  missing, real-chain end-to-end via CLI alone with cffi-C kernel +
  Higham bound check). The end-to-end test is the M-54 real-chain
  stress test landing in the same milestone.

  Honest residuals:
  - Resume mode does not yet support ``--stop-after glue-differential``
    re-runs that need golden inputs/outputs — those are still produced
    by the full pipeline. Glue-differential is the M-49 paper-facing
    surface, separately green; M-53's scope is the
    request→response→cert→bind→glue-emit chain only.
  - The M-31A trust report's
    ``import_provenance_and_no_subprocess_modules`` gate runs against
    a fresh capture; resume runs do not re-execute graph_capture, so
    the trust report should be run on the original capture artefacts
    (this is documented in phase_c_status.md, not enforced in code).
  - Real audit script preserved at ``/tmp/m53_smoke.py`` and the
    evidence-bearing test ``test_real_chain_via_cli_only`` in
    ``tests/graph_compilation/test_resume_from_kernel_codegen_response.py``.
