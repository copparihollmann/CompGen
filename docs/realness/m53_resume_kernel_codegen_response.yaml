claim: |
  M-53 (Phase C, gap closure): the pipeline supports
  ``--resume-from kernel-codegen-response`` so an operator-driven
  agentic kernel-codegen flow runs end-to-end through the CLI alone.

  Without this mode, every ``compgen.graph_compilation run`` invocation
  rm-rfs ``out_dir`` at the top of the run (``run.py:343``), destroying
  the committed response, the M-43 attempts trail, the M-45
  certificate, and the provider's compiled artefacts. With this mode,
  the wipe is suppressed, the early stages (graph_capture,
  payload_lowering, graph_analysis, recipe_planning,
  kernel_specialization_request) are skipped, and M-46 + M-47 + M-49
  are driven on the existing artefacts.

  Hard contract:

  1. ``--resume-from kernel-codegen-response`` REQUIRES that
     ``04_kernel_codegen/requests/`` already contains a committed
     request and ``04_kernel_codegen/contracts/`` already contains a
     materialised contract. Missing prerequisites raise a typed
     ``ValueError`` with the missing-path detail (no silent skip).
  2. Resume MUST preserve the on-disk state of:
     ``04_kernel_codegen/{requests,contracts,views,artifacts,
     responses,attempts,certificates,validation}``. The cardinal
     M-53 invariant is that the operator-committed response, the
     M-43 attempts trail, and the M-45 certificate survive the
     pipeline-restart boundary.
  3. After resume, M-46 ``execution_plan_emit`` MUST surface every
     committed certificate as a bound region. M-47 ``glue_emit`` MUST
     emit ``generated_plan_executor.py`` whose ``KERNEL_BINDINGS``
     contains the bound region(s).
  4. The full chain — kernel-codegen-request → operator commits real
     response → resume → glue-emit → import emitted executor → run
     against eager — is exercised by the M-54 real-chain stress test
     (`test_real_chain_via_cli_only`), driving merlin_mlp_wide with
     a real cffi-compiled C matmul and verifying the emitted
     executor's output against ``torch.matmul`` within the M-37.13
     Higham bound.
