notes: |
  Phase F-1. M-79 is pure substrate — schemas + sandbox path
  enforcement, no I/O beyond YAML/JSON parsing. Registries that
  *use* these schemas (auto-discovery, routing) land in M-80/M-81.
  M-82 will exercise the substrate by porting cffi-C and Triton
  through it as the first real adapters.
