claim: |
  Phase C ships an authoritative in-repo progress doc at
  ``docs/phase_c_status.md`` that survives session boundaries. Every
  Phase C milestone's done condition explicitly requires updating this
  doc with the new commit hash, evidence paths, and test count in the
  same commit that ships the milestone work. If the doc is not updated
  in-commit, the milestone is not done — the
  ``phase_c_status_consistency`` audit gate fails.

  This complements (does NOT replace) realness contracts and the caveat
  ledger:

  - ``docs/realness/m<N>_*.yaml`` — per-milestone forbidden constructs
    and required evidence (declarative).
  - ``results/audit/_seed/caveat_ledger.json`` — machine-readable
    honest residuals (when does a claim NOT hold).
  - ``docs/phase_c_status.md`` — the human-facing progress narrative
    that any future session can read on day one to answer "what's
    done, what's next, what's blocking".

  Session-scoped TaskCreate/TaskUpdate is INSUFFICIENT for a
  multi-week, multi-session phase: context resets erase it; commit
  messages bury the headline behind diff detail; trust reports are
  point-in-time snapshots. The status doc is the only single source of
  truth that carries the milestone-by-milestone narrative.
commit: c3b8a300000000000000000000000000000000
created_at_utc: 2026-05-07T00:00:00Z
feature_id: phase_c_status_tracker
forbidden:
- milestone marked complete in status doc without a corresponding commit
- status doc not updated in the same commit that flipped a milestone to complete
- evidence paths in status doc that point to nonexistent files
- session-scoped TaskCreate as the only progress tracker for a multi-milestone phase
- ad-hoc progress notes in commit messages instead of structured status-doc rows
- removing rows from the milestone table once added (table is append-only)
realness_level: production_path
required_evidence:
- docs/phase_c_status.md
- docs/realness/phase_c_status_tracker.yaml
- scripts/dev/build_trust_report.py (will gain phase_c_status_consistency gate at M-43+)
- python/compgen/audit/trust_report.py (audit-gate machinery)
notes: |
  Bootstrap milestone for Phase C (M-40..M-52). The contract and the
  status doc itself are the load-bearing artifacts; Phase C is the
  test bed for the persistent-tracking discipline that future phases
  will inherit.

  The ``phase_c_status_consistency`` audit gate is added incrementally:
  - M-43+ adds the gate skeleton to ``trust_report.py``.
  - M-49 (paper-facing) requires the gate to be PASS before the paper
    claim can be honestly emitted.

  Until the audit gate lands, the discipline is enforced manually via
  per-milestone reviewer attention. The contract entry exists from
  bootstrap so the realness-scan baseline tracks Phase C from day one.

  This contract self-applies: the bootstrap commit that creates
  ``docs/phase_c_status.md`` ALSO populates this contract file, so the
  M-31A allowlist scan picks it up immediately.
