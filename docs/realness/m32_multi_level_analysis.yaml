claim: |
  Every analysis summary the pipeline emits — at every IR level (FX,
  Payload, Graph, Recipe, Semantic, Tile, Kernel, Plan, Runtime) — is
  registered in compgen.analysis.checkpoints.KNOWN_SUMMARIES with a
  stable id, declared dependencies, and the canonical artifact path.
  AnalysisIndex.from_run_dir walks a finished run, computes a
  content_hash for each summary, marks availability, and surfaces the
  full index in agent_decision_request.analysis_summaries. Pass cards'
  invalidates lists cross-link to known summary ids — the registry
  refuses to load a card that references an unknown id.
