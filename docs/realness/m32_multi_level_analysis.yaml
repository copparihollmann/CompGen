notes: |
  Section 20 / M-32. Second milestone behind the M-31A audit gate.

  Levels covered (ANALYSIS_LEVELS): fx, payload, graph, recipe,
  semantic, tile, kernel, plan, runtime. The ``graph`` level is the
  payload-derived graph-dossier bucket — a real intermediate level
  that earlier specifications collapsed into A1 (Payload) but which
  has its own dependency cluster (graph_dossier_v3 → region_map →
  candidate_actions → cost_preview → llm_action_space).

  M-32 is read-only: it indexes summaries already on disk; it does
  NOT generate new analysis. The pipeline already emits these; M-32
  types them. M-33 will use the dependency graph to enforce
  invalidation discipline (running a pass with
  invalidates: [graph_dossier_v3] must invalidate every transitive
  dependent before any downstream consumer reads).

  Cross-link: PassCardRegistry.load now validates that every card's
  invalidates id resolves to a registered summary. The
  validate_summary_invalidates flag exists for tests that build
  registries in isolation, but production callers leave it at True.
