notes: |
  The LLM doesn't need to be 100% correct. Even 65-75% of the
  tier assignments fixed pre-solve exponentially shrinks the
  MILP branch-and-bound. For TinyLlama-scale (22 layers × 12
  regions = 264 buffers), the dominant win is stage
  decomposition: each layer's 12-buffer MILP solves in ~80ms,
  totalling ~30s for the full network — down from "still
  running at 1h37min" without hints.

  Wrong hints don't crash the planner; they fall into one of:
  (a) skipped (tier not allowed); (b) infeasible sub-stage → fall
  back to monolithic MILP; (c) ordering constraints (symmetry
  break) — these don't change the feasible set, only the
  search order.

  The LLM call itself is NOT in this module — operators run
  Claude Code / another LLM against the typed request document
  emitted by ``write_llm_hint_request`` and write the response
  back to a path on disk. ``llm_file`` mode reads from there.
  This keeps the solver layer free of network calls and LLM-
  provider plumbing.
