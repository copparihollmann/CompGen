claim: |
  The fresh-agent task pack carries the entire post-M-34 agentic
  surface a Claude Code session needs to drive a CompGen compile
  without prior chat context: 60 typed pass cards organized by
  family, the auto-generated INDEX.md taxonomy, all 10 realness
  contracts (M-26 through M-34), the 3 compgen skills, the realness
  policy doc, and a task prompt that explains the multi-step
  pass_plan path with phase ordering + pair contract rules. A fresh
  agent can read the realness contract for any subsystem and the
  pass card for any pass it might invoke without browsing source.
