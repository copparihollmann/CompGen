- docs/generated/pass_cards/INDEX.md (auto-generated taxonomy)
- tests/audit/test_fresh_agent_pass_scheduling_surface.py
- a real task pack containing 60 pass cards, 10 realness contracts, and the 3 compgen skills
notes: |
  Section 20 / M-35. M-31A.4 shipped the task-pack builder + holdout
  models + greedy baseline; M-35 closes the loop by asserting the
  pack now carries every artifact M-31..M-34 produced. The "fresh
  Claude Code session can use the tools through the public repo
  surface" claim is now testable end-to-end.

  Operator workflow unchanged from M-31A.4:
    1. operator builds task pack via scripts/dev/fresh_agent_task_pack.py
    2. opens fresh Claude Code session in the pack
    3. runs the task prompt
    4. records outcome via compgen.audit.fresh_agent_modes.record_manual_session_result

  Honest residual: spawning a fresh Claude Code session is operator-
  driven (CI cannot do it without defeating the no-private-context
  goal). The greedy baseline is the deterministic reproducibility
  floor; fresh-Claude is recorded in the caveat ledger.
