claim: |
  M-89 (Phase G — §12 Dream 1, companion to M-88): a **C++ host plan
  executor is emitted** per-workload from the same M-46 plan that
  M-88 (C11) and M-47/M-51/M-52 (Python) consume, baked for the
  ``cuda`` driver. The emitter at
  ``compgen.runtime.glue_emit.cpp_host.emit_cpp_host_executor``
  produces three artefacts under ``06_glue_emit/`` (sharing the
  ``generated_plan_executor.h`` ABI with M-88):

  - ``generated_plan_executor.cpp`` — ``extern "C" compgen_run`` that
    opens a ``cuda`` device via ``cg_rt_instance_create("cuda", ...)``,
    builds a command buffer, dispatches one
    ``cg_rt_command_buffer_dispatch`` per region in topological order
    with the CUDA push-constants layout (6 × uint32: grid_xyz,
    block_xyz), submits with a timeline semaphore, and waits for
    completion before returning.
  - ``generated_plan_executor.h`` — same ABI header M-88 emits.
  - ``plan_executor_cpp_host_manifest.json`` — schema-versioned;
    ``abi.driver_name = "cuda"``, ``abi.push_constants_layout =
    "u32[6]:grid_xyz,block_xyz"``, ``abi.uses_only_cg_rt = true``.

  Differential acceptance against M-88: both emitters consume the
  same plan, both produce the same ``region_order``, the same
  ``bound_regions`` list, and the same PLAN_VIOLATION code map.
  The M-91 D6 plan-refinement gate generalises this invariant:
  every plan op corresponds to exactly one emit launch in the
  declared order, regardless of the emit target.

  Compilation acceptance: the emit compiles cleanly with
  ``c++ -std=c++17 -Wall -Wextra -fsyntax-only`` against
  ``runtime/native/libcompgen_rt/include`` (verified by
  ``test_emit_parses_with_cxx_fsyntax_only``).
