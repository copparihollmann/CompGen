feature_id: m89_cpp_host_emitter
notes: |
  Phase G M-89 — second §12 Dream-1 emit target. Twin of M-88.

  Tests landed: 11 in tests/runtime/test_glue_emit_cpp_host.py:
  - schema (emit produces .cpp + .h + manifest);
  - manifest carries driver_name=cuda + push_constants_layout;
  - byte stability across reruns;
  - c++ -fsyntax-only syntactic validity (compiler-gated);
  - ABI lint: only cg_rt_* and compgen_kernel_* externs;
  - differential vs M-88 C11 emit on the same plan: same
    region_order, same bound_regions, same PLAN_VIOLATION codes;
  - dispatch count = bound region count;
  - unbound region triggers PLAN_VIOLATION_UNBOUND_REGION path;
  - header coexists with M-88's emit in the same 06_glue_emit dir.

  Architectural framing: the emit is just **the same shape** as
  M-88 with a different driver name baked in. This is exactly the
  §12 Dream-1 invariant: the plan is the same; the emit target
  differs. M-90 (PlanDispatchTable) generalises this so a single
  emit can carry several plans, each one a Dream-1 sibling.

  Honest residuals:
  - End-to-end CUDA execution differential against M-52's Python
    CUDA emitter is gated on real CUDA hardware; the gated test
    lives in ``tests/native/test_cpp_host_cuda_integration.py``
    (not auto-run in CI without a CUDA device).
  - The push-constants block is reserved with placeholder grid/block
    dims (1,1,1, 64,1,1); M-49's binding map writes the real launch
    geometry per-region.
  - The kernel-pack TU (``compgen_kernel_*`` definitions) is M-49's
    territory; the M-89 emit is the host launch loop that M-49's
    kernels register against.
