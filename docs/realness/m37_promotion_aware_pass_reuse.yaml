notes: |
  Section 20 / M-37. Final milestone of Section 20 — bridges the
  M-31..M-34 pass-card surface to the Section 19 promotion memory.

  Three sub-milestones shipped:

    M-37.1  PromotedCandidate gains pass_id + candidate_id; retrieval
            extracts them from recipe.evidence_summary in the M-26
            sidecar; tests assert the pass_id resolves against the
            card registry
    M-37.2  AblationResult gains promoted_candidates_count +
            promoted_hit; AblationPack summary surfaces a per-mode
            promoted_hit_count and a top-level promoted_hit_rate;
            the markdown renderer adds a "Warm-cache effectiveness"
            section
    M-37.3  realness contract + trust report

  Why the falsifiable claim is honest with rate=0 today:
    Greedy mode (the only mode the harness drives without API keys)
    picks the locally-best candidate from cost_preview_v2; it does
    not consult promoted_candidates. So promoted_hit_rate=0 in
    greedy mode is the *expected* baseline. A warm-aware agent
    mode (operator-driven, llm-live, or future per-card scheduler)
    would raise the rate. M-30 already proved warm-vs-cold
    fresh_emit reduction at run-level; M-37.2 measures it at
    decision-level so future modes can be compared.

  M-37.4..6 close every residual the original M-37 contract declared:

    M-37.4  Pre-M-37 sidecar migration: compgen.promotion.migrate_sidecars
            backfills missing candidate_kind / selected_candidate_id
            on legacy sidecars by inferring from recipe_id (longest-
            known pass_id prefix from the live registry) and
            recipe_signature. 10/10 tests green.
    M-37.5  Warm-aware greedy: _select_greedy now takes promoted_ids,
            sorts (0 if id in promoted_ids else 1, cost, id) so a
            promoted candidate that matches a legal candidate always
            wins over a fresh equivalent. Verified end-to-end on
            merlin_mlp_wide: rationale reads "warm-cache hit on
            promoted candidate 'cand_tile_matmul_0_tile_M16_N16_K16__3bebae8e'".
            Real ablation re-run shows promoted_hit_rate=100% (2/2)
            on the populated cache, up from 0% before.
    M-37.6  Multi-step pass-plan executor MVP:
            compgen.passes.executor.execute_pass_plan validates a
            plan against M-34 invariants, writes
            03_recipe_planning/pass_plan_execution_log.json, applies
            step 0 (writes agent_decision_response.json carrying the
            full plan + the step-0 candidate), marks step 1+ as
            deferred_to_future_run with a typed reason. Pipeline
            resumability (continue from post-step-0 IR) remains a
            Section 21+ item but the executor + log + typed deferred
            status close the agent-facing contract today.
