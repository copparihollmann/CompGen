notes: |
  Section 20 / M-37. Final milestone of Section 20 — bridges the
  M-31..M-34 pass-card surface to the Section 19 promotion memory.

  Three sub-milestones shipped:

    M-37.1  PromotedCandidate gains pass_id + candidate_id; retrieval
            extracts them from recipe.evidence_summary in the M-26
            sidecar; tests assert the pass_id resolves against the
            card registry
    M-37.2  AblationResult gains promoted_candidates_count +
            promoted_hit; AblationPack summary surfaces a per-mode
            promoted_hit_count and a top-level promoted_hit_rate;
            the markdown renderer adds a "Warm-cache effectiveness"
            section
    M-37.3  realness contract + trust report

  Why the falsifiable claim is honest with rate=0 today:
    Greedy mode (the only mode the harness drives without API keys)
    picks the locally-best candidate from cost_preview_v2; it does
    not consult promoted_candidates. So promoted_hit_rate=0 in
    greedy mode is the *expected* baseline. A warm-aware agent
    mode (operator-driven, llm-live, or future per-card scheduler)
    would raise the rate. M-30 already proved warm-vs-cold
    fresh_emit reduction at run-level; M-37.2 measures it at
    decision-level so future modes can be compared.

  Honest residuals (declared, deferred):
  - Greedy mode does not consult promoted_candidates today. A
    "greedy_warm_aware" variant would prefer a promoted candidate
    over a fresh equivalent — that's a Section 21+ scope item.
  - Pre-M-37 sidecars (recipes promoted before this milestone) lack
    candidate_kind in evidence_summary; their pass_id surfaces as
    empty. The agent treats absence as no cross-link.
