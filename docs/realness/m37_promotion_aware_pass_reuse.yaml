claim: |
  Promoted recipes (Section 19) are cross-linked to the M-31 pass-card
  registry: every PromotedCandidate carries a pass_id naming the pass
  card that produced it (when the M-26 promotion bridge recorded
  candidate_kind in the sidecar's evidence_summary). The pass_pool
  ablation harness (M-36) is extended with two metrics per cell:
  promoted_candidates_count (how many M-28 retrieval matches surfaced
  in the request) and promoted_hit (whether the agent's pick matched
  any promoted candidate). The aggregated promoted_hit_rate is the
  warm-cache-effectiveness number Section 20 measures: greedy mode
  ignores promoted candidates (rate=0); a warm-aware agent mode
  should drive the rate up.
