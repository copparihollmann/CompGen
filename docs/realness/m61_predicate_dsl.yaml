claim: |
  M-61 (Phase D): adds a typed pre/post-condition predicate DSL to
  ``KernelContractV3`` and threads predicates through to runtime
  PLAN_VIOLATION assertions in the emitted plan executor. Section 7's
  "preconditions hold at entry" / "postconditions hold at exit" claim
  becomes a finite, mechanically-checked list rather than free-form
  prose.

  Hard contract:

  1. ``compgen/kernels/predicates.py`` ships five frozen-dataclass
     predicate kinds with stable wire-format ``kind`` strings:
     - ``mod_eq`` (ModEq) — ``arg_dim`` divisible by ``k``
     - ``byte_size_le`` (ByteSizeLe) — ``arg`` numel*element_size ≤ max
     - ``no_alias`` (NoAlias) — two args don't share storage
     - ``dtype_in`` (DtypeIn) — ``arg`` dtype in allowlist
     - ``numerical_within_eps`` (NumericalWithinEps) — output within
       eps of reference (M-44 differential)
     ``predicate_kind`` returns the wire-format kind;
     ``predicate_plan_violation_suffix`` returns the
     ``PLAN_VIOLATION_*_<SUFFIX>`` token for the emitted assertion
     class. ``predicate_from_dict`` rejects unknown kinds with typed
     ``ValueError``.
  2. ``KernelContractV3`` gains ``preconditions: tuple[Any, ...] = ()``
     and ``postconditions: tuple[Any, ...] = ()`` fields. The
     dataclass uses ``Any`` to avoid a forward import of
     ``predicates``; the predicate-aware code paths dispatch on
     ``predicate_kind(p)``.
  3. ``KernelContractV3.from_recipe`` populates matmul preconditions
     ``(ModEq("K", tile_K), DtypeIn("lhs", (dtype,)),
     DtypeIn("rhs", (dtype,)))`` and the postcondition
     ``(NumericalWithinEps("out", "reference", eps),)`` where eps is
     0.0 for ``bit_equality`` refinement and ``max_relative_error``
     for ``tolerance_eps``.
  4. ``contract_to_dict`` serialises both lists; the deserializer in
     ``kernel_codegen_response.py`` reconstructs them via
     ``predicates_from_list`` so M-44 verifier reads the predicates
     back. Pre-M-61 contract bodies still load (defaults preserve).
  5. ``runtime/glue_emit/plan_assertions.py``:
     - ``_RegionAssertions`` carries ``preconditions`` /
       ``postconditions``. ``collect_region_assertions`` lifts them
       from each binding's contract.
     - ``render_plan_violation_classes`` emits five new typed
       subclasses: ``PLAN_VIOLATION_PRECONDITION_MOD_EQ``,
       ``PLAN_VIOLATION_PRECONDITION_BYTE_SIZE_LE``,
       ``PLAN_VIOLATION_PRECONDITION_NO_ALIAS``,
       ``PLAN_VIOLATION_PRECONDITION_DTYPE_IN``,
       ``PLAN_VIOLATION_POSTCONDITION_NUMERICAL_WITHIN_EPS``.
     - ``render_assert_plan_body`` extends with predicate-driven
       assertions: ``mod_eq`` checks ``actual_inputs[i].shape[-1]
       % k == 0``; ``byte_size_le`` checks numel*element_size.
       ``dtype_in`` is structurally redundant with the IO-level
       dtype check and is skipped to avoid duplicate emit.
       ``no_alias`` and ``numerical_within_eps`` are
       postcondition-bound and surface in the M-44 verifier rather
       than the runtime fast-path.
