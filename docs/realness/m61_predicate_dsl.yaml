notes: |
  Phase D step 7 — Section 7's "preconditions / postconditions"
  claim made real. The DSL is small (5 kinds) but covers the
  archetypal needs: divisibility (mod_eq drives kernel-block
  alignment), capacity (byte_size_le drives buffer planning),
  aliasing (no_alias drives memory hazard analysis), dtype
  (dtype_in drives codegen routing), numerical equivalence
  (numerical_within_eps drives M-44 differential).

  Pre-existing scaffolding consumed:
  - ``KernelContractV3`` dataclass (kernels/contract_v3.py from
    Phase B) — extended with two new tuple fields.
  - ``contract_to_dict`` + ``_reconstruct_contract_from_dict``
    (M-40 / M-44 round-trip) — extended with predicate lists.
  - ``render_plan_violation_classes`` + ``render_assert_plan_body``
    (M-48 from Phase C) — extended with M-61 subclasses + emit.

  Real-driven evidence (`/tmp/m61_stress`, regenerated):
  - merlin_mlp_wide matmul_0 contract carries 3 preconditions
    (mod_eq("K", 16) + dtype_in("lhs"|"rhs", ("fp32",))) and 1
    postcondition (numerical_within_eps("out", "reference", 0.0) —
    bit_equality refinement gives eps=0).
  - generated_plan_executor.py mentions the M-61 PLAN_VIOLATION
    classes 3 times (subclass def + the two emitted assertion
    bodies).
  - End-to-end pipeline still passes glue-emit; auction unaffected.

  Tests: 15 in tests/kernels/test_predicates.py +
  tests/runtime/test_plan_assertions_predicates.py covering
  predicate round-trip (5 kinds), kind/suffix maps, unknown-kind
  rejection, list helpers, contract carries predicates, round-trip
  through M-44 reconstruct, plan_violation classes emit M-61
  subclasses, emitted glue carries ModEq check, structural-shape
  assert fires on tampered K dim. Cross-suite regression preserved
  164/164 across 17 test suites.

  Honest residuals:
  - The ModEq check resolves ``arg_dim="K"`` by checking
    ``actual_inputs[0].shape[-1] % k`` (matmul convention: K is
    last dim of input[0]). Other archetypes will need an
    archetype-aware resolver (deferred to M-65 vertical slice 2's
    fusion path).
  - ``NumericalWithinEps`` is currently postcondition-only; the
    runtime emit doesn't run a per-call differential against a
    reference (that's the M-44 verifier's job at compile time).
    Per-call runtime equivalence checks would be a follow-on.
  - ``NoAlias`` is declared but not yet runtime-checked (storage-
    pointer comparison is platform-specific). The M-44 verifier's
    static-analysis pass picks this up; runtime emit defers.
  - ``DtypeIn`` is structurally redundant with the existing
    PLAN_VIOLATION_INPUT_DTYPE check; M-61's emit path skips it to
    avoid double-firing on the same fault.
