notes: |
  Phase D step 5 — Section 7 Job 4 (bidirectional negotiation) made
  real. The dream said "kernel layer telling the compiler what it
  needs"; M-59 lands the data layer. Future milestones thread the
  proposals through to the action_space generator so they re-enter
  the candidate list.

  Pre-existing scaffolding consumed:
  - ``ProviderResult.contract_feedback`` (provider.py) — the
    long-dormant feedback channel finally has a live consumer.
  - ``ProviderRegistry.collect_feedback`` /
    ``ProviderRegistry.evolve_contract`` (registry.py from Phase B)
    — kept as legacy v1-contract callers; M-59's auction-side
    routing uses the structured V3 path.
  - M-57 auction's ``per_provider_feedback`` aggregator wires the
    feedback into M-59 at the end of the bid loop.

  Tests: 15 in tests/graph_compilation/test_contract_feedback_apply.py
  covering _infer_kind heuristics (6 cases), classify_feedback split
  semantics (2), to_recipe_ir_proposal per-kind op + args (5),
  auction integration empty path (CReferenceProvider — 1), auction
  integration synthetic stub provider emitting layout_swap +
  dtype_widen + non-allowlisted (1).

  Real-driven evidence:
  - Empty path on merlin_mlp_wide host_cpu: contract_feedback.json
    written with counts.total=0 / proposals=0; aggregate file
    contains one entry for the task.
  - Synthetic stub injected into the registry: 3 feedback entries
    routed correctly (2 allowlisted → SetLayout + WidenDtype
    proposals; 1 non-allowlisted → advisory), aggregate file
    mirrors.

  Honest residuals:
  - Recipe-IR proposals are written as JSON dicts; full
    materialisation as Recipe-IR Op instances + threading through to
    action_space.py's Family 7 candidate generation is the M-63
    coverage-first scheduler's plumbing job.
  - The agent_decision_request advisory block surfacing
    non-allowlisted entries is conservative — present in the
    contract_feedback.json schema, but
    ``compgen.graph_compilation.agent_decision`` is unchanged in
    M-59. Threading the advisory through to the next agent
    decision is a follow-on (M-59.1 if needed).
  - ``measured_gain`` from the provider is unverified at feedback
    time. The auction trusts it only as ranking signal; if a
    proposal materialises into a real candidate, the M-44
    contract-driven verifier still runs on the resulting kernel.
