claim: |
  M-59 (Phase D): wakes the dormant ``ProviderResult.contract_feedback``
  channel. Every fulfilled bid in the M-57 auction surfaces its
  provider's feedback through a two-tier classifier: typed-allowlist
  entries (``layout_swap``, ``dtype_widen``, ``accumulator_widen``,
  ``alignment_request``, ``fast_math_opt_in``) become structured
  Recipe-IR proposals; non-allowlisted entries land as advisory data
  the outer agent can consume.

  Hard contract:

  1. ``ContractFeedback`` (``kernels/provider.py``) gains two fields:
     ``kind`` (typed category — empty signals "infer from field via
     heuristic") and ``applies_when`` (free-text predicate, e.g.
     ``"K >= 64"``). Both default to empty for backward compatibility;
     existing providers continue to work without changes.
  2. ``classify_feedback(provider_name, feedbacks) -> (allowlisted,
     non_allowlisted)`` in ``graph_compilation/contract_feedback_apply.py``
     splits the entries. ``_infer_kind`` heuristic maps
     ``field`` substrings (``layout``, ``dtype``, ``accumulator``,
     ``align``, ``fast_math``) onto allowlisted kinds when the
     provider didn't supply one. Provider-supplied ``kind`` always
     wins.
  3. ``to_recipe_ir_proposal(entry) -> FeedbackProposal`` translates
     each allowlisted entry into a typed dict with ``op`` (one of
     ``SetLayout``, ``WidenDtype``, ``WidenAccumulator``,
     ``SetAlignment``, ``EnableFastMath``) and per-kind ``args``.
     Calling on a non-allowlisted entry raises typed ``ValueError``.
  4. ``write_auction_feedback_artifacts(run_dir, task_id,
     contract_hash, per_provider_feedback)`` writes:
     - ``04_kernel_codegen/auction/<task_id>/contract_feedback.json``
       (schema ``auction_contract_feedback_v1``) with both buckets
       and the structured proposals.
     - ``04_kernel_codegen/contract_feedback_proposals.json`` (schema
       ``contract_feedback_proposals_v1``) — run-wide aggregate, the
       next iteration of the agent_decision request emit can read it.
  5. ``run_kernel_auction`` (M-57) collects every fulfilled bid's
     ``ProviderResult.contract_feedback`` into ``per_provider_feedback``
     and routes through ``write_auction_feedback_artifacts`` at the
     end of the auction. Always called, even when feedback is empty —
     the file's existence is the gate, not its contents.
