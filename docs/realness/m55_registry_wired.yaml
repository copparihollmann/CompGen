claim: |
  M-55 (Phase D, Section 7 integration step 1): the M-42 kernel-codegen
  pipeline stage now consults the entry-point ``ProviderRegistry`` and
  emits a byte-deterministic ``04_kernel_codegen/registry_resolution.json``
  recording which providers *could* bid on the materialized
  ``KernelContractV3``.

  Hard contract:

  1. ``ProviderRegistry.applicable(contract: KernelContractV3) -> list[ProviderApplicability]``
     is a pure static-metadata filter — no provider methods are invoked,
     no codegen runs. The filter reads two optional class-level
     attributes on each provider (``applicable_targets``,
     ``applicable_archetypes``); empty tuple is wildcard. Legacy
     providers without these attributes are wildcard-matched (today's
     behaviour preserved exactly).
  2. ``registry_resolution.json`` is emitted whenever the M-42 stage
     runs, regardless of whether any providers matched. Schema:
     ``registry_resolution_v1`` with fields ``schema_version``,
     ``generated_at_utc``, ``task_id``, ``region_id``, ``candidate_id``,
     ``contract_hash``, ``request_kind``, ``providers_considered``,
     ``applicable_provider_names``, ``fallback_used``, ``fallback_path``.
     All fields except ``generated_at_utc`` are byte-stable across
     reruns of the same selection.
  3. When ``applicable_provider_names`` is empty, ``fallback_used: true``
     and ``fallback_path: claude_code_subagent_via_m43`` — today's
     Claude-Code subagent path runs unchanged via the M-43 commit
     flow. M-55 does not change the kernel-codegen behaviour;
     M-56/M-57 will consume this resolution.
  4. The M-42 ``requests/<task_id>.request.json`` and
     ``kernel_codegen_summary.json`` artefacts are byte-identical to
     pre-M-55 runs — the resolution file is added alongside them.
