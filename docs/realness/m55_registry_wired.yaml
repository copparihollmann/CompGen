notes: |
  Phase D bootstrap. The Phase C path emitted a kernel-codegen task
  unconditionally for the Claude-Code subagent. Phase D's auction
  protocol (M-57) needs a stable, on-disk record of which providers
  could bid before any provider runs. M-55 lands that record.

  Pre-existing scaffolding consumed:
  - ``ProviderRegistry`` (kernels/registry.py) — extended with
    ``applicable()`` + ``ProviderApplicability`` dataclass.
  - Entry-point discovery already lived in
    ``codegen_fallback._discover_providers``; promoted to public
    ``discover_default_providers()`` in registry.py so M-42 can call
    it without reaching into a Phase B fallback module.
  - Provider applicability metadata (``applicable_targets``,
    ``applicable_archetypes``, ``priority``) is read with
    ``getattr(p, attr, default)`` so today's 9 shipped provider impls
    work without modification.

  Tests: 7 in tests/graph_compilation/test_registry_wired.py covering
  applicable() unit cases (wildcard, target filter, archetype filter,
  priority sort), resolution-file emit (existence + schema +
  byte-stability across reruns), and the e2e invariant that today's
  M-42 request still lands when the registry has no applicable
  providers (fallback_used=true).

  Honest residuals:
  - The Claude-Code subagent path is not yet represented as a
    KernelProvider in the registry. That formalisation lands in
    M-56 when the ``bid()`` interface is introduced — naturally
    expressed as a low-confidence, high-cost bid for the subagent.
  - ``applicable()`` does not yet consider numerics (accumulator
    dtype, deterministic) or memory residency. Those filter axes
    activate alongside the predicate DSL in M-61.
  - ``default_registry()`` does not load filesystem-resident
    user-space providers yet; that path is M-62.
