forbidden:
- adding a v3.1 field outside the optional_v3_1_fields slot (would change kernel_facing() and invalidate cached certs)
- the canonical or instance hash projection peeking at optional_v3_1_fields (would defeat the cache-invariance goal)
- migrate_contract_body_v3_to_v3_1 silently mutating the input dict (must defensive-copy)
- skipping the audit gate's drift check on a cert with a missing source contract path (must be silent skip, not silent pass)
- adding a recognised v3.1 field without updating both _OPTIONAL_V3_1_FIELD_NAMES and _OPTIONAL_V3_1_FIELD_DEFAULTS (the migrator reads from defaults; missing default is a typed bug)
