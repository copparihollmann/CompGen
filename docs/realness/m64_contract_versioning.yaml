notes: |
  Phase D step 10 — Section 7 Dream 5 (refinement contracts) made
  real. The mechanism is the simplest possible: a slot whose
  contents never participate in the hash, plus a migration helper
  that fills defaults so pre-M-64 readers + writers see consistent
  state. Parametric contracts (Section 7 Dream 5's other half —
  contracts parameterised by target capability bits) remain a
  future extension; M-64 lays the slot.

  Pre-existing scaffolding consumed:
  - ``canonical_contract_hash`` / ``instance_contract_hash`` (M-58) —
    both projections naturally exclude the slot since
    ``kernel_facing()`` / ``compiler_only()`` enumerate explicit
    fields.
  - M-31A trust report (audit/trust_report.py) — extended with the
    9th gate ``contract_version_consistency``.

  Real-driven evidence (`/tmp/m64_trust`):
  - Trust report 8/8 → 9/9 PASS with the new gate at
    ``contract_version_consistency``.
  - Real cert from /tmp/m63_stress re-derives byte-stable canonical
    hash through the migration. Removing the optional_v3_1_fields
    key from a cert body and re-loading produces an identical hash
    + populated defaults (test_body_without_optional_slot_loads_with_defaults).

  Tests: 11 in tests/kernels/test_contract_versioning.py covering
  optional field default-empty (1), set-but-no-hash-change (1),
  kernel-facing field still affects hash (sanity, 1), migration
  fills defaults + idempotent + non-mutating (3), unknown-field
  rejection + recognised-default + recognised-with-value (3),
  pre-M-64 body loads with same hash (1), audit gate passes on
  clean run (1).

  Honest residuals:
  - The recognised v3.1 field set (`prefetch_distance`,
    `pin_inputs_to_cpu`) is starter — these are real CPU
    optimisation hints but the providers don't yet read them. They
    exist to prove the mechanism + give M-66 a path to surface
    optimisations without hash churn.
  - Major-version migration (v3 → v4) is not in scope; M-64 covers
    only minor-version refinements within the v3 major.
  - The audit gate runs against on-disk certs; it doesn't cover
    in-memory KernelContractV3 instances. Programmatic uses of
    ``KernelContractV3.from_recipe`` still need to ensure the slot
    is populated; today every call site goes through
    ``contract_to_dict`` + reconstruct round-trip on serialisation
    so this is implicitly covered.
  - ``CONTRACT_REFINEMENT_VERSION`` is an informational tuple;
    nothing yet keys on it. When v3.2 lands, code that wants to
    surface the version can read it.
