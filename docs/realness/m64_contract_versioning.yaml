claim: |
  M-64 (Phase D, Section 7 Dream 5 step 1): adds the forward-compatible
  contract refinement protocol so adding a new optional field
  (e.g. ``prefetch_distance``) does not invalidate cached v3
  certificates. New fields land in
  ``KernelContractV3.optional_v3_1_fields`` keyed by name; the
  canonical and instance hash projections never see the slot, so
  cached cert hashes remain byte-stable across version refinements.
  A new ``contract_version_consistency`` gate in the M-31A trust
  report re-derives every cert's canonical hash post-migration and
  fails loudly if any drift would have broken cache.

  Hard contract:

  1. ``KernelContractV3.optional_v3_1_fields: dict[str, Any]``
     defaults to ``{}``. The slot is NOT in ``kernel_facing()`` or
     ``compiler_only()`` so both ``canonical_contract_hash`` and
     ``instance_contract_hash`` projections naturally exclude it.
  2. Recognised v3.1 field names live in
     ``compgen.kernels.contract_v3._OPTIONAL_V3_1_FIELD_NAMES``;
     defaults in ``_OPTIONAL_V3_1_FIELD_DEFAULTS``. Initial set:
     ``prefetch_distance: 0`` and ``pin_inputs_to_cpu: False``.
     Adding new names to this set must NOT change cached cert hashes
     — proven by the audit gate.
  3. ``compgen.kernels.contract_migration.migrate_contract_body_v3_to_v3_1(body)``
     is a defensive-copy migration: if the body lacks
     ``optional_v3_1_fields`` (pre-M-64 cert), populates it with the
     recognised defaults; if a value is supplied, preserves it; if
     a recognised field is missing, fills the default. Idempotent
     on already-v3.1 bodies.
  4. ``get_optional_v3_1_field(contract, name)`` reads the slot
     defensively. Unknown names raise typed
     ``ContractRefinementError``; recognised names default to the
     declared default when missing.
  5. ``contract_to_dict`` (M-40 materializer) and
     ``_reconstruct_contract_from_dict`` (M-44 verifier path) both
     round-trip the slot. The deserializer always invokes
     ``migrate_contract_body_v3_to_v3_1`` so a pre-M-64 cert body
     loads with defaults populated.
  6. New audit gate ``contract_version_consistency`` (added to
     ``compgen.audit.trust_report``): walks
     ``04_kernel_codegen/certificates/*.json``; for each cert,
     reads the source contract body, migrates, re-derives
     ``canonical_contract_hash``, and compares to the recorded
     value. Drift → typed gate failure listing the affected certs.
     Skipped (status="skipped") when no run-dir is supplied.
