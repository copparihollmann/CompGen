forbidden:
- adding bid() to the @runtime_checkable Protocol surface (would break isinstance(p, KernelProvider) for legacy providers; bid() is read with getattr fallback)
- compute_bid silently swallowing ProviderProtocolViolation (typed errors must propagate; only bare exceptions degrade to placeholder)
- BidPreview.perf_estimate_us defaulting to 0.0 (sentinel is +inf; 0.0 means "instant kernel" which is a real ranking signal we'd misinterpret)
- providers writing artifacts during bid() (bid is metadata-only; codegen runs in fulfill())
- skipping the canonical-hash stamp on the returned BidPreview (downstream auction relies on every bid carrying the contract_hash it's bidding on)
