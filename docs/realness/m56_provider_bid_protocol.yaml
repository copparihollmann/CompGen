notes: |
  Phase D step 2. M-55 made the registry's applicability surface
  explicit; M-56 makes the registry's bidding surface explicit. M-57
  composes both into the multi-bidder auction.

  Pre-existing scaffolding consumed:
  - ``KernelProvider`` Protocol (kernels/provider.py) — extended with
    BidPreview / ProviderProtocolViolation; the Protocol body is
    unchanged so legacy providers stay isinstance-conformant.
  - ``ProviderRegistry`` (kernels/registry.py) — new ``compute_bid`` /
    ``collect_bids`` helpers that work over the list returned by
    ``applicable()`` (M-55).
  - ``ClaudeCodeKernelProvider`` (claude_code_default.py) — gains
    ``bid()`` + a private ``_kernel_facing_to_fp_dict`` helper that
    builds the same fingerprint shape ``InSessionCodegen`` reads, so a
    cache-hit bid is honest (the cache really would serve the kernel).
  - ``TritonTemplateProvider`` (triton_templates.py) — gains ``bid()``
    that maps v3 archetype + op_name onto the existing template-
    family table (matmul / matmul_bias_gelu / matmul_bias_relu /
    elementwise_gelu / softmax / layer_norm / add_relu).

  Real-driven stress (`/tmp/m56_stress`):
  - Run merlin_mlp_wide pipeline → 04_kernel_codegen/contracts/<h>.json.
  - Reconstruct V3 contract via ``_reconstruct_contract_from_dict``.
  - Build ProviderRegistry with ClaudeCodeKernelProvider(StubCodegen) +
    TritonTemplateProvider + a legacy ``c_reference_stub`` (no bid).
  - ``collect_bids`` returns 3 bids: claude_code_default conf=0.90
    (stub treated as cache hit), triton_templates conf=0.70
    perf=5.02us (real roofline), c_reference_stub conf=0.00
    rationale=no_bid_method.
  - All three share contract_hash=4838412db0b5c6b8 (matches M-55).

  Tests: 13 in tests/kernels/test_provider_bid.py covering BidPreview
  schema (round-trip + +inf), legacy fallback, validation
  (out-of-range confidence, negative perf, internal exception, wrong
  contract_hash, returning None), ClaudeCodeKernelProvider bid (stub
  vs unknown codegen), TritonTemplateProvider bid (matmul match vs
  unknown archetype), collect_bids over a 3-provider list.

  Honest residuals:
  - 7 of the 9 shipped providers (ClaudeKernel, KernelBlaster, Autocomp,
    Exo, ExoRiscvOpu, Megakernel, _Template) do not yet implement
    bid(); they fall back to ``confidence=0.0`` placeholders. M-57 may
    light up additional providers as they prove auction-relevant; the
    fallback path is the contract.
  - bid() correctness is unverified at bid time. Misleading bids waste
    top-K capacity; the contract-driven verifier (M-44) catches
    real-world divergence on the fulfilled artifact.
  - The cache-aware ClaudeCode bid only fires for ``InSessionCodegen``;
    the ``CliSubprocessCallable`` and ``ApiCallable`` paths fall to
    the cache-miss branch (confidence=0.3). The MCP tool layer's
    persistent kernel store will surface those as cache hits in M-62.
