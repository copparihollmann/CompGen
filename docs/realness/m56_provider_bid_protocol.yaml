claim: |
  M-56 (Phase D, Section 7 integration step 2): adds a two-stage
  ``KernelProvider`` protocol so the auction (M-57) can prune candidate
  providers before any codegen runs. Every provider may now implement
  an optional ``bid(contract_v3) -> BidPreview`` method that returns a
  cheap, declarative pre-codegen estimate.

  Hard contract:

  1. ``BidPreview`` is a frozen dataclass at ``kernels/provider.py``
     with fields ``provider_name``, ``contract_hash``,
     ``perf_estimate_us``, ``confidence`` (in [0, 1]),
     ``time_to_generate_s_estimate``, ``registers_used``, ``occupancy``,
     ``smem_bytes``, ``rationale``, ``cache_hit``. ``perf_estimate_us``
     accepts ``+inf`` as the "no estimate" sentinel; JSON serialisation
     uses the literal ``"+inf"`` string for round-trip stability.
  2. ``compute_bid(provider, contract_v3, *, expected_hash=None)`` in
     ``kernels/registry.py`` invokes ``provider.bid()`` if present;
     legacy providers without ``bid()`` get a placeholder returning
     ``confidence=0.0`` and ``rationale="no_bid_method"`` so the
     auction treats them as last-resort. Provider-internal exceptions
     are caught and converted to a placeholder bid with
     ``rationale="bid_raised:<ExcType>"`` so one buggy provider does
     not abort the auction.
  3. ``ProviderProtocolViolation`` (typed ``ValueError`` subclass)
     fires when ``bid()`` returns a structurally-malformed
     ``BidPreview``: out-of-range confidence / occupancy, negative
     perf_estimate / registers / smem, NaN perf_estimate /
     time_to_generate, or a ``contract_hash`` that disagrees with the
     canonical hash.
  4. ``compute_bid`` stamps the canonical contract hash onto the
     returned ``BidPreview`` if the provider didn't supply one;
     ``collect_bids(providers, contract_v3)`` runs over a list of
     applicable providers, hashes the contract once, and returns one
     bid per provider in input order.
  5. ``ClaudeCodeKernelProvider.bid()`` is cache-aware: in-session
     cache hit → ``confidence=0.9, time_to_generate_s=1.0,
     cache_hit=True``; ``StubCodegen`` (test fixture) treats every
     call as a cache hit; cache miss → ``confidence=0.3,
     time_to_generate_s=900``.
  6. ``TritonTemplateProvider.bid()`` matches archetype + op_name
     against the existing 7-template family table; on match,
     ``confidence=0.7``, ``time_to_generate_s=0.1`` (string
     substitution), and a roofline ``perf_estimate_us`` derived from
     ``hardware_envelope.peak_compute_per_dtype`` × tile flops; on
     miss, ``confidence=0.0`` with rationale ``no_template_for_archetype_*``.
