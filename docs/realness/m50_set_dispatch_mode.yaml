forbidden:
- silently defaulting dispatch.model to SYNC when a SetDispatchMode op is present in recipe_delta
- emitting set_dispatch_mode candidates that bypass DispatchModel.requires_granularity gating
- accepting "persistent" or "inline" dispatch_mode_override on a NORMAL-granularity contract
- skipping the legality field on illegal candidates (every illegal candidate must carry a typed reason)
- changing the contract_hash for two contracts that differ ONLY in dispatch.model — the hash MUST change because dispatch is in the kernel-facing projection
