notes: |
  Phase C M-50 — SetDispatchMode as Recipe IR decision. Real-driven
  stress test (merlin_mlp_wide on host_cpu, --stop-after
  agent-decision-request):

  - 12 set_dispatch_mode candidates emitted (3 matmul regions × 4
    DispatchModel values).
  - 6 legal candidates (sync + async per region) surface in
    agent_decision_request.candidate_ids_allowed.
  - PERSISTENT correctly emitted illegal-by-granularity (NORMAL
    contract; PERSISTENT requires MEGA).
  - INLINE correctly emitted illegal-by-granularity (NORMAL contract;
    INLINE requires MICRO).
  - Decision sites carry one ``dispatch`` site per kernel-bearing
    region with priority=3 (lower than tiling=1) and exactly 4
    candidate IDs each.
  - Byte-stable: two reruns produce identical sorted candidate IDs.

  Materialiser stress test: appending ``{"op": "SetDispatchMode",
  "region": "matmul_0", "mode": "async"}`` to candidate_selection
  recipe_delta flips contract.orchestration.dispatch.model from
  SYNC → ASYNC. PERSISTENT override on NORMAL granularity correctly
  returns None (defence-in-depth gate; the action_space already
  blocks PERSISTENT, this catches a hand-edited delta).

  Honest residuals:
  - The emitted M-47 SYNC executor still hardcodes the SYNC dispatch
    path. M-51 (CPU ASYNC + EventTensor) is the milestone that
    teaches the emitter to honour ``dispatch.model == ASYNC``. Until
    M-51 lands, an ASYNC-decision contract still runs through the
    SYNC executor end-to-end — the decision is recorded in the
    contract honestly, but the runtime behaviour is unchanged.
  - PERSISTENT and INLINE remain unreachable on canonical models
    (no MEGA / MICRO contracts materialise yet). Their candidates
    exist in the action_space and surface as illegal with typed
    reasons; the path that would accept them in a future MEGA
    contract is exercised only by the unit tests, not by a real run.
