claim: |
  M-50 (Phase C): SetDispatchMode is a first-class Recipe IR decision.
  The action_space surfaces, per kernel-bearing region, four
  set_dispatch_mode candidates — one per DispatchModel value (SYNC,
  ASYNC, PERSISTENT, INLINE). Two are legal on NORMAL granularity
  (SYNC, ASYNC); the other two are emitted illegal-by-granularity
  with typed reasons. The legal candidates surface in
  agent_decision_request.candidate_ids_allowed alongside the existing
  set_tile_params + fuse_producer_consumer families.

  When an agent's recipe_delta carries ``{"op": "SetDispatchMode",
  "region": <region_id>, "mode": <sync|async>}``, the contract
  materialiser reads the override and threads it into
  KernelContractV3.from_recipe(dispatch_mode_override=...). The
  contract's orchestration.dispatch.model is then SYNC or ASYNC per
  the agent's decision instead of the implicit SYNC default.

  This means: the dispatch decision has shifted from a hidden
  compile-time constant to a typed Recipe IR decision, surfaced to
  the agent via the same protocol as tiling, with the same
  legality gating (granularity must match), the same byte-stable
  candidate IDs, and the same downstream contract shape.
