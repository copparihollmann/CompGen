claim: |
  Every compiler pass the agent can request has a typed pass card
  declaring its level, family, reads/writes, preconditions,
  invalidates, preserves_refinement, verification rungs, cost,
  failure_modes, and example_invocation. The agent_decision_request
  emits passes_allowed (derived from the registry) plus pass_cards
  (full inline projections); validate_agent_decision_response asserts
  every passes_allowed id resolves to a real card. Removing a card
  for an exposed pass causes the typed MissingPassCard error to fire.
