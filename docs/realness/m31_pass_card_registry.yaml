notes: |
  Section 20 / M-31. First milestone behind the M-31A audit gate. The
  hardcoded passes_allowed list introduced in M-31A.3 is replaced by
  PassCardRegistry.load(default_registry_root()) — every id is now
  guaranteed to map to a typed metadata record. Two seed cards ship
  for the production passes (set_tile_params, fuse_producer_consumer);
  M-32..M-37 build on this foundation.

  The MissingPassCard placeholder negative control from M-31A.5 is
  now real fault injection (build a registry with one card missing,
  ask the validator to resolve both ids, assert the typed error).
  PreconditionViolation and StaleAnalysisAudit remain placeholders
  pending M-32 / M-33.
