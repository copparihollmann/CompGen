claim: |
  M-47 (Phase C): the host-side glue is **emitted**, not hand-written.
  Reading ``05_execution_plan/execution_plan.yaml`` (with M-46
  region_kernel_bindings), the emitter at
  ``compgen.runtime.glue_emit.python_sync.emit_python_sync_executor``
  produces a per-workload Python module at
  ``06_glue_emit/generated_plan_executor.py`` exposing
  ``compgen_run(io, kernels, runtime)``. CPU/SYNC only at this layer
  (M-51 widens to ASYNC + EventTensor; M-52 adds CUDA + graph capture).

  Generated executor invariants:

  - Calls ``runtime.dispatch`` once per region in topological order
    derived from ``ExecutionPlan.dependency_edges``.
  - Calls ``runtime.synchronize`` once at the end.
  - ``assert_plan(io)`` raises typed ``PlanViolation`` (
    ``PLAN_VIOLATION_UNBOUND_REGION`` today) when a region declared
    in the plan has no matching M-45 certificate / M-46 binding.
  - Imports only ``compgen.runtime.glue.{CpuRuntimeAdapter,
    RuntimeAdapter, select_adapter}``. No mocks / stubs / dummy
    modules — the realness scan + the test
    ``test_emitted_module_imports_no_test_only_modules`` enforce
    this.

  M-47 ships the protocol; the kernels-dict callable surface is
  caller-supplied. M-49 wires the load-from-artifact path so the
  callable is materialised automatically from the M-45 certificate's
  ``artifact_paths.kernel_source``.
