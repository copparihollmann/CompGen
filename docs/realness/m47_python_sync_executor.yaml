notes: |
  Phase C M-47 — first emitted-glue milestone. Real-driven stress test:

  Phase 1 — drove merlin_mlp_wide through ``--stop-after glue-emit``
  with an empty cache. Pipeline emitted ``06_glue_emit/`` with the
  generated executor + manifest; bound_regions=[] honestly because no
  provider had committed yet.

  Phase 2 — submitted a contract-compliant provider response, ran
  the M-43 → M-44 → M-45 chain, re-emitted M-46 (plan) and M-47
  (glue). bound_regions=["matmul_0"]; the executor's
  KERNEL_BINDINGS dict carries the M-45 certificate path + dispatch
  model.

  Phase 3 — **imported the emitted module and ran
  ``compgen_run(io, kernels, runtime)`` end-to-end**. With io =
  random tensors, kernels = a single eager-fallback callable that
  invokes ``torch.matmul``, and a stub RuntimeAdapter, the executor
  dispatched 1 region and returned a Tensor of shape (16, 32) —
  matching the contract's output. The emitted code is real,
  runnable host glue.

  Phase 4 — passed an empty kernels dict to compgen_run with a
  bound region. The runtime check correctly surfaces a typed error
  (KeyError on the kernels dict lookup, since assert_plan passes
  when the plan declares the region as bound but the operator did
  not provide a kernel callable). M-49 wires the
  load-from-artifact path so this case is impossible by construction.

  Tests: 9 in tests/runtime/test_glue_emit_python_sync.py covering
  emit-produces-files, syntactic validity, no-mocks invariant,
  PLAN_VIOLATION_UNBOUND_REGION, single + multi-region dispatch,
  topological order. 18 across M-46 + M-47.

  Honest residuals:
  - assert_plan body is structural-only at M-47; M-48 generates the
    typed ``PLAN_VIOLATION_INPUT_BYTES``, ``PLAN_VIOLATION_LAYOUT``,
    ``PLAN_VIOLATION_BUFFER_SIZE``, ``PLAN_VIOLATION_EVENT_WRITERS``
    body from contract fields.
  - kernels-dict callable surface is caller-supplied; M-49 wires
    automatic load from the M-45 cert's kernel_source artifact.
  - The contract argument to runtime.dispatch is currently the
    region_id string; M-49 resolves it to the full
    KernelContractV3 from the on-disk contract path.
  - The dispatch args today are ``tuple(io.values())``; M-49 will
    resolve the per-region IO bindings (which inputs of ``io`` map
    to which kernel argument) from the contract's ``io.inputs``
    field rather than relying on dict order.
