notes: |
  M-37.12 + M-37.13. Closes the M-31A audit gaps surfaced after
  M-37.11 broadened the candidate-selection layer.

  Load-bearing safety shift (honest accounting):
  - Pre-M-37.12 the ``selected_model_is_merlin_mlp_wide`` gate in
    ``real_lowering.py`` was the structural barrier preventing
    non-audited models from claiming differential correctness on
    the clean-divide path.
  - Post-M-37.12 the same safety property is carried by two
    structural rules: ``recipe_gate.single_k_iter`` (declares the
    correct refinement) and ``case_within_combined_tolerance``
    (admits per-case deviation only within the declared tolerance).
  - The whitelist is preserved on the boundary-handling path.

  Negative controls (M-37.13):
  - ``test_tolerance_eps_rejects_above_threshold`` — deviation
    50× past combined tolerance must reject. Catches a regression
    where the criterion is silently widened.
  - ``test_tolerance_eps_rejects_at_high_eager_magnitude`` — even
    at huge eager magnitudes the rtol-scaled bound holds.
  - ``test_threshold_collapses_to_atol_at_zero_eager`` — at
    eager_max=0 the criterion reduces to ``case_max_abs <= atol``.
  - ``test_m15b_fires_on_synthetic_real_m12_failure`` — tampers a
    real on-disk M-12 report into status=fail and asserts the
    M-15B detector + emitter end-to-end reach the typed retry
    request schema.
  - ``test_pipeline_raises_when_m12_report_is_a_real_fail`` — the
    same tampered-report path exercises the run.py:1251 raise
    structurally.

  Caveat: combined torch.allclose tolerance is mathematically
  equivalent for any *correct* tiled multiplication, so no canonical
  model produces a natural M-12 failure. The natural-failure
  reachability gap is recorded under the ``m15b_natural_failure_unreachable``
  caveat-ledger row; the synthetic-real-failure end-to-end coverage
  is the load-bearing replacement.
