claim: |
  M-12 verification admits any model on the clean-divide path
  (``executable_structured_ir``) without consulting a model-id
  whitelist; correctness is gated by two structural rules instead.

  (1) The recipe gate downgrades the declared refinement to
  ``tolerance_eps`` whenever the tile does not satisfy
  ``clean_divide AND tK >= K_dim`` (single K iteration). Multiple K
  iterations reorder accumulation and break bit-exact equivalence
  with eager — so ``bit_equality`` is claimed only when both
  conditions hold.

  (2) M-12's per-case differential uses Higham's matmul accumulation
  bound (M-37.13's honest fix, replacing M-37.12's hand-picked
  combined tolerance):

   - SEMANTIC: ``|sim - eager| <= 4 * K * eps * max|A| * max|B|``
     (Higham, *Accuracy and Stability of Numerical Algorithms*
     §3.5; the safety slack of 4 absorbs FMA / BLAS summation-tree
     variance). Used only when the recipe declares
     ``tolerance_eps``. The bound scales linearly with K and with
     ``max|A| * max|B|`` and is **derived per case from the inputs**,
     so it can never be silently widened — any change to the bound
     formula or constants is observable in the report's
     ``semantic_bound`` field.

  For declared ``bit_equality`` the case-pass criterion is exact
  equality (max_abs == 0 AND max_rel == 0).

  An earlier M-37.13 draft layered a structural ``simulator vs
  tile_K_eager_reference`` bit-exact check, motivated by eliminating
  the tolerance question entirely. That layer holds for clean-divide
  cases (where torch.matmul's BLAS dispatch is identical for sliced
  and full-matrix forms) but fails on boundary cases (M=7, K=63,
  etc.) because PyTorch's BLAS dispatches differently for odd
  shapes — producing FP reordering that's not a simulator bug.
  The structural layer was therefore dropped in favor of Higham's
  bound, which captures both paths uniformly.

  The pre-M-37.12 ``selected_model_is_merlin_mlp_wide`` whitelist
  remains in the contract for the boundary-handling path
  (``executable_with_boundary_handling``), where the M-11A audit's
  load-bearing concern — boundary handling on a real matmul — does
  apply. The whitelist is therefore tightened in scope, not removed.
