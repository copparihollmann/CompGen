notes: |
  Section 20 / M-33. Third milestone behind the M-31A audit gate. The
  user's framing motivates the design: pass ordering is a hard
  problem; the LLM gets freedom to pick which pass + region +
  candidate, but the deterministic skeleton enforces correctness
  invariants the LLM cannot invent its way around.

  Five sub-milestones shipped:

    M-33.1  generation tracking + invalidation log + diff primitive
    M-33.2  verification certificate gate (structural / differential;
            formal stays SKIPPABLE pending semantic-IR work)
    M-33.3  refinement monotonicity (RefinementLevel total order;
            assert_refinement_chain_valid; validator wire-in)
    M-33.4  real PreconditionViolation + StaleAnalysisAudit controls;
            negative_controls_pass_card_placeholder caveat resolved
    M-33.5  realness contract + trust report

  As an organizational follow-up: 33 additional ported passes from
  XLA / IREE / hexagon-mlir / Event Tensor Compiler exist under
  python/compgen/ir/payload/passes/rewrites/ but only the 5
  priority-1 cards shipped here. M-34 will author the remaining
  cards as part of the multi-pass scheduling story. Tracked as
  paper-internal scope, not blocking.
