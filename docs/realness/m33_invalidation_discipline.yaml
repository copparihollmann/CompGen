claim: |
  Pass cards' invalidates / verification / preserves_refinement fields
  are no longer informational. The pipeline emits typed verification
  certificates wrapping the post_lowering and differential_verification
  reports; the validator checks that every required rung has a passing
  cert, that a recipe's claimed refinement does not exceed the weakest
  preserves_refinement across applied passes, and that any analysis
  summary mutated by a pass is in the transitive closure of that
  pass's invalidates list. Producer-side lying passes raise
  UnannouncedInvalidation; refinement over-claims raise
  RefinementMonotonicityViolation; missing or failing certificates
  raise VerificationGateMissing / VerificationGateFailed.
