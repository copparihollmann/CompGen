notes: |
  Phase F-3. The probe is structural only — verifies toolchain
  preconditions, never invokes ``propose()`` or ``can_bid()``.
  ``status=available`` therefore means "could be invoked", not
  "would succeed on a real contract"; M-82 onward exercises the
  invocation paths for the available providers.
