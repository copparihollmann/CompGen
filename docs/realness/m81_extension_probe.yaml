  - results/extension_provider_probe/dialect_status.json
  - results/extension_provider_probe/pass_tool_status.json
  - results/extension_provider_probe/provider_target_matrix.csv
  - results/extension_provider_probe/provider_contract_matrix.csv
  - results/extension_provider_probe/probe_summary.md
  - docs/architecture/EXTENSION_PROVIDER_ARCHITECTURE.md
