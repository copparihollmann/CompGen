claim: |
  M-51 (Phase C): when at least one M-46 region binding has
  ``dispatch_model="async"``, the pipeline emits
  ``06_glue_emit/generated_plan_executor_async.py`` alongside the
  M-47 SYNC executor. The async executor allocates one
  :class:`EventTensor` per producer region (one cell, ``int64``
  counter, ``wait_count_default = max(1, consumer_count)``), runs
  each region in its own thread, and wires producer/consumer pairs
  through ``dependency_edges`` from the M-46 plan via
  ``EventTensor.notify`` / ``EventTensor.wait``.

  Behavioural guarantees (each backed by tests + a real-driven
  stress phase):

  1. Equivalence: on a linear dependency chain (or any DAG with
     deterministic kernels), ``compgen_run_async`` returns the same
     terminal output as the M-47 ``compgen_run``. The wait/notify
     pairs serialise the producer→consumer edges so nothing reorders
     past a value dependency.
  2. Deterministic timeout: when a kernel never returns,
     ``compgen_run_async(timeout_s=...)`` raises ``TimeoutError`` at
     the deadline; sibling waiters wake via the
     ``EventTensor._cancel`` propagation rather than hanging.
  3. Exception propagation: a kernel raising inside any worker
     re-raises the original exception out of ``compgen_run_async``
     to the main thread (first failure wins; siblings cancel via the
     event tensors).
  4. Plan invariants: M-48's typed ``PLAN_VIOLATION_<KIND>`` classes
     are reused unchanged, including the static
     ``PLAN_VIOLATION_EVENT_WRITERS`` check (every event name must
     have exactly one declaring region).

  When all bindings are SYNC, ``emit_python_async_executor`` writes a
  manifest with ``overall=skipped`` and does NOT write the executor
  file. The M-47 SYNC file remains the only artifact.

  This milestone, paired with M-50's SetDispatchMode Recipe IR
  decision, makes the dispatch path agentically selectable on
  CPU: an agent that picks ASYNC for a region in
  ``candidate_selection.recipe_delta`` produces a contract with
  ``dispatch.model=ASYNC``, and the M-46+M-51 chain emits an
  executor that honours that choice end-to-end.
