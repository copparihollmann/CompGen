notes: |
  Phase C M-51 — CPU ASYNC executor with EventTensor. Real-driven
  stress test (3 phases):

  Phase A — handshake: a 2-region linear plan
  (matmul_0 → bias_add_0) with both bindings dispatch_model=async.
  EventTensor for matmul_0_done has wait_count_default=1 (one
  consumer). Sleep injected into matmul kernel; observed ordering
  ['matmul_0', 'bias_add_0'] in 100% of runs (10/10). dispatch_calls=2,
  synchronize_called=True, terminal output==bias_out.

  Phase B — missing notify: matmul kernel hangs for 10s; called
  with timeout_s=0.5. TimeoutError fired with worker name in message
  ("worker compgen-async-matmul_0 still running"). All threads
  cleaned up via the EventTensor cancellation primitive; the test
  process did not deadlock.

  Phase C — kernel exception: matmul kernel raises
  RuntimeError("kernel failed"). Exception propagated to the main
  caller; siblings released via ``_cancel``.

  M-50→M-51 chain stress: appended {"op": "SetDispatchMode",
  "region": "matmul_0", "mode": "async"} to merlin_mlp_wide
  candidate_selection.recipe_delta; materialise produced contract
  with orchestration.dispatch.model = DispatchModel.ASYNC; canonical
  hash_contract = 30e8bed909330277.

  Tests: 10 in tests/runtime/test_glue_emit_python_async.py
  (skip-on-sync-only, async emit, syntactic validity, single-region
  dispatch, two-region handshake, timeout, exception propagation,
  unbound-region plan violation, sync/async parity).

  Honest residuals:
  - The async executor uses one EventTensor per producer region
    rather than per ``event_decl`` from the contract's
    ``orchestration.sync.event_decls``. The M-40 contract today
    declares a single per-region ``matmul_done`` event; M-51's
    ``<region_id>_done`` naming is an emitter convention until
    M-52+ wires multi-event-per-region cases (paper Fig. 5b's
    trigger / update primitives are stubbed in
    ``EventTensor.update`` / ``EventTensor.trigger`` already, but
    no contract exercises them yet).
  - persistent_launch is intentionally NOT used; the per-region
    threading.Thread spawn is simpler and matches the M-46 plan's
    region granularity. M-52's CUDA path will switch to graph
    capture rather than persistent_launch.
  - The TerminalRegion convention (last bound region in topo order)
    is a single-output simplification. Multi-output plans require
    M-49.x to wire the return-value protocol; for canonical models
    today the chain is linear so terminal-region is unambiguous.
