notes: |
  Section 20 / M-34. Fourth milestone behind the M-31A audit gate.
  Closes the multi-pass scheduling story: the LLM proposes ordered
  pass plans, the deterministic skeleton enforces phase boundaries
  + pair contracts + stale-read discipline.

  Five sub-milestones shipped:

    M-34.1  PASS_PHASES + PassCard.phase + default_phase_for_family
            (60 cards inherit phase from family without manual backfill)
    M-34.2  PassCard.requires_after + PassCard.excludes; PassPlanValidator
    M-34.3  pass_plan list field on agent_decision_response (additive);
            4 new validator check rows (structural, phase, requires_after,
            excludes)
    M-34.4  consumer-side stale-read detection (SummaryRead +
            assert_no_stale_reads); StaleAnalysisAudit fires when a
            later reader observes a strictly older generation than a
            prior reader saw
    M-34.5  realness contract + trust report

  Schema version: still pass_card_v1 — every new field is additive
  with a default. Plans are also additive: a response without
  pass_plan continues to use selected_candidate_id only.

  Honest residuals (declared, deferred):
  - Phase brackets are a static check (against the cards' declared
    phases). A future M-35+ could introduce per-region phase
    transitions where the same card runs in different phases on
    different regions. Not needed today.
  - The consumer-side stale-read check requires consumers to log
    their reads. Existing pipeline consumers (cost_preview_v2,
    kernel_readiness) don't log yet — that wire-in is a separate
    follow-up; M-34 ships the machinery + tests.
