claim: |
  Pass cards declare a phase from PASS_PHASES (canonicalize, analyze,
  optimize, verify, emit) plus optional pair contracts (requires_after,
  excludes). The agent's response can carry a pass_plan list that the
  validator checks against four invariants: structural (every pass_id
  resolves; no duplicates; candidate_id in allowlist), phase ordering
  (a phase-N step cannot appear before any phase-(<N) step),
  requires_after (declared follow-up passes appear strictly later),
  and excludes (mutually-exclusive passes never co-appear in a plan).
  Consumer-side stale-read detection complements the M-33 producer-
  side guard: each summary read records the generation observed; a
  later read at a strictly lower generation raises StaleAnalysisAudit.
