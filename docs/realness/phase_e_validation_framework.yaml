notes: |
  The validation framework is "production_path" because every
  test exercises the real shipped solver (MOSEK 11.1.11 native
  API, HiGHS 1.14.0 via highspy, OR-Tools 9.15.6755 via cp_model,
  Z3 4.16.0) on either small known-answer problems or the real
  TinyLlama topology. No mocks, no greedy fallbacks. The
  HiGHS-fallback test path patches MOSEK to ``LICENSE_MISSING``
  and verifies the response label is honestly ``selected_backend
  =highs``.

  The architecture audit lives in
  ``scripts/dev/audit_solver_architecture.py``; it walks the
  ``python/compgen/`` tree and rejects any optional-solver
  import outside the allowlist. A planted-leak test
  (``test_audit_detects_a_leak_when_planted``) confirms the
  audit detects a forbidden ``import mosek`` inside a synthetic
  repo under ``python/compgen/leaky/bad.py``.
