schema_version: pass_card_v1
pass_id: assign_streams
display_name: Annotate ops with stream attributes
level: payload
family: scheduling
source: XLA
impl_path: python/compgen/ir/payload/passes/rewrites/assign_streams.py
reads:
  - 01_payload_lowering/payload.mlir
  - 02_graph_analysis/region_graph.json
writes:
  - 03_recipe_planning/post_lowering/transformed_payload.mlir
  - 03_recipe_planning/post_lowering/applied_transform_manifest.json
preconditions:
  - "queue ids assigned (assign_queue ran first)"
  - "concurrency analysis identifies parallelisable region pairs"
invalidates:
  - payload_summary
  - graph_dossier_v3
  - kernel_contracts
preserves_refinement: bit_equality
verification:
  - structural
cost: cheap
failure_modes:
  - "unassigned_queues"
  - "circular_stream_dependency"
mcp_tool: mcp__compgen__compgen_emit_agent_decision_request
notes: |
  Reconstruction of XLA's StreamAttributeAnnotator. Builds on
  assign_queue: tags each op with a stream attribute so the runtime
  schedules concurrent stream execution.
