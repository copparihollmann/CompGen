schema_version: pass_card_v1
pass_id: plan_reduction
display_name: Choose reduction strategy
level: payload
family: scheduling
reads:
  - 01_payload_lowering/payload.mlir
  - 02_graph_analysis/graph_dossier_v3.json
  - 02_graph_analysis/cost_preview_v2.json
writes:
  - 03_recipe_planning/post_lowering/transformed_payload.mlir
  - 03_recipe_planning/post_lowering/applied_transform_manifest.json
preconditions:
  - "linalg.generic with one or more reduction iterators"
  - "reduction operand has known shape"
  - "target supports the chosen strategy (group / split / tree)"
invalidates:
  - payload_summary
  - cost_preview
  - kernel_contracts
preserves_refinement: tolerance_eps
verification:
  - structural
  - differential
cost: medium
failure_modes:
  - "dynamic_reduction_shape"
  - "unsupported_strategy_for_target"
  - "cross_workgroup_reduction_not_lowered"
mcp_tool: mcp__compgen__compgen_emit_agent_decision_request
example_invocation:
  schema_version: agent_decision_response_v1
  selected_candidate_id: plan_reduction_split_K_512
  rationale:
    why: "long-K reduction; split-K minimises bandwidth pressure"
    references:
      - "candidate.m21_analytical_cost.predicted_us"
      - "candidate.cost_preview.static_relative_cost"
source: XLA
impl_path: python/compgen/ir/payload/passes/rewrites/plan_reduction.py
notes: |
  Reconstruction of XLA's reduction-strategy planner as a CompGen
  PatternRewriter (python/compgen/ir/payload/passes/rewrites/
  plan_reduction.py). Tags reduction-bearing linalg.generic ops with
  one of:

    * group   — single-workgroup reduction (cheap; correct only when
                fits in one CTA's working set)
    * split   — split-K with cross-workgroup atomic combine
                (introduces non-deterministic accumulation order;
                hence preserves_refinement: tolerance_eps)
    * tree    — hierarchical reduction tree (deterministic; bigger
                launch overhead)

  preserves_refinement is tolerance_eps because cross-workgroup atomic
  combine reorders accumulation. A future scope_split variant that
  enforces deterministic accumulation could ship with bit_equality.

  Source: XLA reduction strategy planner. LLM-tool signature declared
  in the source: wraps_pass=CompGen:PlanReduction,
  invent_slot=pattern_library/reduction_strategy.
