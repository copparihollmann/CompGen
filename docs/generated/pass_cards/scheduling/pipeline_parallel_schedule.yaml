schema_version: pass_card_v1
pass_id: pipeline_parallel_schedule
display_name: Schedule pipeline-parallel regions
level: payload
family: scheduling
source: homemade
impl_path: python/compgen/ir/payload/passes/rewrites/pipeline_parallel_schedule.py
reads:
  - 01_payload_lowering/payload.mlir
  - 02_graph_analysis/region_graph.json
writes:
  - 03_recipe_planning/post_lowering/transformed_payload.mlir
  - 03_recipe_planning/post_lowering/applied_transform_manifest.json
preconditions:
  - "regions partitioned across pipeline stages"
  - "send/recv collective ops present at stage boundaries"
invalidates:
  - payload_summary
  - graph_dossier_v3
  - kernel_contracts
preserves_refinement: bit_equality
verification:
  - structural
cost: medium
failure_modes:
  - "incomplete_pipeline_partition"
  - "unbalanced_stage_loads"
mcp_tool: mcp__compgen__compgen_emit_agent_decision_request
notes: |
  Schedules a partitioned pipeline graph: assigns micro-batch ids,
  determines fill/drain order, inserts collective ops at stage
  boundaries.
