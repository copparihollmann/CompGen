schema_version: pass_card_v1
pass_id: insert_all_reduce
display_name: Insert all-reduce at SPMD boundaries
level: payload
family: memory
source: XLA
impl_path: python/compgen/ir/payload/passes/rewrites/insert_all_reduce.py
reads:
  - 01_payload_lowering/payload.mlir
  - 02_graph_analysis/region_graph.json
writes:
  - 03_recipe_planning/post_lowering/transformed_payload.mlir
  - 03_recipe_planning/post_lowering/applied_transform_manifest.json
preconditions:
  - "SPMD partition spec present"
  - "reduction op crosses partition boundary"
invalidates:
  - payload_summary
  - graph_dossier_v3
  - kernel_contracts
preserves_refinement: tolerance_eps
verification:
  - structural
  - differential
cost: cheap
failure_modes:
  - "missing_partition_spec"
  - "non_associative_reduction"
mcp_tool: mcp__compgen__compgen_emit_agent_decision_request
notes: |
  Reconstruction of the insertion half of XLA's SPMD lowering.
  Inserts all_reduce at every reduction that crosses a partition
  boundary. preserves_refinement: tolerance_eps because cross-rank
  combine reorders accumulation.
