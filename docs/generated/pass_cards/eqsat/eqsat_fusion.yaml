schema_version: pass_card_v1
pass_id: eqsat_fusion
display_name: E-graph saturation — fusion-enablement rules
level: payload
family: eqsat
source: homemade
impl_path: python/compgen/eqsat/rules/fusion.py
reads:
  - 01_payload_lowering/payload.mlir
writes:
  - 03_recipe_planning/post_lowering/transformed_payload.mlir
  - 03_recipe_planning/post_lowering/applied_transform_manifest.json
preconditions:
  - "e-graph extraction backend is available"
  - "fusable op pairs identified by use-def graph"
  - "saturation budget is finite"
invalidates:
  - payload_summary
  - graph_dossier_v3
  - cost_preview
  - kernel_contracts
preserves_refinement: bit_equality
verification:
  - structural
  - differential
cost: expensive
failure_modes:
  - "saturation_budget_exhausted"
  - "fusion_rule_breaks_invariant"
mcp_tool: mcp__compgen__compgen_emit_agent_decision_request
notes: |
  Fusion-enablement e-graph rewrite rules: distribute pointwise ops
  through reductions to expose fusion opportunities, restructure op
  pairs so the post-extraction graph admits more fusion.
