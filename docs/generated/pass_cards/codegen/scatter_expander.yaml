schema_version: pass_card_v1
pass_id: scatter_expander
display_name: Expand scatter to lower-level ops
level: payload
family: codegen
source: XLA
impl_path: python/compgen/ir/payload/passes/rewrites/scatter_expander.py
reads:
  - 01_payload_lowering/payload.mlir
writes:
  - 03_recipe_planning/post_lowering/transformed_payload.mlir
  - 03_recipe_planning/post_lowering/applied_transform_manifest.json
preconditions:
  - "high-level scatter op present"
  - "scatter indices have known dtype"
  - "update computation is associative"
invalidates:
  - payload_summary
  - graph_dossier_v3
  - kernel_contracts
preserves_refinement: tolerance_eps
verification:
  - structural
  - differential
cost: medium
failure_modes:
  - "non_associative_update"
  - "duplicate_indices_unsupported"
mcp_tool: mcp__compgen__compgen_emit_agent_decision_request
notes: |
  Reconstruction of XLA's ScatterExpander. Lowers high-level scatter
  via dynamic-update-slice. preserves_refinement: tolerance_eps when
  the update is non-deterministic in associativity (e.g. atomics
  with duplicate indices).
