schema_version: pass_card_v1
pass_id: remat_activations
display_name: Mark activations for rematerialization
level: payload
family: codegen
source: XLA
impl_path: python/compgen/ir/payload/passes/rewrites/remat_activations.py
reads:
  - 01_payload_lowering/payload.mlir
  - 02_graph_analysis/tensor_use_def_graph.json
writes:
  - 03_recipe_planning/post_lowering/transformed_payload.mlir
  - 03_recipe_planning/post_lowering/applied_transform_manifest.json
preconditions:
  - "peak live memory exceeds budget threshold"
  - "rematerializable activations identified by use-def liveness"
invalidates:
  - payload_summary
  - graph_dossier_v3
  - cost_preview
  - kernel_contracts
preserves_refinement: bit_equality
verification:
  - structural
  - differential
cost: medium
failure_modes:
  - "non_recomputable_activation"
  - "remat_chain_too_long"
mcp_tool: mcp__compgen__compgen_emit_agent_decision_request
notes: |
  Reconstruction of XLA's HloRematerialization. When peak live memory
  exceeds the target's budget, mark activations as rematerializable
  so the runtime recomputes them on demand instead of stashing.
