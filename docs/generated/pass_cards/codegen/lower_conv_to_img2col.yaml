schema_version: pass_card_v1
pass_id: lower_conv_to_img2col
display_name: Lower conv2d via im2col
level: payload
family: codegen
source: IREE
impl_path: python/compgen/ir/payload/passes/rewrites/lower_conv_to_img2col.py
reads:
  - 01_payload_lowering/payload.mlir
  - 02_graph_analysis/candidate_actions.json
writes:
  - 03_recipe_planning/post_lowering/transformed_payload.mlir
  - 03_recipe_planning/post_lowering/applied_transform_manifest.json
preconditions:
  - "linalg.conv_2d_nhwc_hwcf or compatible variant"
  - "static spatial dims OR known stride/dilation pattern"
invalidates:
  - payload_summary
  - graph_dossier_v3
  - cost_preview
  - kernel_contracts
preserves_refinement: bit_equality
verification:
  - structural
  - differential
cost: medium
failure_modes:
  - "dynamic_spatial_dims"
  - "unsupported_conv_layout"
  - "memory_blowup_too_large"
mcp_tool: mcp__compgen__compgen_emit_agent_decision_request
notes: |
  Reconstruction of IREE's ConvertConv2DToImg2ColPass. Materialises
  the im2col matrix so the convolution lowers to a standard matmul
  that downstream tiling + fusion already handle.
