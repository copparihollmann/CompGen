schema_version: pass_card_v1
pass_id: expand_tensor_shapes
display_name: Expand symbolic-shape tensors
level: payload
family: codegen
source: XLA
impl_path: python/compgen/ir/payload/passes/rewrites/expand_tensor_shapes.py
reads:
