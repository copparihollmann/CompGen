schema_version: pass_card_v1
pass_id: normalize_subbyte
display_name: Normalize sub-byte tensor packing
level: payload
family: layout
source: XLA
impl_path: python/compgen/ir/payload/passes/rewrites/normalize_subbyte.py
reads:
  - 01_payload_lowering/payload.mlir
  - 02_graph_analysis/candidate_actions.json
writes:
  - 03_recipe_planning/post_lowering/transformed_payload.mlir
  - 03_recipe_planning/post_lowering/applied_transform_manifest.json
preconditions:
  - "tensors with sub-byte (i4, i2, i1) elements present"
  - "packing direction is consistent across the module"
invalidates:
  - payload_summary
  - graph_dossier_v3
  - cost_preview
  - kernel_contracts
preserves_refinement: bit_equality
verification:
  - structural
cost: cheap
failure_modes:
  - "inconsistent_packing_direction"
  - "unsupported_subbyte_dtype"
mcp_tool: mcp__compgen__compgen_emit_agent_decision_request
notes: |
  Reconstruction of XLA's SubByteNormalizationPass. Ensures sub-byte
  packed tensors carry consistent packing direction so downstream
  fold/fuse passes see a uniform layout.
