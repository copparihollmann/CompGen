schema_version: pass_card_v1
pass_id: collective_quantizer
display_name: Tag collectives with quantization hints
level: payload
family: quant
source: XLA
impl_path: python/compgen/ir/payload/passes/rewrites/collective_quantizer.py
reads:
  - 01_payload_lowering/payload.mlir
  - 02_graph_analysis/numerical_sensitivity_audit.json
writes:
  - 03_recipe_planning/post_lowering/transformed_payload.mlir
  - 03_recipe_planning/post_lowering/applied_transform_manifest.json
preconditions:
  - "all_reduce / all_gather collective op present"
  - "tensor type has known dtype and shape"
  - "numerical sensitivity audit permits low-precision collective"
invalidates:
  - payload_summary
  - graph_dossier_v3
  - kernel_contracts
preserves_refinement: tolerance_eps
verification:
  - structural
cost: cheap
failure_modes:
  - "tolerance_budget_exceeded_for_collective"
  - "target_collective_does_not_support_quant"
mcp_tool: mcp__compgen__compgen_emit_agent_decision_request
notes: |
  Reconstruction of XLA's CollectiveQuantizer. When an all_reduce or
  all_gather operates on a tensor whose downstream consumers tolerate
  low precision, tag the collective with a quant hint so the runtime
  transports compressed payloads.
