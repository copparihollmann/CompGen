schema_version: pass_card_v1
pass_id: demote_contraction_inputs
display_name: Demote contraction inputs to BF16
level: payload
family: quant
source: IREE
impl_path: python/compgen/ir/payload/passes/rewrites/demote_contraction_inputs.py
reads:
  - 01_payload_lowering/payload.mlir
  - 02_graph_analysis/numerical_sensitivity_audit.json
writes:
  - 03_recipe_planning/post_lowering/transformed_payload.mlir
  - 03_recipe_planning/post_lowering/applied_transform_manifest.json
preconditions:
  - "linalg.matmul / linalg.batch_matmul with f32 operands"
  - "target accepts bf16 contraction inputs"
  - "numerical sensitivity audit permits the demotion"
invalidates:
  - payload_summary
  - graph_dossier_v3
  - cost_preview
  - kernel_contracts
  - numerical_sensitivity_audit
preserves_refinement: tolerance_eps
verification:
  - structural
  - differential
cost: cheap
failure_modes:
  - "tolerance_budget_exceeded"
  - "target_does_not_support_bf16"
  - "input_dtype_already_low_precision"
mcp_tool: mcp__compgen__compgen_emit_agent_decision_request
notes: |
  Reconstruction of IREE's DemoteContractionInputsToBF16Pass.
  Truncates f32 contraction operands to bf16 so the matrix engine
  consumes its native input precision. Accumulator stays f32.
  preserves_refinement: tolerance_eps because rounding is introduced.
