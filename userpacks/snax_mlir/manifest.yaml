name: snax_mlir
version: "0.1.0"
kinds: ["DialectPack", "RuntimePack", "KernelPack", "ProfilerPack"]
owned_surfaces:
  - snaxc_driver
  - runtime_abi
  - launch_semantics
  - trace_parser
sealed_surfaces:
  - snaxc_driver
  - runtime_abi
  - launch_semantics
generation_apertures:
  - payload_to_snax_lowering
  - setup_dedup
  - overlap_plans
  - scratchpad_banking
