integration_mode: overlay_branch
benchmark_suite: pack_integrations
benchmark_targets: ["snax_mlir_smoke"]
reference_runner: snaxc
workspace_keys: ["snax_mlir", "snax"]
third_party_names: ["snax-mlir"]
expected_files: ["README.md"]
available_profilers: ["snax_trace", "iree_tracy"]
metadata:
  vendor: kuleuven-micas

