reference_runner: verilator
workspace_keys: ["gemmini_mx", "gemmini"]
third_party_names: ["gemmini"]
expected_files: ["README.md"]
available_profilers: ["fireperf", "iree_cpu_events", "iree_tracy"]
llvm_fork_key: gemmini
metadata:
  vendor: ucb-bar

