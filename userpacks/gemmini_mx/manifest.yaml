name: gemmini_mx
version: "0.1.0"
kinds: ["TargetPack", "RuntimePack", "LLVMForkPack", "ProfilerPack"]
owned_surfaces:
  - hardware_generator
  - rocc_abi
  - simulator_truth
  - llvm_intrinsics
sealed_surfaces:
  - hardware_generator
  - rocc_abi
  - simulator_truth
generation_apertures:
  - xdsl_dialect_generation
  - llvm_patch_generation
  - dma_hoists
