name: gluon
version: "0.1.0"
kinds: ["TargetPack", "RuntimePack"]
owned_surfaces:
  - command_processor_abi
  - driver_abi
  - simulator_truth
sealed_surfaces:
  - command_processor_abi
  - driver_abi
  - simulator_truth
generation_apertures:
